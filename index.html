// ---------- Credit System ----------
const DEFAULT_CREDIT_COSTS = {
  text_short: 5, text_medium: 15, text_long: 40, code: 45, vision: 60,
  image_gen: 200, image_edit: 200, voice: 100, smart_multiplier: 1.5
};
const PLAN_CREDITS = { free: 25000, pro: 500000, infinity: 1000000 };

function estimateCreditCost({text='', feature='text', smart=false, attachment=null, creditCosts=DEFAULT_CREDIT_COSTS}){
  let cost = 0;
  const len = text.length;
  if(feature==='image_gen') cost = creditCosts.image_gen;
  else if(feature==='image_edit') cost = creditCosts.image_edit;
  else if(feature==='vision' || attachment?.type==='image') cost = creditCosts.vision;
  else if(feature==='voice') cost = creditCosts.voice;
  else if(feature==='code') cost = creditCosts.code;
  else if(len < 20) cost = creditCosts.text_short;
  else if(len < 200) cost = creditCosts.text_medium;
  else cost = creditCosts.text_long;
  if(smart) cost = Math.round(cost * creditCosts.smart_multiplier);
  return cost;
}

// ---------- OpenRouter (via secure server proxy — key never exposed to browser) ----------
const FREE_TEXT_MODELS = [
  'deepseek/deepseek-r1:free','openai/gpt-oss-120b:free','qwen/qwen3-235b-a22b:free','qwen/qwen3-coder:free',
  'meta-llama/llama-4-maverick:free','meta-llama/llama-4-scout:free','meta-llama/llama-3.3-70b-instruct:free',
  'meta-llama/llama-3.1-405b-instruct:free','nousresearch/hermes-3-llama-3.1-405b:free',
  'nvidia/nemotron-3-ultra-550b-a55b:free','mistralai/mistral-small-3.1-24b-instruct:free',
  'google/gemma-4-31b-it:free','google/gemma-3-27b-it:free','x-ai/grok-3-mini-beta:free',
  'deepseek/deepseek-chat-v3-0324:free','qwen/qwen-2.5-72b-instruct:free','openchat/openchat-7b:free'
];
const FREE_VISION_MODELS = [
  'meta-llama/llama-4-maverick:free','meta-llama/llama-4-scout:free',
  'google/gemma-4-31b-it:free','nvidia/nemotron-nano-12b-v2-vl:free'
];
const SMART_FIRST = ['deepseek/deepseek-r1:free','openai/gpt-oss-120b:free','qwen/qwen3-235b-a22b:free'];

async function callOR(messages,{vision=false,smart=false,modelPref=null}={}){
  const poolBase = vision ? [...FREE_VISION_MODELS, ...FREE_TEXT_MODELS] : FREE_TEXT_MODELS;
  const pool = [...new Set([...(modelPref?[modelPref]:[]), ...(smart?SMART_FIRST:[]), ...poolBase])];
  try{
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages, models: pool, temperature: smart ? 0.32 : 0.78, max_tokens: 1300 })
    });
    if (r.ok) {
      const d = await r.json();
      if (d?.text) return { text: d.text.trim(), model: d.model, tried: d.tried || 1 };
    }
  } catch(e){ /* fall through to offline fallback below */ }
  return {
    text: `⚠️ Zedith AI is at capacity right now (tried ${pool.length} free models).\n\nHere's an offline creator draft to keep you moving:\n\n1. I Tried 10 AI Tools So You Don't Have To\n2. How I Make Faceless YouTube Videos Using AI (Step-by-Step)\n3. AI Tools That Will Replace Expensive Software in 2026\n4. 5 AI Tools That Made Me 10x More Productive\n5. New AI Tools You Didn't Know Existed (Game Changers!)\n\nTip: enable Smart mode for deep reasoning, or try again in 60s.`,
    model:'offline-fallback',
    tried: pool.length,
    error:true
  };
}

function imageGenUrl(prompt){ return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=576&nologo=true&seed=${Math.floor(Math.random()*99999)}&model=flux`; }
async function ttsFetch(text, voiceName='Brian'){
  const map={Brian:'Brian',Amy:'Amy',Emma:'Emma',Joey:'Joey'};
  const v=map[voiceName]||'Brian';
  const url=`https://api.streamelements.com/kappa/v2/speech?voice=${encodeURIComponent(v)}&text=${encodeURIComponent(text.slice(0,900))}`;
  const res=await fetch(url); if(!res.ok) throw new Error('tts '+res.status);
  const blob=await res.blob(); return URL.createObjectURL(blob);
}

  useEffect(()=>{

  async function loadAll(){

      loadProfile(),

      loadProjects(),
      loadPlanner(),
      loadVoiceHistory(),
      loadNotifications(),
      loadSettings(),
      loadCreditCosts(),

    const {data,error}=await supabase.from('profiles').select('*').eq('id',user.id).single();
    if(error){ toast('Failed to load profile','err'); return; }
    setProfile(data);
    setSettings(s=>({...s, displayName:data.display_name||'', username:data.username||'', email:data.email||user.email||'', bio:data.bio||''}));
  }

  async function loadChats(){
    const {data,error}=await supabase.from('chats').select('*').eq('user_id',user.id).order('updated_at',{ascending:false});
    if(error){ toast('Failed to load chats','err'); return; }
    setChats(data||[]);
  }

  async function loadProjects(){
    const {data,error}=await supabase.from('projects').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
    if(error){ toast('Failed to load projects','err'); return; }
    setProjects(data||[]);
  }

  async function loadPlanner(){
    const {data,error}=await supabase.from('planner_items').select('*').eq('user_id',user.id).order('date',{ascending:true});
    if(error){ toast('Failed to load planner','err'); return; }
    setPlannerItems(data||[]);

  async function loadVoiceHistory(){
    const {data,error}=await supabase.from('voice_history').select('*').eq('user_id',user.id).order('created_at',{ascending:false});

  async function loadSettings(){
    const {data,error}=await supabase.from('settings').select('*').eq('user_id',user.id).single();

    if(data?.data) setSettings(s=>({...s,...data.data}));
  }

    const {data,error}=await supabase.from('admin_config').select('*');
    if(error) return;
    const costs = data.find(r=>r.key==='credit_costs');
    const plans = data.find(r=>r.key==='plans');
    if(costs) setCreditCosts({...DEFAULT_CREDIT_COSTS,...costs.value});
    if(plans) setPlanConfig({...PLAN_CREDITS,...Object.fromEntries(Object.entries(plans.value).map(([k,v])=>[k,v.monthly_credits]))});
  }

  async function loadTransactions(){
    const {data,error}=await supabase.from('credit_transactions').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(100);
    if(error) return;
    setTransactions(data||[]);
  }

  async function saveProfile(patch){
    if(!user) return;
    const {error}=await supabase.from('profiles').update(patch).eq('id',user.id);
    if(error) toast('Profile save failed','err');
  }

  async function saveSettings(newSettings){
    if(!user) return;
    const {error}=await supabase.from('settings').upsert({user_id:user.id, data:newSettings}, {onConflict:'user_id'});
    if(error) toast('Settings save failed','err');
  }

  async function updateProfileCredits(newCredits){
    if(!user || isAdmin(user)) return;
    setProfile(p=>({...p, credits:newCredits}));
    await supabase.from('profiles').update({credits:newCredits}).eq('id',user.id);
  }

  async function logTransaction(feature, spent, remaining, metadata={}){
    if(!user || isAdmin(user)) return;
    await supabase.from('credit_transactions').insert({user_id:user.id, feature, credits_spent:spent, remaining_balance:remaining, metadata});
    await loadTransactions();
  }

  async function hasEnoughCredits(cost){
    if(!user) return false;
    if(isAdmin(user)) return true;
    await loadProfile();
    return (profile?.credits || 0) >= cost;
  }

  async function deductCredits(cost, feature, metadata={}){
    if(!user || isAdmin(user)) return true;
    const current = profile?.credits || 0;
    if(current < cost) return false;
    const remaining = current - cost;
    await updateProfileCredits(remaining);
    await logTransaction(feature, cost, remaining, metadata);
    return true;
  }

    if(!user) return;

  async function sendMessage({text, attachment=null, smart=false, webSearch=false, modelPref='auto'}){
    let chatId = activeChatId;
    let chat = chats.find(c=>c.id===chatId) || null;
    if(!chat){
      const newChat={id:uid('c'), user_id:user.id, project_id:activeProjectId, title:(text||attachment?.name||'New chat').slice(0,56), messages:[], saved:false, pinned:false, created_at:new Date().toISOString(), updated_at:new Date().toISOString()};
      chat=newChat;
      setChats(cs=>[chat, ...cs]);
      setActiveChatId(chat.id);
      chatId=chat.id;
      await supabase.from('chats').insert(newChat);
      addNotification('New chat started', chat.title);
    }

    const userMsg={id:uid('m'), role:'user', text:text||'', ts:Date.now(), attachment};
    const updatedChat={...chat, messages:[...chat.messages, userMsg], updated_at:new Date().toISOString()};
    setChats(cs=>cs.map(c=>c.id===chatId?updatedChat:c));
    await supabase.from('chats').update({messages:updatedChat.messages, updated_at:updatedChat.updated_at}).eq('id',chatId);

    const lower=(text||'').toLowerCase();
    const wantsImage = /(\/image|generate image|create image|make.*image|draw |thumbnail|picture of|image of|imagine )/.test(lower);

    if(wantsImage && !attachment){
      const cost = estimateCreditCost({text, feature:'image_gen', smart, creditCosts});
      const ok = await deductCredits(cost, 'image_gen', {prompt:text});
      if(!ok){ toast("You're out of Credits. Upgrade to Zedith Pro or wait until your monthly credits reset.",'err'); return; }

      const placeholderId=uid('m');
      const chatWithPlaceholder={...updatedChat, messages:[...updatedChat.messages,{id:placeholderId, role:'assistant', type:'image_generating', prompt:text, ts:Date.now()}]};
      setChats(cs=>cs.map(c=>c.id===chatId?chatWithPlaceholder:c));
      try{
        let imgPrompt=text.replace(/^(generate|create|make)\s+(an?\s+)?image\s+(of\s+)?/i,'').trim()||text;
        const url=imageGenUrl(imgPrompt+', youtube thumbnail, vibrant, high detail');
        await new Promise(res=>{ const im=new Image(); im.onload=res; im.onerror=res; im.src=url; setTimeout(res, 1800); });
        const finalMessages=[...updatedChat.messages,{id:placeholderId, role:'assistant', type:'image', imageUrl:url, prompt:imgPrompt, text:`Here’s your generated image for: "${imgPrompt}"`, ts:Date.now()}];
        setChats(cs=>cs.map(c=> c.id===chatId ? {...c, messages:finalMessages, updated_at:new Date().toISOString()}:c));
        await supabase.from('chats').update({messages:finalMessages, updated_at:new Date().toISOString()}).eq('id',chatId);
        addNotification('Image generated', imgPrompt.slice(0,60));
        return;
      }catch(e){
        const errMessages=[...updatedChat.messages,{id:placeholderId, role:'assistant', type:'text', text:'Image generation failed: '+e.message, error:true, ts:Date.now()}];
        setChats(cs=>cs.map(c=> c.id===chatId ? {...c, messages:errMessages, updated_at:new Date().toISOString()}:c));
        await supabase.from('chats').update({messages:errMessages, updated_at:new Date().toISOString()}).eq('id',chatId);
        return;
      }
    }

    const feature = attachment?.type==='image' ? 'vision' : text.length > 200 ? 'text_long' : text.length > 20 ? 'text_medium' : 'text_short';
    const cost = estimateCreditCost({text, feature, smart, attachment, creditCosts});
    const ok = await deductCredits(cost, feature, {length:text.length});
    if(!ok){ toast("You're out of Credits. Upgrade to Zedith Pro or wait until your monthly credits reset.",'err'); return; }

    const history=(chat?.messages||[]).slice(-8).map(mm=>{
      if(mm.attachment?.type==='image'){
        return {role:mm.role, content:[{type:'text', text:mm.text||'analyze image'}, {type:'image_url', image_url:{url:mm.attachment.dataUrl}}]};
      }
      return {role:mm.role, content:mm.text||''};
    });
    let userContent=text;
    if(attachment?.type==='image'){
      userContent=[{type:'text', text:text||'Analyze this image for YouTube – thumbnail score, CTR tips, hook ideas.'},{type:'image_url', image_url:{url:attachment.dataUrl}}];
    }
    const sys = buildSystemPrompt({webSearch, smart, responseStyle: settings.responseStyle}) + (settings.systemPrompt ? '\n\nAdditional user instructions:\n'+settings.systemPrompt : '');
    const payload=[{role:'system', content:sys}, ...history, {role:'user', content:userContent}];
    try{
      const {text:answer, model, tried, error} = await callOR(payload,{vision:!!attachment, smart, modelPref: modelPref==='auto'? (settings.defaultModel==='auto'?null:settings.defaultModel) : modelPref});
      const assistantMsg={id:uid('m'), role:'assistant', text:answer, ts:Date.now(), model, tried, liked:0, error:!!error};
      const finalMessages=[...updatedChat.messages, assistantMsg];
      setChats(cs=>cs.map(c=>c.id===chatId?{...c, messages:finalMessages, updated_at:new Date().toISOString()}:c));
      await supabase.from('chats').update({messages:finalMessages, updated_at:new Date().toISOString()}).eq('id',chatId);
      if(!error) addNotification('Zedith replied', answer.slice(0,70));
    }catch(e){
      const errMsg={id:uid('m'), role:'assistant', text:`We're currently experiencing huge traffic — please try again in a few minutes.\n\n${e.message}`, error:true, ts:Date.now()};
      const finalMessages=[...updatedChat.messages, errMsg];
      setChats(cs=>cs.map(c=>c.id===chatId?{...c, messages:finalMessages, updated_at:new Date().toISOString()}:c));
      await supabase.from('chats').update({messages:finalMessages, updated_at:new Date().toISOString()}).eq('id',chatId);
    }
  }

  async function updateChat(chatId, patch){
    const chat = chats.find(c=>c.id===chatId);
    if(!chat) return;
    const updated={...chat, ...patch, updated_at:new Date().toISOString()};
    setChats(cs=>cs.map(c=>c.id===chatId?updated:c));
    await supabase.from('chats').update(updated).eq('id',chatId);
  }

  async function updateMessage(chatId, msgId, patch){
    const chat=chats.find(c=>c.id===chatId);
    if(!chat) return;
    const messages=chat.messages.map(m=>m.id===msgId?{...m,...patch}:m);
    await updateChat(chatId,{messages});
  }

  async function createProject(np){
    const proj={
      id:uid('p'), user_id:user.id, title:np.title||'Untitled', cat:np.cat||'YouTube',
      color:np.color||'#7c5cff', icon:np.icon||'FolderKanban', desc:np.desc||'',
      tasks:[], files:[], notes:'', members:[{id:'m1',name:'You',role:'Owner'}],
      created_at:new Date().toISOString(), updated_at:new Date().toISOString()
    };
    const {data,error}=await supabase.from('projects').insert(proj).select();
    if(error){ toast('Failed to create project','err'); return; }
    setProjects(ps=>[proj,...ps]);
    addNotification('Project created', proj.title);
    return proj.id;
  }

  async function updateProject(id, patch){
    const updated={...projects.find(p=>p.id===id), ...patch, updated_at:new Date().toISOString()};
    setProjects(ps=>ps.map(p=>p.id===id?updated:p));
    await supabase.from('projects').update(updated).eq('id',id);
  }

  async function deleteProject(id){
    await supabase.from('projects').delete().eq('id',id);
    setProjects(ps=>ps.filter(p=>p.id!==id));
  }

  async function uploadProjectFile(projectId, file){
    const path = `${user.id}/${uid('f')}_${file.name}`;
    const {error}=await supabase.storage.from('project-files').upload(path, file);
    if(error){ toast('Upload failed','err'); return null; }
    const {data}=supabase.storage.from('project-files').getPublicUrl(path);
    return {name:file.name, size:file.size, type:file.type, url:data.publicUrl, uploadedAt:new Date().toISOString()};
  }

  async function createPlannerItem(item){
    const newItem={...item, id:uid('pl'), user_id:user.id, created_at:new Date().toISOString()};
    const {data,error}=await supabase.from('planner_items').insert(newItem).select();
    if(error){ toast('Failed to schedule','err'); return; }
    setPlannerItems(ps=>[newItem,...ps]);
    addNotification('Content scheduled', newItem.title);
  }

  async function createVoiceEntry(entry){
    const newEntry={...entry, id:uid('vh'), user_id:user.id, created_at:new Date().toISOString()};
    const {data,error}=await supabase.from('voice_history').insert(newEntry).select();
    if(error){ toast('Failed to save voice','err'); return; }
    setVoiceHistory(h=>[newEntry,...h]);
  }

  async function markNotificationsRead(){
    await supabase.from('notifications').update({read:true}).eq('user_id',user.id).eq('read',false);
    setNotifications(ns=>ns.map(n=>({...n,read:true})));
  }

  async function signOut(){
    await supabase.auth.signOut();
    location.href='landing.html';
  }

  const startNewChat=()=>{ setActiveChatId(null); setActiveProjectId(null); setViewProjectId(null); setModule('chat'); };
  const openProject=(pid)=>{ setActiveProjectId(pid); setActiveChatId(null); setViewProjectId(pid); setModule('project-detail'); };
  const openChatForProject=(pid)=>{ setActiveProjectId(pid); setActiveChatId(null); setViewProjectId(null); setModule('chat'); };

  const activeChat = useMemo(()=> chats.find(c=>c.id===activeChatId) || null, [chats, activeChatId]);
  const recentChats = chats.slice(0,5).map(c=>({t:c.title||'Untitled', ago:formatDate(c.created_at)}));
  const growth={views:0,change:0};

  const updateSettings=(patch)=>{
    const ns={...settings,...patch};
    setSettings(ns);
    saveSettings(ns);
  };

  const openNotifications=()=>setModule('notifications');
  const openUpgrade=()=>setModule('upgrade');

  const commonChatProps = {
    chat:activeChat, chats, onSend:sendMessage, onNewChat:startNewChat, updateMessage, updateChat,
    plan:profile?.plan||'free', credits:profile?.credits||0, isAdminUser:isAdmin(user),
    openUpgrade, openNotifications, profile, settings
  };

  const renderModule=()=>{
    switch(module){
      case 'chat': return html`<${ChatView} ...${commonChatProps} />`;
      case 'project-detail': return html`<${ProjectDetailView} project=${projects.find(p=>p.id===viewProjectId)} projects=${projects} updateProject=${updateProject} deleteProject=${deleteProject} uploadProjectFile=${uploadProjectFile} onChat=${()=>openChatForProject(viewProjectId)} onBack=${()=>setModule('projects')} addNotification=${addNotification} />`;
      case 'projects': return html`<${ProjectsView} projects=${projects} createProject=${createProject} onOpenProject=${openProject} />`;
      case 'planner': return html`<${PlannerView} items=${plannerItems} createPlannerItem=${createPlannerItem} />`;
      case 'history': return html`<${HistoryView} chats=${chats} updateChat=${updateChat} projects=${projects} voiceHistory=${voiceHistory} />`;
      case 'saved': return html`<${HistoryView} chats=${chats} updateChat=${updateChat} projects=${projects} voiceHistory=${voiceHistory} filter="saved" />`;
      case 'voice': return html`<${VoiceStudioView} plan=${profile?.plan||'free'} credits=${profile?.credits||0} isAdminUser=${isAdmin(user)} user=${user} openUpgrade=${openUpgrade} createVoiceEntry=${createVoiceEntry} voiceHistory=${voiceHistory} myVoices=${myVoices} setMyVoices=${setMyVoices} deductCredits=${deductCredits} />`;
      case 'analytics': return html`<${AnalyticsView} />`;
      case 'settings': return html`<${SettingsView} settings=${settings} setSettings=${updateSettings} theme=${theme} setTheme=${setTheme} profile=${profile} saveProfile=${saveProfile} openUpgrade=${openUpgrade} />`;
      case 'upgrade': return html`<${UpgradeView} plan=${profile?.plan||'free'} planConfig=${planConfig} onPlan=${k=>setComingSoon(k)} />`;
      case 'notifications': return html`<${NotificationsView} notifications=${notifications} markRead=${markNotificationsRead} />`;
      case 'admin': return html`<${AdminPanel} user=${user} profile=${profile} planConfig=${planConfig} creditCosts=${creditCosts} transactions=${transactions} setPlanConfig=${setPlanConfig} setCreditCosts=${setCreditCosts} />`;
      default: return html`<${ChatView} ...${commonChatProps} />`;
    }
  };

  if(loadingUser || !user) return html`<div className="w-screen h-screen flex items-center justify-center text-zinc-500">Loading…</div>`;

  return html`
  <div className="w-full h-[100dvh] bg-white dark:bg-[#0f111a] text-zinc-900 dark:text-zinc-100 flex overflow-hidden">
    <${LeftSidebar}
      collapsed=${sidebarCollapsed}
      toggleCollapsed=${()=>setSidebarCollapsed(s=>!s)}
      module=${module}
      setModule=${setModule}
      onNewChat=${startNewChat}
      theme=${theme}
      toggleTheme=${()=>setTheme(t=>t==='dark'?'light':'dark')}
      profile=${profile}
      isAdminUser=${isAdmin(user)}
      credits=${profile?.credits||0}
      monthlyCredits=${profile?.monthly_credits||25000}
      signOut=${signOut}
      openTool=${t=>setToolModal(t)}
      openNotifications=${openNotifications}
    />
    <div className="flex-1 flex min-w-0 h-full">
      ${renderModule()}
      ${module==='chat' ? html`<${RightRail} chats=${recentChats} growth=${growth} openTool=${t=>setToolModal(t)} setModule=${setModule} />` : null}
    </div>
    ${toolModal ? html`<${ToolModal} tool=${toolModal} onClose=${()=>setToolModal(null)} onSend=${sendMessage} />` : null}
    ${comingSoon ? html`<${ComingSoonModal} plan=${comingSoon} onClose=${()=>setComingSoon(null)} />` : null}
  </div>`;
}

function ChatView({chat, chats, onSend, onNewChat, updateMessage, updateChat, plan, credits, isAdminUser, openUpgrade, openNotifications, profile, settings}){
  const [input,setInput]=useState('');
  const [smart,setSmart]=useState(false);
  const [webSearch,setWebSearch]=useState(settings?.webSearch ?? true);
  const [attached,setAttached]=useState(null);
  const [loading,setLoading]=useState(false);
  const fileRef=useRef(null); const imgRef=useRef(null); const scrollRef=useRef(null);

  const messages = chat?.messages || [];

  useEffect(()=>{ scrollRef.current?.scrollTo(0, scrollRef.current.scrollHeight); }, [messages, loading]);

  const doSend = async (overrideText)=>{
    const text=(overrideText ?? input).trim();
    if(!text && !attached) return;
    if(loading) return;
    setLoading(true); setInput('');
    const att=attached; setAttached(null);
    try{ await onSend({text, attachment:att, smart, webSearch, modelPref:'auto'}); }
    finally{ setLoading(false); }
  };

  const pickFile = (e)=>{
    const f=e.target.files?.[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{
      if(f.type.startsWith('image/')){ setAttached({type:'image', dataUrl:reader.result, name:f.name}); }
      else { setInput(inp=> inp + `\n[File: ${f.name}]`); toast('File attached: '+f.name); }
    };
    if(f.type.startsWith('image/')) reader.readAsDataURL(f); else reader.readAsText(f);
    e.target.value='';
  };

  const hasMessages = messages.length>0;

  return html`
  <div className="flex-1 flex flex-col h-full bg-[#fbfbfe] dark:bg-[#141620]">
    <div className="h-[54px] px-4 flex items-center justify-between border-b border-zinc-200 dark:border-[#23283f] bg-white/85 dark:bg-[#141620]/90 backdrop-blur">
      <div className="flex items-center gap-2 text-[13.5px] font-[600]">
        Chat
        <${I} name="ChevronDown" size=${13} className="text-zinc-400"/>
      </div>
      <div className="flex items-center gap-[10px]">
        <button onClick=${openUpgrade} className="px-[11px] py-[6px] rounded-[10px] text-[12px] font-[600] border border-zinc-300 dark:border-[#2f3452] flex items-center gap-[5px]">
          <${I} name="Crown" size=${12} className="text-amber-500"/> ${plan.toUpperCase()}
        </button>
        <button onClick=${openNotifications} className="relative p-[4px] hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-lg" title="Notifications">
          <${I} name="Bell" size=${18}/>
        </button>
        <div className="text-[11px] px-3 py-[6px] rounded-full bg-[#f3f0ff] dark:bg-[#221d3a] text-[#7c5cff] font-[600]">
          ✨ ${credits.toLocaleString('en-IN')} Credits
        </div>
      </div>
    </div>

    <div ref=${scrollRef} className="flex-1 overflow-y-auto px-[28px] py-[26px]">
      ${!hasMessages ? html`
        <div className="max-w-[740px] mx-auto pt-14 text-center">
          <div className="text-[28px] font-[800] display">Hey ${profile?.display_name||'creator'}! 👋</div>
          <div className="text-[15px] mt-2 text-zinc-600 dark:text-zinc-300">
            What would you like to <span className="text-[#7c5cff] font-[700]">create</span> or <span className="text-[#a056ff] font-[700]">learn</span> today?
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-7 text-left">
            ${[
              ['Give me 5 viral ideas','Lightbulb'],
              ['Write a script for this topic','FileText'],
              ['Generate a hook for my video','Wand2'],
              ['Analyze my latest video','BarChart3'],
            ].map(([l,ic])=> html`
              <button key=${l} onClick=${()=>doSend(l)} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-[14px] hover:border-[#7c5cff] transition text-left">
                <${I} name=${ic} size=${17} className="text-[#7c5cff] mb-[8px]"/>
                <div className="text-[12.5px] font-[550]">${l}</div>
              </button>
            `)}
          </div>
          <div className="text-[11px] text-zinc-400 mt-6">Credit-based usage • ${isAdminUser?'Unlimited admin mode':'credits deducted per request'}</div>
        </div>
      ` : html`
        <div className="max-w-[760px] mx-auto space-y-[26px]">
          ${messages.map((m,idx)=> html`
            <div key=${m.id||idx} className="fade-in">
              ${m.role==='user' ? html`

                        <${I} name="ThumbsUp" size=${13}/> ${m.liked===1?'Liked':''}

                        <${I} name="ThumbsDown" size=${13}/>
                      </button>
                      <button onClick=${()=>{ try{ const u=new SpeechSynthesisUtterance((m.text||'').slice(0,900)); u.lang='en-IN'; speechSynthesis.cancel(); speechSynthesis.speak(u); toast('Speaking…'); }catch{ toast('TTS failed','err'); } }} className="flex items-center gap-[4px] hover:text-zinc-900 dark:hover:text-zinc-100"><${I} name="Volume2" size=${13}/> Speak</button>
                      <button onClick=${()=>{ const lastUser = [...messages].reverse().find(mm=>mm.role==='user'); if(lastUser){ doSend(lastUser.text); toast('Regenerating…'); } }} className="flex items-center gap-[4px] hover:text-zinc-900 dark:hover:text-zinc-100"><${I} name="RefreshCw" size=${13}/> Regenerate</button>
                      <button onClick=${()=>{ updateChat(chat.id, {saved:!chat.saved}); toast(chat.saved?'Removed from saved':'Saved chat ✓'); }} className="flex items-center gap-[4px] hover:text-zinc-900 dark:hover:text-zinc-100"><${I} name=${chat.saved?'BookmarkCheck':'Bookmark'} size=${13}/> ${chat.saved?'Saved':''}</button>
                      ${m.model ? html`<span className="text-[10px] text-zinc-400">• ${String(m.model).split('/').pop()} ${m.tried?`· ${m.tried} tried`:''}</span>`:null}
                    </div>
                  ` : null}
                </div>
              `}
            </div>
          `)}
          ${loading ? html`<div className="text-[12.5px] text-zinc-500 flex items-center gap-2"><${I} name="Loader2" size=${14} className="animate-spin"/> Zedith is thinking${smart?' deeply':''}…</div>`:null}
        </div>
      `}
    </div>

    <div className="px-5 pb-4">
      <div className="max-w-[760px] mx-auto bg-white dark:bg-[#1b1e30] border border-zinc-200 dark:border-[#2b2f48] rounded-[18px] shadow-soft px-[13px] pt-[10px] pb-[10px]">
        ${attached ? html`
          <div className="mb-[8px] flex items-center gap-2 text-[11px] bg-zinc-50 dark:bg-[#22263a] border border-zinc-200 dark:border-zinc-700 rounded-[12px] px-3 py-[8px]">

            <img src=${attached.dataUrl} className="w-12 h-9 object-cover rounded-md"/>
            <button onClick=${()=>setAttached(null)} className="text-zinc-500"><${I} name="X" size=${13}/></button>

        `:null}
        <input

        <div className="flex items-center gap-[7px] mt-[9px] flex-wrap">

            <${I} name="Paperclip" size=${13}/> Attach

          <button onClick=${()=>{ setWebSearch(w=>!w); toast(webSearch?'Web search off':'Web search on'); }} className=${`px-[11px] h-[33px] rounded-[10px] text-[12px] border flex items-center gap-[5px] ${webSearch ? 'border-emerald-400 bg-emerald-50 dark:bg-emerald-950/25 text-emerald-700 dark:text-emerald-300':'border-zinc-200 dark:border-zinc-700'}`}>

// ---------- Project Detail View ----------
function ProjectDetailView({project, projects, updateProject, deleteProject, uploadProjectFile, onChat, onBack, addNotification}){
  const [tab,setTab]=useState('Files');
  const fileRef=useRef(null);
  if(!project) return html`<div className="flex-1 flex items-center justify-center text-zinc-500">Project not found</div>`;

  const tasks = project.tasks || [];
  const files = project.files || [];
  const notes = project.notes || '';
  const members = project.members || [];

  const updateTasks=(nt)=>updateProject(project.id,{tasks:nt});
  const updateFiles=(nf)=>updateProject(project.id,{files:nf});
  const updateNotes=(n)=>updateProject(project.id,{notes:n});

  const addTask=()=>{ const t={id:uid('t'), text:'New task', done:false}; updateTasks([...tasks,t]); };
  const toggleTask=(id)=> updateTasks(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const updateTask=(id,text)=> updateTasks(tasks.map(t=>t.id===id?{...t,text}:t));
  const removeTask=(id)=> updateTasks(tasks.filter(t=>t.id!==id));

  const uploadFile=async (e)=>{
    const f=e.target.files?.[0]; if(!f) return;
    const fileData = await uploadProjectFile(project.id, f);
    if(!fileData) return;
    const nf={id:uid('f'), ...fileData};
    updateFiles([nf,...files]);
    addNotification('File uploaded', f.name);
  };

  const tabs=['Files','Tasks','Notes','Analytics','Settings'];

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] overflow-y-auto">
    <div className="px-6 pt-5 pb-4 border-b border-zinc-200 dark:border-[#232844] flex items-center justify-between">
      <div className="flex items-center gap-3">
        <button onClick=${onBack} className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800"><${I} name="ArrowLeft" size=${18}/></button>
        <div className="w-10 h-10 rounded-[10px] flex items-center justify-center" style=${{background:project.color+'22', color:project.color}}>
          <${I} name=${project.icon||'FolderKanban'} size=${18}/>
        </div>
        <div>
          <div className="text-[19px] font-[800] display">${project.title}</div>
          <div className="text-[11px] text-zinc-500">${project.cat||'General'} • Updated ${formatDate(project.updated_at||project.created_at)}</div>
        </div>
      </div>
      <div className="flex items-center gap-2">
        <button onClick=${()=>{ const email=prompt('Invite by email:'); if(email){ const nm=[...members,{id:uid('m'),name:email,role:'Editor'}]; updateProject(project.id,{members:nm}); toast('Invitation sent to '+email); } }} className="px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 text-[12px] flex items-center gap-2">
          <${I} name="UserPlus" size=${14}/> Add members
        </button>
        <button onClick=${()=>{ copyText(window.location.href); toast('Project link copied'); }} className="px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 text-[12px] flex items-center gap-2">
          <${I} name="Share2" size=${14}/> Share
        </button>
        <button onClick=${onChat} className="px-3 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12px] font-[600] flex items-center gap-2">
          <${I} name="MessageSquare" size=${14}/> Project Chat
        </button>
      </div>
    </div>

    <div className="px-6 py-5">
      <div className="flex gap-5 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-5">
        ${tabs.map(t=> html`<button key=${t} onClick=${()=>setTab(t)} className=${`pb-[10px] ${tab===t?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${t}</button>`)}
      </div>

      ${tab==='Files' ? html`
        <div className="max-w-[900px]">
          <div className="flex items-center justify-between mb-4">
            <div className="text-[13px] font-[650]">Project Files</div>
            <button onClick=${()=>fileRef.current?.click()} className="px-3 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12px] font-[600] flex items-center gap-2"><${I} name="Upload" size=${14}/> Upload File</button>
            <input type="file" ref=${fileRef} onChange=${uploadFile} className="hidden"/>
          </div>
          ${files.length===0 ? html`
            <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-10 text-center text-zinc-500">
              <${I} name="FileText" size=${28} className="mx-auto mb-2"/><div className="font-[600]">No files yet</div><div className="text-[12px]">Upload scripts, thumbnails, research, or assets.</div>
            </div>
          ` : html`
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${files.map(f=> html`
                <div key=${f.id} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[13px] p-3 flex gap-3">
                  <div className="w-10 h-10 rounded-[10px] bg-[#f3f0ff] dark:bg-[#221d3a] flex items-center justify-center"><${I} name=${f.type?.startsWith('image/')?'Image':'FileText'} size=${16} className="text-[#7c5cff]"/></div>
                  <div className="flex-1 min-w-0">
                    <div className="text-[12.5px] font-[600] truncate">${f.name}</div>
                    <div className="text-[10.5px] text-zinc-500">${(f.size/1024).toFixed(1)} KB • ${formatDate(f.uploadedAt)}</div>
                  </div>
                  ${f.url ? html`<a href=${f.url} target="_blank" download=${f.name} className="text-[#7c5cff] text-[11px]">Open</a>`:null}
                </div>
              `)}
            </div>
          `}
        </div>
      ` : tab==='Tasks' ? html`
        <div className="max-w-[700px]">
          <div className="flex items-center justify-between mb-4">
            <div className="text-[13px] font-[650]">Tasks</div>
            <button onClick=${addTask} className="px-3 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12px] font-[600] flex items-center gap-2"><${I} name="Plus" size=${14}/> Add Task</button>
          </div>
          <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 space-y-2">
            ${tasks.length===0 ? html`<div className="text-zinc-500 text-[12px] text-center py-4">No tasks yet. Add your first project task.</div>` : tasks.map(t=> html`
              <div key=${t.id} className="flex items-center gap-3 group">
                <button onClick=${()=>toggleTask(t.id)} className=${`w-5 h-5 rounded-md border flex items-center justify-center ${t.done?'bg-emerald-500 border-emerald-500 text-white':'border-zinc-300 dark:border-zinc-600'}`}><${I} name="Check" size=${12}/></button>
                <input value=${t.text} onChange=${e=>updateTask(t.id,e.target.value)} className=${`flex-1 bg-transparent text-[13px] outline-none ${t.done?'line-through text-zinc-400':''}`}/>
                <button onClick=${()=>removeTask(t.id)} className="opacity-0 group-hover:opacity-100 text-zinc-400 hover:text-red-500"><${I} name="Trash2" size=${14}/></button>
              </div>
            `)}
          </div>
        </div>
      ` : tab==='Notes' ? html`
        <div className="max-w-[800px]">
          <div className="text-[13px] font-[650] mb-3">Project Notes</div>
          <textarea value=${notes} onChange=${e=>updateNotes(e.target.value)} placeholder="Write ideas, scripts, research notes…" className="w-full h-[420px] bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 text-[13px] outline-none resize-none"></textarea>
        </div>
      ` : tab==='Analytics' ? html`
        <div className="max-w-[900px]">
          <div className="text-[13px] font-[650] mb-4">Project Analytics</div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
            ${[['Tasks Done', tasks.filter(t=>t.done).length+'/'+tasks.length],['Files', files.length],['Members', members.length]].map(([l,v])=> html`
              <div key=${l} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[13px] p-4">
                <div className="text-[11px] text-zinc-500">${l}</div><div className="text-[22px] font-[800] display mt-1">${v}</div>
              </div>
            `)}
          </div>
        </div>
      ` : html`
        <div className="max-w-[600px]">
          <div className="text-[13px] font-[650] mb-3">Project Settings</div>
          <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 space-y-3 text-[12px]">
            <div><div className="text-zinc-500 mb-1">Project Name</div>
              <input value=${project.title} onChange=${e=>updateProject(project.id,{title:e.target.value})} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none"/>
            </div>
            <div><div className="text-zinc-500 mb-1">Category</div>
              <select value=${project.cat} onChange=${e=>updateProject(project.id,{cat:e.target.value})} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a]">
                <option>YouTube</option><option>Instagram</option><option>TikTok</option><option>Podcast</option>
              </select>
            </div>
            <div><div className="text-zinc-500 mb-1">Description</div>
              <textarea value=${project.desc||''} onChange=${e=>updateProject(project.id,{desc:e.target.value})} className="w-full h-[80px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none"></textarea>
            </div>
            <button onClick=${()=>{ if(confirm('Delete this project?')){ deleteProject(project.id); onBack(); } }} className="text-red-600 text-[12px] font-[600]">Delete Project</button>
          </div>
        </div>
      `}
    </div>
  </div>`;
}

function PlannerView({items, createPlannerItem}){
  const [view,setView]=useState('Month');
  const [showNew,setShowNew]=useState(false);
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const days=daysInMonth(year,month);
  const firstDay=new Date(year,month,1).getDay();
  const [checks,setChecks]=useState([
    {id:'c1',text:'Plan weekly content',done:false},
    {id:'c2',text:'Schedule 3 videos',done:false},
    {id:'c3',text:'Write thumbnails',done:false},
    {id:'c4',text:'Review analytics',done:false},
  ]);
  const toggleCheck=(id)=> setChecks(cs=>cs.map(c=>c.id===id?{...c,done:!c.done}:c));

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] p-6 overflow-y-auto flex gap-5">
    <div className="flex-1 min-w-0">
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="text-[19px] font-[800] display">Content Planner</div>

        <div className="flex items-center gap-2">
          <div className="flex bg-zinc-100 dark:bg-[#1e2135] rounded-[10px] p-1 text-[12px]">
            ${['Month','Week','List'].map(v=> html`<button key=${v} onClick=${()=>setView(v)} className=${`px-3 py-[6px] rounded-[8px] ${view===v?'bg-white dark:bg-[#2a2d46] shadow-sm font-[600]':'text-zinc-500'}`}>${v}</button>`)}
          </div>
          <button onClick=${()=>setShowNew(true)} className="bg-[#7c5cff] text-white px-3 py-[8px] rounded-xl text-[12px] font-[600] flex items-center gap-2"><${I} name="Plus" size=${14}/> New Content</button>
        </div>
      </div>

      ${view==='Month' ? html`
        <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
          <div className="flex items-center justify-between mb-3">
            <button onClick=${()=>{ const d=new Date(year,month-1,1); setYear(d.getFullYear()); setMonth(d.getMonth()); }} className="p-1 rounded hover:bg-zinc-100 dark:hover:bg-zinc-800"><${I} name="ChevronLeft" size=${16}/></button>
            <div className="font-[700] text-[14px]">${new Date(year,month).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
            <button onClick=${()=>{ const d=new Date(year,month+1,1); setYear(d.getFullYear()); setMonth(d.getMonth()); }} className="p-1 rounded hover:bg-zinc-100 dark:hover:bg-zinc-800"><${I} name="ChevronRight" size=${16}/></button>
          </div>
          <div className="grid grid-cols-7 text-center text-[11px] text-zinc-500 mb-2">
            ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>html`<div key=${d}>${d}</div>`)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            ${Array.from({length:firstDay}).map((_,i)=>html`<div key=${'e'+i} className="h-[90px]"></div>`)}
            ${Array.from({length:days},(_,i)=>{
              const day=i+1;
              const dayItems=items.filter(it=>{ const d=new Date(it.date); return d.getDate()===day && d.getMonth()===month && d.getFullYear()===year; });
              return html`
                <button key=${day} onClick=${()=>setShowNew(true)} className="h-[90px] rounded-[10px] border border-zinc-100 dark:border-zinc-800 p-1 text-left hover:border-[#7c5cff] transition">
                  <div className="text-[11px] font-[600] mb-1 ${day===today.getDate() && month===today.getMonth() ? 'text-[#7c5cff]' : ''}">${day}</div>
                  ${dayItems.slice(0,2).map(it=>html`<div key=${it.id} className="text-[9px] truncate px-1 py-[2px] rounded bg-[#f3f0ff] dark:bg-[#221d3a] text-[#7c5cff] mb-[2px]">${it.title}</div>`)}

          <div className="text-[12px]">Weekly timeline view coming soon with drag-and-drop scheduling.</div>

      ` : html`

          <div className="text-[13px] font-[650] mb-3">Scheduled Content</div>
          ${items.length===0 ? html`<div className="text-zinc-500 text-[12px] text-center py-8">No content scheduled yet.</div>` : html`
            <div className="space-y-2">
              ${items.map(it=>html`
                <div key=${it.id} className="flex items-center justify-between p-3 border border-zinc-100 dark:border-zinc-800 rounded-xl">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg bg-[#f3f0ff] dark:bg-[#221d3a] flex items-center justify-center"><${I} name=${it.type==='video'?'Play':'FileText'} size=${14} className="text-[#7c5cff]"/></div>
                    <div>
                      <div className="text-[12.5px] font-[600]">${it.title}</div>
                      <div className="text-[10.5px] text-zinc-500">${it.platform} • ${formatDate(it.date)}</div>
                    </div>
                  </div>
                  <span className=${`text-[10px] px-2 py-1 rounded-full ${it.status==='Published'?'bg-emerald-100 text-emerald-700':it.status==='Scheduled'?'bg-blue-100 text-blue-700':'bg-zinc-100 text-zinc-600'}`}>${it.status}</span>
                </div>
              `)}
            </div>
          `}
        </div>
      `}
    </div>

    <aside className="w-[280px] shrink-0 space-y-4">
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
        <div className="font-[650] text-[13px] mb-3">Publishing Checklist</div>
        <div className="space-y-2">
          ${checks.map(c=>html`
            <button key=${c.id} onClick=${()=>toggleCheck(c.id)} className="w-full flex items-center gap-2 text-left text-[12px]">
              <span className=${`w-4 h-4 rounded border flex items-center justify-center ${c.done?'bg-emerald-500 border-emerald-500 text-white':'border-zinc-300 dark:border-zinc-600'}`}><${I} name="Check" size=${10}/></span>
              <span className=${c.done?'line-through text-zinc-400':''}>${c.text}</span>
            </button>
          `)}
        </div>
      </div>
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
        <div className="font-[650] text-[13px] mb-2">Up Next</div>
        ${items.filter(it=>new Date(it.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3).length===0 ? html`<div className="text-[11px] text-zinc-500">Nothing scheduled yet.</div>` : html`
          <div className="space-y-2">
            ${items.filter(it=>new Date(it.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3).map(it=>html`
              <div key=${it.id} className="text-[11px]"><div className="font-[600]">${it.title}</div><div className="text-zinc-500">${formatDate(it.date)}</div></div>
            `)}
          </div>
        `}
      </div>
    </aside>

    ${showNew ? html`<${NewContentModal} onClose=${()=>setShowNew(false)} onCreate=${(it)=>{ createPlannerItem(it); setShowNew(false); toast('Content scheduled'); }}/>` : null}
  </div>`;
}

// ---------- History ----------
function HistoryView({chats, updateChat, projects, voiceHistory, filter: initialFilter='all'}){
  const [query,setQuery]=useState('');
  const [tab,setTab]=useState(initialFilter==='saved'?'Saved':'All');
  const [sort,setSort]=useState('Newest');
  const [layout,setLayout]=useState('list');

  let items=[];
  if(tab==='All') items=[...chats.map(c=>({...c,type:'chat'})), ...voiceHistory.map(v=>({...v,type:'voice'}))].sort((a,b)=>new Date(b.created_at||b.created_at)-new Date(a.created_at||a.created_at));
  else if(tab==='Chats') items=chats.map(c=>({...c,type:'chat'}));
  else if(tab==='Projects') items=chats.filter(c=>c.project_id).map(c=>({...c,type:'chat'}));
  else if(tab==='Voice') items=voiceHistory.map(v=>({...v,type:'voice'}));
  else if(tab==='Saved') items=chats.filter(c=>c.saved).map(c=>({...c,type:'chat'}));
  else if(tab==='Archived') items=[];

  if(query.trim()) items=items.filter(it=> (it.title||it.text||it.prompt||'').toLowerCase().includes(query.toLowerCase()));
  if(sort==='Newest') items.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(sort==='Oldest') items.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  if(sort==='Name') items.sort((a,b)=>(a.title||'').localeCompare(b.title||''));

  const toggleSaved=(id)=>{
    const chat=chats.find(c=>c.id===id);
    if(chat) updateChat(id,{saved:!chat.saved});
  };

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] p-6 overflow-y-auto">
    <div className="text-[19px] font-[800] display mb-1">${initialFilter==='saved'?'Saved':'History'}</div>
    <div className="text-[12px] text-zinc-500 mb-4">${initialFilter==='saved'?'Your saved conversations and content.':'All your past conversations in one place.'}</div>

    <div className="flex flex-wrap items-center gap-3 mb-4">
      <div className="relative flex-1 min-w-[200px]">
        <${I} name="Search" size=${14} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"/>
        <input value=${query} onChange=${e=>setQuery(e.target.value)} placeholder="Search history…" className="w-full pl-9 pr-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-[#1a1d2e] text-[12.5px] outline-none"/>
      </div>
      <select value=${sort} onChange=${e=>setSort(e.target.value)} className="px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-[#1a1d2e] text-[12px]">
        <option>Newest</option><option>Oldest</option><option>Name</option>
      </select>
      <div className="flex border border-zinc-200 dark:border-zinc-700 rounded-xl overflow-hidden text-[12px]">
        <button onClick=${()=>setLayout('list')} className=${`px-3 py-[8px] ${layout==='list'?'bg-zinc-100 dark:bg-zinc-800':''}`}><${I} name="List" size=${14}/></button>
        <button onClick=${()=>setLayout('grid')} className=${`px-3 py-[8px] ${layout==='grid'?'bg-zinc-100 dark:bg-zinc-800':''}`}><${I} name="LayoutGrid" size=${14}/></button>
      </div>
    </div>

    <div className="flex gap-5 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-4">
      ${['All','Chats','Projects','Voice','Saved','Archived'].map(t=> html`
        <button key=${t} onClick=${()=>setTab(t)} className=${`pb-[10px] ${tab===t?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${t}</button>
      `)}
    </div>

    ${items.length===0 ? html`
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-10 text-center text-zinc-500">
        <${I} name="Clock" size=${28} className="mx-auto mb-2"/>
        ${initialFilter==='saved'?'No saved chats yet.':'No conversations yet. Start a new chat.'}
      </div>
    ` : html`
      <div className=${layout==='grid'?'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3':'space-y-[10px] max-w-[900px]'}>
        ${items.map(it=> html`
          <div key=${it.id} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[13px] p-[14px] flex gap-3">
            <div className="w-[34px] h-[34px] rounded-[9px] bg-[#f3f0ff] dark:bg-[#221d3a] flex items-center justify-center">
              <${I} name=${it.type==='voice'?'Mic':'MessageSquare'} size=${15} className="text-[#7c5cff]"/>
            </div>
            <div className="flex-1 min-w-0">
              <div className="font-[600] text-[13px] truncate">${it.title || (it.type==='voice'? it.voice+' voice' : 'Untitled')}</div>
              <div className="text-[11.5px] text-zinc-500 truncate">${it.type==='voice' ? it.text?.slice(0,120)+'…' : it.messages?.[it.messages.length-1]?.text?.slice(0,120) || '—'}</div>
            </div>
            <div className="flex flex-col items-end gap-1">
              <div className="text-[11px] text-zinc-400">${formatDate(it.created_at)}</div>
              ${it.type==='chat' ? html`<button onClick=${()=>toggleSaved(it.id)} className="text-zinc-400 hover:text-[#7c5cff]"><${I} name=${it.saved?'BookmarkCheck':'Bookmark'} size=${14}/></button>`:null}
            </div>
          </div>
        `)}
      </div>
    `}
  </div>`;
}

// ---------- Voice Studio ----------
function VoiceStudioView({plan, credits, isAdminUser, user, openUpgrade, createVoiceEntry, voiceHistory, myVoices, setMyVoices, deductCredits}){
  const [text,setText]=useState('Welcome to Zedith AI Voice Studio. Create realistic AI voices for your YouTube content.');
  const [voice,setVoice]=useState('Brian');
  const [audioUrl,setAudioUrl]=useState(null);
  const [busy,setBusy]=useState(false);
  const [tab,setTab]=useState('Voice Generator');
  const [cloneName,setCloneName]=useState('');
  const [cloneFile,setCloneFile]=useState(null);

  const gen = async ()=>{
    if(!isAdminUser && plan==='free'){ openUpgrade(); return; }
    const cost = estimateCreditCost({text, feature:'voice', creditCosts:DEFAULT_CREDIT_COSTS});
    const ok = await deductCredits(cost, 'voice', {text:text.slice(0,100)});
    if(!ok && !isAdminUser){ toast("You're out of Credits. Upgrade to Zedith Pro or wait until your monthly credits reset.",'err'); return; }

    setBusy(true); setAudioUrl(null);
    try{
      const url = await ttsFetch(text, voice);
      setAudioUrl(url);
      await createVoiceEntry({text, voice, url});
      toast('Voice ready');
    }catch(e){
      try{ const u=new SpeechSynthesisUtterance(text.slice(0,600)); speechSynthesis.speak(u); toast('Played via browser TTS (fallback)'); }catch{ toast('Voice failed','err'); }
    }finally{ setBusy(false); }
  };

  const doClone=async ()=>{
    if(!cloneName.trim() || !cloneFile) return toast('Enter voice name and upload sample','err');
    const path=`${user?.id||'temp'}/voice_${uid('vc')}_${cloneFile.name}`;
    const {error}=await supabase.storage.from('voice-samples').upload(path, cloneFile);
    if(error) return toast('Voice sample upload failed','err');
    const newVoice={id:uid('vc'), name:cloneName, gender:'Custom', accent:'Cloned', cloned:true, sample:cloneFile.name};
    setMyVoices(v=>[...v,newVoice]);
    setCloneName(''); setCloneFile(null);
    toast('Voice clone queued – processing takes ~2 min');
  };

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] p-6 overflow-y-auto">
    <div className="flex items-center gap-2 text-[19px] font-[800] display"><${I} name="Mic" size=${20}/> AI Voice Studio</div>
    <div className="text-[12px] text-zinc-500 mb-4">Create, clone, and customize realistic AI voices for your content.</div>
    <div className="flex gap-5 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-4">
      ${['Voice Generator','Voice Cloning','My Voices','History'].map(t=> html`
        <button key=${t} onClick=${()=>setTab(t)} className=${`pb-[10px] ${tab===t?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${t}</button>
      `)}
    </div>

    ${tab==='Voice Generator' ? html`
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5 max-w-[880px] space-y-4">
        <div className="font-[600] text-[13px]">1. Choose a Voice</div>
        <div className="flex gap-3 flex-wrap">
          ${[...new Set(myVoices.map(v=>v.name))].map(n=> html`
            <button key=${n} onClick=${()=>setVoice(n)} className=${`px-4 py-[10px] rounded-[12px] border text-[12px] text-left ${voice===n?'border-[#7c5cff] bg-[#f8f5ff] dark:bg-[#221d3a]':'border-zinc-200 dark:border-zinc-700'}`}>
              <div className="font-[600]">${n}</div><div className="text-[10.5px] text-zinc-500">${myVoices.find(v=>v.name===n)?.gender||'Voice'} • ${myVoices.find(v=>v.name===n)?.accent||'US'}</div>
            </button>
          `)}
        </div>
        <div className="font-[600] text-[13px]">2. Enter your text</div>
        <textarea value=${text} onChange=${e=>setText(e.target.value)} className="w-full h-[110px] bg-zinc-50 dark:bg-[#14182a] border border-zinc-200 dark:border-zinc-700 rounded-xl p-3 text-[12.5px] outline-none"></textarea>
        <div className="flex gap-3 items-center">
          <button onClick=${gen} disabled=${busy} className="bg-[#7c5cff] hover:bg-[#6b48f5] text-white px-[18px] py-[10px] rounded-xl text-[13px] font-[600] flex items-center gap-2">
            <${I} name="AudioLines" size=${15}/> ${busy?'Generating…':'Generate Voice'}
          </button>
          <button onClick=${()=>{ try{ const u=new SpeechSynthesisUtterance(text.slice(0,600)); speechSynthesis.speak(u); }catch{} }} className="px-[14px] py-[10px] rounded-xl border border-zinc-300 dark:border-zinc-700 text-[12px]">Preview (10s)</button>
          <div className="text-[11px] text-zinc-500">${isAdminUser?'Free for admin':`${estimateCreditCost({text,feature:'voice',creditCosts:DEFAULT_CREDIT_COSTS})} Credits`}</div>

            ${p.badge ? html`<div className=${`absolute -top-3 left-1/2 -translate-x-1/2 text-[11px] px-3 py-[5px] rounded-full font-[700] shadow ${p.best ? 'bg-amber-300 text-zinc-900' : 'bg-[#9b6bff] text-white'}`}>${p.badge}</div>`:null}
            <div className="text-zinc-400 mb-2 mt-2">
              ${p.k==='free' ? html`<${I} name="Send" size=${18}/>` : p.k==='pro' ? html`<${I} name="Zap" size=${18} className="text-[#9b6cff]"/>` : html`<${I} name="Crown" size=${20} className="text-amber-500"/>`}
            </div>
            <div className=${`text-[22px] font-[800] display ${p.k==='pro'?'text-[#7c5cff]':''} ${p.k==='infinity'?'text-zinc-900 dark:text-amber-200':''}`}>${p.name}</div>
            <div className="text-[12px] text-zinc-500 dark:text-zinc-400 min-h-[34px]">${p.k==='free'?'Explore Zedith with essential features.':p.k==='pro'?'More power, more creativity.':'Unlimited creativity. Ultimate everything.'}</div>
            <div className="mt-2 text-[14px] font-[600] text-[#7c5cff]">${p.credits.toLocaleString('en-IN')} Credits / month</div>
            <div className="mt-2 text-[30px] font-[800] tracking-tight">${p.price} <span className="text-[12px] text-zinc-500 font-[500]">${p.sub}</span></div>
            <div className="border-t border-zinc-200 dark:border-zinc-800 pt-4 space-y-[9px] text-[12.5px] flex-1">
              ${p.features.map(([f,ok])=> html`<div className="flex items-start gap-2"><span className=${ok ? 'text-emerald-500' : 'text-zinc-300 dark:text-zinc-600'}>${ok ? '✓' : '✕'}</span><span className=${ok ? 'text-zinc-700 dark:text-zinc-200' : 'text-zinc-400'}>${f}</span></div>`)}
            </div>
            <button onClick=${()=>onPlan(p.k)} className=${`mt-5 w-full py-[12px] rounded-[13px] font-[700] text-[13.5px] transition ${p.k==='free' ? 'bg-zinc-100 dark:bg-[#1f1f2d] text-zinc-600 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-700' : ''} ${p.k==='pro' ? 'bg-[#7c5cff] hover:bg-[#6b48f5] text-white shadow-zed-soft' : ''} ${p.k==='infinity' ? 'bg-amber-300 hover:bg-amber-200 text-zinc-900' : ''}`}>
              ${p.btn}
            </button>
          </div>
        `)}
      </div>
    </div>
  </div>`;
}

// ---------- Notifications ----------
function NotificationsView({notifications,markRead}){
  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] overflow-y-auto p-6">
    <div className="flex items-center justify-between max-w-[820px]">
      <div>
        <div className="text-[20px] font-[800] display flex items-center gap-2"><${I} name="Bell" size=${20}/> Notifications</div>
        <div className="text-[12px] text-zinc-500">Real-time activity from your workspace.</div>
      </div>
      <button onClick=${markRead} className="text-[12px] px-3 py-[7px] rounded-xl border border-zinc-200 dark:border-zinc-700">Mark all read</button>
    </div>
    <div className="max-w-[820px] mt-5 space-y-[10px]">
      ${notifications.length===0 ? html`<div className="text-zinc-500 text-[13px]">No notifications yet.</div>` : notifications.map(n=> html`
        <div key=${n.id} className=${`bg-white dark:bg-[#1a1d2e] border ${n.read?'border-zinc-200 dark:border-[#2a2f4a]':'border-[#7c5cff]/40'} rounded-[13px] p-[14px] flex gap-3`}>
          <div className=${`w-8 h-8 rounded-full flex items-center justify-center ${n.read?'bg-zinc-100 dark:bg-zinc-800':'bg-[#efeaff] dark:bg-[#221d3a]'}`}>
            <${I} name="Bell" size=${14} className=${n.read?'text-zinc-400':'text-[#7c5cff]'} />
          </div>
          <div className="flex-1">
            <div className="font-[600] text-[13px]">${n.title}</div>
            <div className="text-[12px] text-zinc-500">${n.body}</div>
            <div className="text-[10.5px] text-zinc-400 mt-1">${new Date(n.created_at).toLocaleString()}</div>
          </div>
          ${!n.read ? html`<div className="w-2 h-2 rounded-full bg-[#7c5cff] mt-1"></div>`:null}
        </div>
      `)}
    </div>
  </div>`;
}

// ---------- Quick Tool Modal ----------
function ToolModal({tool,onClose,onSend}){
  const [input,setInput]=useState('');
  const prompts={
    'Script Writer':'Write a YouTube script about: ',
    'Idea Generator':'Generate 5 viral YouTube video ideas about: ',
    'Hook Generator':'Write 5 attention-grabbing hooks for a video about: ',
    'Thumbnail Analyzer':'Analyze this thumbnail idea and score it out of 10: ',
    'AI Voice Generator':'Convert this script into spoken audio: '
  };
  const run=()=>{
    const p = prompts[tool]||'';
    onSend({text:p+input, smart:false, webSearch:true});
    onClose();
  };
  return html`
  <div className="fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-4" onClick=${onClose}>
    <div className="bg-white dark:bg-[#181b2b] w-[480px] max-w-[96vw] rounded-[18px] shadow-2xl p-5" onClick=${e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-3">
        <div className="font-[700] text-[15px]">${tool}</div>
        <button onClick=${onClose}><${I} name="X" size=${16}/></button>
      </div>
      <div className="text-[12px] text-zinc-500 mb-3">${prompts[tool]}</div>
      <textarea value=${input} onChange=${e=>setInput(e.target.value)} placeholder="Describe your topic or paste content…" className="w-full h-[120px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#121524] outline-none text-[12.5px]"></textarea>
      <div className="flex justify-end gap-2 mt-4">
        <button onClick=${onClose} className="px-4 py-[8px] rounded-xl border border-zinc-300 dark:border-zinc-700 text-[12px]">Cancel</button>
        <button onClick=${run} disabled=${!input.trim()} className="px-4 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12px] font-[600] disabled:opacity-50">Run in Chat</button>
      </div>
    </div>
  </div>`;
}

// ---------- Admin Panel ----------
function AdminPanel({user, profile, planConfig, creditCosts, transactions, setPlanConfig, setCreditCosts}){
  if(!isAdmin(user)) return html`<div className="flex-1 flex items-center justify-center text-zinc-500">Access denied</div>`;
  const [plans,setPlans]=useState(planConfig);
  const [costs,setCosts]=useState(creditCosts);

  const saveConfig=async ()=>{
    await supabase.from('admin_config').upsert([
      {key:'plans', value:{free:{monthly_credits:plans.free}, pro:{monthly_credits:plans.pro}, infinity:{monthly_credits:plans.infinity}}},
      {key:'credit_costs', value:costs}
    ], {onConflict:'key'});
    setPlanConfig(plans);
    setCreditCosts(costs);
    toast('Admin config saved');
  };

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] p-6 overflow-y-auto">
    <div className="text-[19px] font-[800] display flex items-center gap-2 mb-1"><${I} name="Shield" size=${20}/> Admin Panel</div>
    <div className="text-[12px] text-zinc-500 mb-5">Only visible to ${ADMIN_EMAIL}</div>

    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 max-w-[1000px]">
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Plan Monthly Credits</div>
        ${Object.keys(plans).map(plan=>html`
          <div key=${plan} className="flex items-center justify-between mb-3">
            <span className="text-[12px] font-[600] uppercase">${plan}</span>
            <input type="number" value=${plans[plan]} onChange=${e=>setPlans(p=>({...p,[plan]:parseInt(e.target.value)||0}))} className="w-32 px-3 py-[6px] rounded-lg border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] text-[12px]"/>
          </div>
        `)}
      </div>

      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Credit Costs</div>
        ${Object.keys(costs).map(k=>html`
          <div key=${k} className="flex items-center justify-between mb-3">
            <span className="text-[12px] font-[600]">${k.replace(/_/g,' ')}</span>
            <input type="number" value=${costs[k]} onChange=${e=>setCosts(c=>({...c,[k]:parseInt(e.target.value)||0}))} className="w-32 px-3 py-[6px] rounded-lg border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] text-[12px]"/>
          </div>
        `)}
      </div>
    </div>

    <button onClick=${saveConfig} className="mt-5 px-5 py-[10px] rounded-xl bg-[#7c5cff] text-white text-[13px] font-[600]">Save Configuration</button>

    <div className="mt-6 bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5 max-w-[1000px]">
      <div className="font-[650] text-[13px] mb-3">Recent Credit Transactions</div>
      ${transactions.length===0 ? html`<div className="text-[12px] text-zinc-500">No transactions yet.</div>` : html`
        <div className="space-y-2 max-h-[300px] overflow-y-auto">
          ${transactions.slice(0,20).map(t=>html`
            <div key=${t.id} className="flex justify-between text-[12px] p-2 border border-zinc-100 dark:border-zinc-800 rounded-lg">
              <span>${t.feature}</span>
              <span className="text-red-500">-${t.credits_spent}</span>
              <span className="text-zinc-500">${t.remaining_balance} left</span>
              <span className="text-zinc-400">${new Date(t.created_at).toLocaleString()}</span>
            </div>
          `)}
        </div>
      `}
    </div>
  </div>`;
}

// ---------- mount ----------
const root = createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
