function AnalyticsView({sharedData=null, sharedConnected=null, reloadShared=null}){
  const [tab,setTab]=useState('Overview');
  const [period,setPeriod]=useState('Daily'); // Daily | Monthly
  const [connected,setConnected]=useState(false);
  const [loading,setLoading]=useState(true);
  const [connecting,setConnecting]=useState(false);
  const [data,setData]=useState(null);
  const [err,setErr]=useState('');
  const tabs=['Overview','Content','Audience','Engagement','Revenue','Trends'];

  const fmt=(n)=>{
    n=Number(n)||0;
    if(n>=1000000) return (n/1000000).toFixed(1)+'M';
    if(n>=1000) return (n/1000).toFixed(1)+'K';
    return String(n);
  };
  const fmtMinutes=(m)=>{
    m=Number(m)||0;
    const hrs=m/60;
    if(hrs>=1000) return (hrs/1000).toFixed(1)+'K hrs';
    return hrs.toFixed(0)+' hrs';
  };

  // Prefer the app-level shared cache (same data the AI chat already sees) so the
  // Analytics tab and the AI are always looking at identical numbers. Only falls
  // back to fetching independently if no shared loader was passed in.
  const loadAnalytics=async(force=false)=>{
    if(reloadShared){
      setLoading(true); setErr('');
      const json = await reloadShared();
      if(json && json.connected){ setConnected(true); setData(json); }
      else if(sharedConnected===false){ setConnected(false); }
      setLoading(false);
      return;
    }
    setLoading(true); setErr('');
    try{
      const { data: sessionData } = await supabase.auth.getSession();
      const token = sessionData?.session?.access_token;
      if(!token){ setConnected(false); setLoading(false); return; }
      const res = await fetch(`${SUPABASE_URL}/functions/v1/youtube-analytics-fetch`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const json = await res.json();
      if(json.connected){
        setConnected(true);
        setData(json);
      } else {
        setConnected(false);
      }
    }catch(e){
      setErr('Could not load analytics. Please try again.');
      setConnected(false);
    }
    setLoading(false);
  };

  useEffect(()=>{
    const hash = window.location.hash;
    if(hash.includes('yt_connected=1')){
      toast('YouTube channel connected!');
      history.replaceState(null,'',window.location.pathname+window.location.search+'#analytics');
    } else if(hash.includes('yt_error=1')){
      toast('Could not connect YouTube channel', 'err');
      history.replaceState(null,'',window.location.pathname+window.location.search+'#analytics');
    }
    // If App() already has data cached (e.g. the AI already loaded it silently for
    // chat), use it immediately instead of showing a loading spinner again.
    if(sharedData && sharedData.connected){
      setData(sharedData); setConnected(true); setLoading(false);
    } else if(sharedConnected===false){
      setConnected(false); setLoading(false);
    } else {
      loadAnalytics();
    }
  },[]);

  // Keep in sync if the shared cache updates elsewhere (e.g. after a background refresh).
  useEffect(()=>{
    if(sharedData && sharedData.connected){ setData(sharedData); setConnected(true); }
  },[sharedData]);

  const insights = useMemo(()=>computeChannelInsights(data), [data]);

  const handleConnect=async()=>{
    setConnecting(true);
    try{
      const { data: sessionData } = await supabase.auth.getSession();
      const token = sessionData?.session?.access_token;
      if(!token){ toast('Please sign in first', 'err'); setConnecting(false); return; }
      const res = await fetch(`${SUPABASE_URL}/functions/v1/youtube-oauth-start`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const json = await res.json();
      if(json.url){
        window.location.href = json.url;
      } else {
        toast('Could not start connection', 'err');
        setConnecting(false);
      }
    }catch(e){
      toast('Could not start connection', 'err');
      setConnecting(false);
    }
  };

  const daily = data?.dailyStats ?? [];

  // Group daily stats into monthly buckets when Monthly view is selected
  const monthly = useMemo(()=>{
    if(!daily.length) return [];
    const map = {};
    daily.forEach(d=>{
      const key = (d.date||'').slice(0,7); // YYYY-MM
      if(!map[key]) map[key] = {date:key, views:0, watchTimeMinutes:0, subscribersGained:0, subscribersLost:0, likes:0, comments:0, shares:0};
      map[key].views += Number(d.views)||0;
      map[key].watchTimeMinutes += Number(d.watchTimeMinutes)||0;
      map[key].subscribersGained += Number(d.subscribersGained)||0;
      map[key].subscribersLost += Number(d.subscribersLost)||0;
      map[key].likes += Number(d.likes)||0;
      map[key].comments += Number(d.comments)||0;
      map[key].shares += Number(d.shares)||0;
    });
    return Object.values(map);
  },[daily]);

  const series = period==='Daily' ? daily : monthly;
  const seriesLabels = series.map(d=> period==='Daily'
    ? new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})
    : new Date(d.date+'-01').toLocaleDateString('en-US',{month:'short',year:'2-digit'}));

  // Rough % change vs first half -> second half of the series, for trend pills
  const pctChange=(arr)=>{
    if(arr.length<2) return 0;
    const mid = Math.floor(arr.length/2);
    const a = arr.slice(0,mid).reduce((s,v)=>s+v,0) || 0;
    const b = arr.slice(mid).reduce((s,v)=>s+v,0) || 0;
    if(a===0) return b>0?100:0;
    return ((b-a)/a)*100;
  };

  const viewsSeries = series.map(d=>Number(d.views)||0);
  const watchSeries = series.map(d=>Number(d.watchTimeMinutes)||0);
  const engSeries = series.map(d=>(Number(d.likes)||0)+(Number(d.comments)||0)+(Number(d.shares)||0));
  const netSubSeries = series.map(d=>(Number(d.subscribersGained)||0)-(Number(d.subscribersLost)||0));

  const stats = data ? [
    ['Total Views', fmt(data.overview.views), pctChange(viewsSeries), 'Eye', '#7c5cff'],
    ['Watch Time', fmtMinutes(data.overview.watchTimeMinutes), pctChange(watchSeries), 'Clock', '#22c1c3'],
    ['Subscribers', fmt(data.channel?.subscriberCount ?? 0), pctChange(netSubSeries), 'Users', '#f5762e'],
    ['Net Sub Change', (data.overview.subscribersGained - data.overview.subscribersLost >= 0 ? '+' : '') + fmt(data.overview.subscribersGained - data.overview.subscribersLost), pctChange(netSubSeries), 'UserPlus', '#22a06b'],
  ] : [];

  const topVideos = data?.topVideos ?? [];

  const PeriodToggle = ()=> html`
    <div className="flex items-center bg-zinc-100 dark:bg-[#1f2333] rounded-xl p-[3px] text-[11.5px]">
      ${['Daily','Monthly'].map(p=>html`
        <button key=${p} onClick=${()=>setPeriod(p)} className=${`px-3 py-[6px] rounded-[9px] font-[650] transition-all ${period===p?'bg-white dark:bg-[#2a2f4a] text-[#7c5cff] shadow-sm':'text-zinc-500'}`}>${p}</button>
      `)}
    </div>`;

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#0f111a] p-6 overflow-y-auto">
    <div className="flex items-center justify-between flex-wrap gap-3">
      <div>
        <div className="text-[19px] font-[800] display flex items-center gap-2"><${I} name="BarChart3" size=${20}/> Channel Analytics</div>
        <div className="text-[12px] text-zinc-500 mb-4">Track your performance, grow your audience, and get AI-powered insights.</div>
      </div>
      ${connected ? html`<button onClick=${()=>loadAnalytics(true)} className="flex items-center gap-[6px] text-[11.5px] text-zinc-500 hover:text-[#7c5cff] transition-colors px-3 py-[6px] rounded-lg border border-zinc-200 dark:border-zinc-700"><${I} name="RefreshCw" size=${12}/> Refresh</button>` : null}
    </div>

    <div className="flex gap-5 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-5 overflow-x-auto no-scrollbar">
      ${tabs.map(t=> html`<button key=${t} onClick=${()=>setTab(t)} className=${`pb-[10px] whitespace-nowrap ${tab===t?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${t}</button>`)}
    </div>

    ${loading ? html`
      <div className="flex items-center justify-center py-20 text-zinc-400 text-[12.5px] gap-2">
        <${I} name="Loader2" size=${16} className="animate-spin"/> Loading analytics…
      </div>
    ` : !connected ? html`
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-10 text-center max-w-[760px]">
        <${I} name="Lock" size=${32} className="mx-auto text-[#7c5cff] mb-3"/>
        <div className="font-[700]">No Social Accounts Connected</div>
        <div className="text-[12.5px] text-zinc-500 mt-1">Connect your YouTube channel to unlock real analytics.</div>
        ${err ? html`<div className="text-[11.5px] text-red-500 mt-2">${err}</div>` : null}
        <button onClick=${handleConnect} disabled=${connecting} className="mt-4 bg-[#7c5cff] hover:bg-[#6b48f5] text-white px-4 py-[9px] rounded-xl text-[12px] font-[600] disabled:opacity-60 transition-colors">${connecting?'Redirecting…':'Connect Your Account'}</button>
        <div className="text-[10.5px] text-zinc-400 mt-3">Your data is secure and encrypted.</div>
      </div>
    ` : html`
      <div className="space-y-5 max-w-[1080px]">
        <div className="flex items-center justify-between flex-wrap gap-3">
          ${data?.channel ? html`
            <div className="flex items-center gap-3">
              ${data.channel.thumbnail ? html`<img src=${data.channel.thumbnail} className="w-10 h-10 rounded-full border border-zinc-200 dark:border-zinc-700"/>` : null}
              <div>
                <div className="font-[700] text-[13.5px]">${data.channel.title}</div>
                <div className="text-[11px] text-zinc-500">Last 28 days · ${period==='Daily'?'Daily breakdown':'Monthly breakdown'}</div>
              </div>
            </div>
          ` : html`<div></div>`}
          <${PeriodToggle}/>
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          ${stats.map(([l,v,c,icon,color])=>html`
            <div key=${l} className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-4 relative overflow-hidden group hover:border-[#7c5cff]/40 transition-colors">
              <div className="absolute -right-4 -top-4 w-16 h-16 rounded-full opacity-[0.08]" style=${{background:color}}></div>
              <div className="flex items-center justify-between">
                <div className="text-[11px] text-zinc-500 font-[550]">${l}</div>
                <div className="w-6 h-6 rounded-lg flex items-center justify-center" style=${{background:color+'1a', color}}>
                  <${I} name=${icon} size=${13}/>
                </div>
              </div>
              <div className="text-[22px] font-[800] display mt-1">${v}</div>
              <div className="mt-1"><${TrendPill} value=${c}/></div>
            </div>
          `)}
        </div>

        ${tab==='Overview' ? html`
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <${HealthScoreCard} insights=${insights}/>
            <${GrowthOpportunitiesCard} insights=${insights}/>
            <${UploadCalendarCard} daily=${daily}/>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="lg:col-span-2 bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="flex items-center justify-between mb-1">
                <div>
                  <div className="font-[700] text-[13.5px]">Views Over Time</div>
                  <div className="text-[11px] text-zinc-500">${period==='Daily'?'Daily':'Monthly'} views for the last 28 days</div>
                </div>
                <div className="text-[11px] px-2 py-1 rounded-lg font-[700]" style=${{background:'#7c5cff1a',color:'#7c5cff'}}>${fmt(viewsSeries.reduce((s,v)=>s+v,0))} total</div>
              </div>
              <div className="mt-3">
                <${AreaChart} data=${viewsSeries} labels=${seriesLabels} color="#7c5cff" fmt=${v=>fmt(v)+' views'}/>
              </div>
              <div className="flex justify-between text-[10px] text-zinc-400 mt-1 px-1">
                <span>${seriesLabels[0]||''}</span><span>${seriesLabels[seriesLabels.length-1]||''}</span>
              </div>
            </div>
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-1">Watch Time</div>
              <div className="text-[11px] text-zinc-500 mb-3">${period==='Daily'?'Daily':'Monthly'} minutes watched</div>
              <${BarSpark} data=${watchSeries} labels=${seriesLabels} color="#22c1c3" fmt=${v=>fmtMinutes(v)} h=${150}/>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-1">Engagement</div>
              <div className="text-[11px] text-zinc-500 mb-3">Likes + comments + shares</div>
              <${AreaChart} data=${engSeries} labels=${seriesLabels} color="#f5762e" fmt=${v=>fmt(v)+' engagements'} h=${140}/>
            </div>
            <div className="lg:col-span-2 bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="flex items-center justify-between mb-3">
                <div className="font-[700] text-[13.5px] flex items-center gap-2"><${I} name="Trophy" size=${14} className="text-amber-500"/> Top Performing Content</div>
              </div>
              <div className="space-y-2">
                ${topVideos.length ? topVideos.map((v,i)=>html`
                  <div key=${v.id||i} className="flex flex-col sm:flex-row sm:items-center gap-3 p-3 border border-zinc-100 dark:border-zinc-800 rounded-xl text-[12px] hover:bg-zinc-50 dark:hover:bg-[#1b1f30] transition-colors">
                    <div className="flex items-center gap-3 min-w-0 flex-1">
                      ${v.thumbnail?html`<img src=${v.thumbnail} className="w-16 h-10 rounded-md object-cover flex-shrink-0"/>`:html`<div className="w-10 h-10 rounded-lg bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-zinc-500 flex-shrink-0">${i+1}</div>`}
                      <div className="min-w-0">
                        <div className="font-[600] truncate">${v.title}</div>
                        ${i===0 ? html`<span className="inline-block mt-1 text-[9.5px] font-[700] px-[6px] py-[2px] rounded-full bg-emerald-500/15 text-emerald-500">Top Performer</span>` : null}
                      </div>
                    </div>
                    <div className="flex gap-4 text-zinc-500 flex-shrink-0 pl-[52px] sm:pl-0 text-[11px]">
                      <span><b className="text-zinc-700 dark:text-zinc-200">${fmt(v.views)}</b> views</span>
                      <span><b className="text-zinc-700 dark:text-zinc-200">${fmt(v.likes)}</b> likes</span>
                      <span><b className="text-zinc-700 dark:text-zinc-200">${fmt(v.comments)}</b> comments</span>
                    </div>
                  </div>
                `) : html`<div className="text-[12px] text-zinc-400 text-center py-6">No video data yet for this period.</div>`}
              </div>
            </div>
          </div>
        ` : tab==='Content' ? html`
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="lg:col-span-2 bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-3">Content Performance</div>
              ${topVideos.length ? topVideos.map((v,i)=>html`<div key=${v.id||i} className="flex items-center justify-between p-3 border border-zinc-100 dark:border-zinc-800 rounded-xl text-[12px] mb-2"><div className="font-[600] max-w-[320px] truncate">${v.title}</div><div className="flex gap-4 text-zinc-500"><span>${fmt(v.views)} views</span><span>${fmtMinutes(v.watchTimeMinutes)}</span></div></div>`) : html`<div className="text-[12px] text-zinc-400 text-center py-6">No video data yet.</div>`}
            </div>
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-1">Views Trend</div>
              <div className="text-[11px] text-zinc-500 mb-3">${period==='Daily'?'Daily':'Monthly'}</div>
              <${AreaChart} data=${viewsSeries} labels=${seriesLabels} color="#7c5cff" fmt=${v=>fmt(v)+' views'} h=${160} w=${300}/>
            </div>
          </div>
        ` : tab==='Audience' ? html`
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5"><div className="font-[700] text-[13.5px] mb-3">Age &amp; Gender</div>
              ${(data?.demographics ?? []).length ? data.demographics.map((row,i)=>html`<div key=${i} className="flex items-center gap-3 mb-2 text-[12px]"><div className="w-20 truncate">${row[0]} · ${row[1]}</div><div className="flex-1 h-2 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden"><div className="h-full bg-[#7c5cff] rounded-full" style=${{width:(Number(row[2])||0)+'%'}}></div></div><div className="w-10 text-right">${(Number(row[2])||0).toFixed(0)}%</div></div>`) : html`<div className="text-[12px] text-zinc-400 text-center py-4">No demographic data yet.</div>`}
            </div>
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5"><div className="font-[700] text-[13.5px] mb-3">Top Countries</div>
              ${(data?.topCountries ?? []).length ? html`
                <div className="flex items-center gap-4">
                  <${Donut} segments=${data.topCountries.slice(0,5).map((row,i)=>({value:Number(row[1])||0, color:['#7c5cff','#22c1c3','#f5762e','#22a06b','#e0457b'][i%5]}))}/>
                  <div className="flex-1 space-y-[6px]">
                    ${data.topCountries.slice(0,5).map((row,i)=>html`<div key=${i} className="flex items-center justify-between text-[11.5px]"><span className="flex items-center gap-2"><span className="w-[8px] h-[8px] rounded-full" style=${{background:['#7c5cff','#22c1c3','#f5762e','#22a06b','#e0457b'][i%5]}}></span>${row[0]}</span><span className="font-[600]">${fmt(row[1])}</span></div>`)}
                  </div>
                </div>
              ` : html`<div className="text-[12px] text-zinc-400 text-center py-4">No country data yet.</div>`}
            </div>
          </div>
        ` : tab==='Engagement' ? html`
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="lg:col-span-2 bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-1">Engagement Over Time</div>
              <div className="text-[11px] text-zinc-500 mb-3">Likes, comments &amp; shares combined</div>
              <${AreaChart} data=${engSeries} labels=${seriesLabels} color="#f5762e" fmt=${v=>fmt(v)+' total'} h=${170}/>
            </div>
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-3">Breakdown</div>
              <div className="space-y-3">
                ${[['Likes',data?.overview.likes ?? 0,'#7c5cff'],['Comments',data?.overview.comments ?? 0,'#22c1c3'],['Shares',data?.overview.shares ?? 0,'#f5762e']].map(([l,v,color])=>html`
                  <div key=${l} className="p-3 border border-zinc-100 dark:border-zinc-800 rounded-xl">
                    <div className="flex items-center justify-between text-[11px] text-zinc-500"><span>${l}</span><span className="font-[700] text-[14px] text-zinc-900 dark:text-zinc-100">${fmt(v)}</span></div>
                    <div className="mt-2 h-[6px] rounded-full bg-zinc-100 dark:bg-zinc-800 overflow-hidden"><div className="h-full rounded-full" style=${{width:'100%',background:color}}></div></div>
                  </div>
                `)}
              </div>
            </div>
          </div>
        ` : tab==='Revenue' ? html`
          <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5 text-center">
            <${I} name="Info" size=${20} className="mx-auto text-zinc-400 mb-2"/>
            <div className="font-[650] text-[13px] mb-1">Revenue data not connected</div>
            <div className="text-[12px] text-zinc-500">Revenue reporting requires the YouTube Analytics monetary scope. Reconnect your account with that permission to see estimated revenue here.</div>
          </div>
        ` : html`
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-3">Views Trend</div>
              <div className="text-[12px] text-zinc-500 mb-2">
                ${insights ? (insights.viewsTrendPct>=0
                  ? html`Views trended <b className="text-emerald-500">up ${insights.viewsTrendPct}%</b> across this period.`
                  : html`Views trended <b className="text-rose-500">down ${Math.abs(insights.viewsTrendPct)}%</b> across this period.`) : 'No data yet.'}
              </div>
              <${AreaChart} data=${viewsSeries} labels=${seriesLabels} color="#7c5cff" fmt=${v=>fmt(v)+' views'} h=${140}/>
            </div>
            <div className="bg-white dark:bg-[#151827] border border-zinc-200 dark:border-[#262b42] rounded-[14px] p-5">
              <div className="font-[700] text-[13.5px] mb-3">Where your views come from</div>
              ${insights?.topCountries?.length ? html`
                <div className="space-y-2">
                  ${insights.topCountries.map((c,i)=>html`
                    <div key=${i} className="flex items-center justify-between text-[12px]">
                      <span>${c.country}</span><span className="font-[600]">${fmt(c.views)} views</span>
                    </div>`)}
                </div>
              ` : html`<div className="text-[12px] text-zinc-400 text-center py-6">No country data yet.</div>`}
            </div>
          </div>
        `}
      </div>
    `}
  </div>`;
}

      <div className=${`absolute top-[2px] w-[18px] h-[18px] bg-white rounded-full shadow transition-all ${on?'right-[2px]':'left-[2px]'}`}></div>

            </div>

              <input value=${settings.email} disabled className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 outline-none"/>

            <div className="col-span-2"><div className="text-zinc-500 mb-1">Bio</div>

// ---------- Upgrade ----------
function UpgradeView({plan, planConfig, onPlan}) {
  const [yearly,setYearly]=useState(false);

  // Monthly base prices
  const MONTHLY_PRICES = { pro: 299, elite: 599 };
  // Yearly = monthly * 12 * 0.8
  const getPrice = (k) => {
    if(k==='free') return {display:'₹0', sub:'Forever Free'};
    const base = MONTHLY_PRICES[k]||0;
    if(yearly){
      const yr = Math.round(base * 12 * 0.8);
      return {display:`₹${yr.toLocaleString('en-IN')}`, sub:'/year (billed annually)'};
    }
    return {display:`₹${base}`, sub:'/month'};
  };

  const plans = [
    {k:'free', name:'Free', credits:planConfig.free||20000,
      features:[['20K Credits / month',1],['Basic AI Models',1],['Web Search',1],['Chat History',1],['Save Chats',1],['Voice Studio',0],['Channel Analytics',0],['AI Image Generation',1],['Priority Support',0]],
      btn:'Current Plan', popular:false},
    {k:'pro', name:'Pro', credits:planConfig.pro||500000, badge:'★ Most Popular',
      features:[['500K Credits / month',1],['Advanced AI Models',1],['Web Search',1],['Voice Studio',1],['Channel Analytics',1],['AI Image Generation',1],['Faster Responses',1],['AI Memory',1],['Priority Support',1]],
      btn:'Upgrade to Pro', popular:true},
    {k:'elite', name:'Zedith Elite', credits:planConfig.elite||1000000, badge:'✦ Best Value',
      features:[['1M Credits / month',1],['All AI Models',1],['Voice Studio (HQ)',1],['Channel Analytics (Advanced)',1],['AI Image Generation',1],['Fastest Responses',1],['Advanced AI Memory',1],['VIP Priority Support',1],['Early Access',1]],
      btn:'Upgrade to Elite', best:true},
  ];

  return html`
  <div className="flex-1 h-full overflow-y-auto bg-[#fbfbfe] dark:bg-[#0b0b14] text-zinc-900 dark:text-white transition-colors">
    <div className="px-10 pt-10 pb-10 max-w-[1180px]">
      <div className="flex items-start justify-between">
        <div>
          <div className="text-[32px] font-[800] display">Upgrade Your <span className="text-[#7c5cff]">Experience</span></div>
          <div className="text-zinc-500 dark:text-zinc-400 mt-1 text-[13.5px]">Choose the plan that fits your creative journey.</div>
          <div className="mt-5 inline-flex bg-zinc-100 dark:bg-[#181828] rounded-full p-1 text-[12.5px] border border-zinc-200 dark:border-zinc-800">
            <button onClick=${()=>setYearly(false)} className=${`px-4 py-[6px] rounded-full transition ${!yearly?'bg-white dark:bg-[#252542] shadow-sm font-[650] text-zinc-900 dark:text-white':'text-zinc-500'}`}>Monthly</button>
            <button onClick=${()=>setYearly(true)} className=${`px-4 py-[6px] rounded-full transition flex items-center gap-2 ${yearly?'bg-white dark:bg-[#252542] shadow-sm font-[650] text-zinc-900 dark:text-white':'text-zinc-500'}`}>
              Yearly <span className="text-[10px] bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 px-2 py-[2px] rounded-full">Save 20%</span>
            </button>
          </div>
        </div>
        <div className="text-[11.5px] text-zinc-500 dark:text-violet-300 flex items-center gap-1"><${I} name="Lock" size=${13}/> Secure. Cancel anytime.</div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
        ${plans.map(p=> {
          const {display, sub} = getPrice(p.k);
          return html`
          <div key=${p.k} className=${`relative rounded-[22px] border p-[26px] flex flex-col transition ${p.popular ? 'border-[#7c5cff]/60 bg-white dark:bg-[#151428] shadow-[0_8px_40px_rgba(124,92,255,0.10)]' : ''} ${p.best ? 'border-amber-300/60 bg-white dark:bg-[#151428]' : ''} ${!p.popular && !p.best ? 'border-zinc-200 dark:border-zinc-800 bg-white dark:bg-[#13131d]' : ''}`}>

            <div className="text-zinc-400 mb-2 mt-2">
              ${p.k==='free' ? html`<${I} name="Send" size=${18}/>` : p.k==='pro' ? html`<${I} name="Zap" size=${18} className="text-[#9b6cff]"/>` : html`<${I} name="Crown" size=${20} className="text-amber-500"/>`}

// ---------- Quick Tool Modal ----------
function ToolModal({tool,onClose,onSend}){
  const [input,setInput]=useState('');
  const prompts={
    'Script Writer':'Write a YouTube script about: ',
    'Idea Generator':'Generate 5 viral YouTube video ideas about: ',
    'Hook Generator':'Write 5 attention-grabbing hooks for a video about: ',
    'Thumbnail Analyzer':'Analyze this thumbnail idea and score it out of 10: ',
    'AI Voice Generator':'Convert this script into spoken audio: '
  };
  const run=()=>{
    const p = prompts[tool]||'';
    onSend({text:p+input, smart:false, webSearch:true});
    onClose();
  };
  return html`
  <div className="fixed inset-0 z-[300] bg-black/50 backdrop-blur-[3px] flex items-center justify-center p-4 overlay-in" onClick=${onClose}>
    <div className="modal-panel modal-in w-[480px] max-w-[96vw] rounded-[20px] p-5" onClick=${e=>e.stopPropagation()}>

        <button onClick=${onClose} className="w-7 h-7 rounded-lg flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"><${I} name="X" size=${16}/></button>
      </div>
      <div className="text-[12px] text-zinc-500 mb-3">${prompts[tool]}</div>
      <textarea value=${input} onChange=${e=>setInput(e.target.value)} placeholder="Describe your topic or paste content…" className="w-full h-[120px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#121524] outline-none text-[12.5px] focus:border-[#7c5cff] focus:ring-1 focus:ring-[#7c5cff]/30 transition-colors"></textarea>
      <div className="flex justify-end gap-2 mt-4">
        <button onClick=${onClose} className="px-4 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 text-[12px] font-[550] hover:bg-zinc-50 dark:hover:bg-zinc-800/60 transition-colors">Cancel</button>

    </div>
  </div>`;
}

// --- Admin Dashboard ---
function AdminDashboard({card, transactions}){
  const [users,setUsers]=useState({total:0,active:0,online:0,new_today:0});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const {data:profiles,error}=await supabase.from('profiles').select('id,created_at,plan');
      if(!error && profiles){
        const today=new Date(); today.setHours(0,0,0,0);
        setUsers({
          total:profiles.length,
          active:profiles.length,
          new_today:profiles.filter(p=>new Date(p.created_at)>=today).length,
          free:profiles.filter(p=>!p.plan||p.plan==='free').length,
          pro:profiles.filter(p=>p.plan==='pro').length,
          elite:profiles.filter(p=>p.plan==='elite'||p.plan==='infinity').length,
        });
      }
      setLoading(false);
    };
    load();
  },[]);

  const totalCreditsSpent = transactions.reduce((s,t)=>s+(t.credits_spent||0),0);
  const todayTx = transactions.filter(t=>new Date(t.created_at)>new Date(Date.now()-86400000));
  const todayCredits = todayTx.reduce((s,t)=>s+(t.credits_spent||0),0);
  const aiRequests = transactions.filter(t=>['text_short','text_medium','text_long','code','vision'].includes(t.feature)).length;
  const imageGens = transactions.filter(t=>t.feature==='image_gen').length;
  const voiceGens = transactions.filter(t=>t.feature==='voice').length;

  return html`
  <div>
    <div className="flex items-center justify-between mb-1">
      <div className="text-[18px] font-[750] display flex items-center gap-2 text-zinc-100">
        <${I} name="LayoutDashboard" size=${18} style=${{color:'#e8b04b'}}/> Admin Dashboard
      </div>
    </div>
    <div className="text-[12px] text-zinc-500 mb-4">Real-time platform overview — <span className="mono">${ADMIN_EMAIL}</span></div>

    <div className="flex items-center gap-2 bg-[#0f1911] border border-[#1c3324] rounded-[10px] px-3.5 py-2 mb-5 w-fit">
      <span className="w-[7px] h-[7px] rounded-full bg-[#3ecf8e] pulse-dot"></span>
      <span className="text-[11.5px] font-[600] text-[#6fdba8]">All systems operational</span>
    </div>

    ${loading ? html`<div className="text-[12px] text-zinc-500">Loading stats…</div>` : html`
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        ${card('Total Users', users.total, 'Users', '#e8b04b', 'All registered accounts')}
        ${card('New Today', users.new_today, 'UserPlus', '#e8b04b', 'Signed up today')}
        ${card('Free Plan', (users.free||0).toString(), 'Send', '#6b7280', 'Users')}
        ${card('Pro Plan', (users.pro||0).toString(), 'Zap', '#e8b04b', 'Users')}
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        ${card('Elite Plan', (users.elite||0).toString(), 'Crown', '#f0c876', 'Users')}
        ${card('Credits Used Today', todayCredits.toLocaleString(), 'Coins', '#c98bf0', `${todayTx.length} transactions`)}
        ${card('Total Credits Used', totalCreditsSpent.toLocaleString(), 'TrendingUp', '#ef5b5b', 'All time')}
        ${card('AI Requests', aiRequests.toString(), 'MessageSquare', '#5bc8e8', 'Text & code')}
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        ${card('Image Generations', imageGens.toString(), 'Image', '#e85ba3', 'All time')}
        ${card('Voice Generations', voiceGens.toString(), 'AudioLines', '#3ecf8e', 'All time')}
      </div>
    `}

    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
      <div className="bg-[#12131e] border border-[#1e2030] rounded-[12px] p-5">
        <div className="font-[650] text-[13px] mb-4 flex items-center gap-2 text-zinc-200"><${I} name="TrendingUp" size=${14} style=${{color:'#e8b04b'}}/> Credit Usage (Last 7 days)</div>
        <div className="h-[140px] flex items-end gap-[6px]">
          ${Array.from({length:7},(_,i)=>{
            const d=new Date(Date.now()-((6-i)*86400000));
            const dayTx=transactions.filter(t=>{ const td=new Date(t.created_at); return td.getDate()===d.getDate()&&td.getMonth()===d.getMonth(); });
            const sum=dayTx.reduce((s,t)=>s+(t.credits_spent||0),0);
            const maxCredits=5000;
            const h=Math.max(4, Math.round((Math.min(sum,maxCredits)/maxCredits)*120));
            return html`
              <div key=${i} className="flex-1 flex flex-col items-center gap-1">
                <div className="text-[9px] text-zinc-500 mono">${sum>0?sum:''}</div>
                <div className="w-full rounded-t-[3px] bg-[#e8b04b]/70" style=${{height:h+'px'}}></div>
                <div className="text-[9px] text-zinc-500">${['M','T','W','T','F','S','S'][d.getDay()]}</div>
              </div>`;
          })}
        </div>
      </div>
      <div className="bg-[#12131e] border border-[#1e2030] rounded-[12px] p-5">
        <div className="font-[650] text-[13px] mb-4 flex items-center gap-2 text-zinc-200"><${I} name="PieChart" size=${14} style=${{color:'#e8b04b'}}/> Feature Breakdown</div>
        ${[
          ['Text AI', transactions.filter(t=>['text_short','text_medium','text_long','code'].includes(t.feature)).length, '#e8b04b'],
          ['Vision', transactions.filter(t=>t.feature==='vision').length, '#5b9dff'],
          ['Image Gen', imageGens, '#e85ba3'],
          ['Voice', voiceGens, '#3ecf8e'],
        ].map(([name,count,color])=>html`
          <div key=${name} className="flex items-center gap-3 mb-2.5">
            <div className="text-[11px] w-16 text-zinc-400">${name}</div>
            <div className="flex-1 h-[5px] bg-[#1c1e2e] rounded-full overflow-hidden">
              <div className="h-full rounded-full" style=${{width:Math.min(100,count*2)+'%', background:color}}></div>
            </div>
            <div className="text-[11px] font-[600] w-8 text-right mono text-zinc-300">${count}</div>
          </div>
        `)}
      </div>
    </div>

    <div className="bg-[#12131e] border border-[#1e2030] rounded-[12px] p-5">
      <div className="font-[650] text-[13px] mb-4 flex items-center gap-2 text-zinc-200"><${I} name="Activity" size=${14} style=${{color:'#e8b04b'}}/> Recent Transactions</div>
      ${transactions.length===0 ? html`<div className="text-[12px] text-zinc-500">No transactions yet.</div>` : html`
        <div className="overflow-x-auto">
          <table className="w-full text-[12px]">
            <thead><tr className="border-b border-[#1e2030]">
              <th className="text-left py-2 text-zinc-500 font-[600] text-[10.5px] uppercase tracking-wide">Feature</th>
              <th className="text-left py-2 text-zinc-500 font-[600] text-[10.5px] uppercase tracking-wide">Credits</th>
              <th className="text-left py-2 text-zinc-500 font-[600] text-[10.5px] uppercase tracking-wide">Balance</th>
              <th className="text-left py-2 text-zinc-500 font-[600] text-[10.5px] uppercase tracking-wide">Time</th>
            </tr></thead>
            <tbody>
              ${transactions.slice(0,15).map(t=>html`
                <tr key=${t.id} className="border-b border-[#171826]">
                  <td className="py-2 font-[500] text-zinc-300">${t.feature}</td>
                  <td className="py-2 text-[#ef5b5b] font-[600] mono">-${t.credits_spent}</td>
                  <td className="py-2 text-zinc-500 mono">${t.remaining_balance?.toLocaleString()}</td>
                  <td className="py-2 text-zinc-500 mono text-[11px]">${new Date(t.created_at).toLocaleString()}</td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>
      `}
    </div>
  </div>`;
}

// --- Admin Users ---
function AdminUsers(){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [selectedUser,setSelectedUser]=useState(null);
  const [creditAdj,setCreditAdj]=useState('');
  const [confirm,setConfirm]=useState(null);
  const [page,setPage]=useState(0);
  const PER_PAGE=15;

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const {data,error}=await supabase.from('profiles').select('*').order('created_at',{ascending:false});
      if(!error) setUsers(data||[]);
      setLoading(false);
    };
    load();
  },[]);

  const filtered = users.filter(u=>{
    const q=search.toLowerCase();
    return !q || (u.email||'').toLowerCase().includes(q) || (u.display_name||'').toLowerCase().includes(q) || (u.username||'').toLowerCase().includes(q);
  });
  const paged = filtered.slice(page*PER_PAGE, (page+1)*PER_PAGE);
  const pages = Math.ceil(filtered.length/PER_PAGE);

  const adjustCredits=async(uid,amount,op)=>{
    const u=users.find(x=>x.id===uid); if(!u) return;
    const newCr = op==='add' ? (u.credits||0)+amount : op==='remove' ? Math.max(0,(u.credits||0)-amount) : amount;
    const {error}=await supabase.from('profiles').update({credits:newCr}).eq('id',uid);
    if(!error){ setUsers(us=>us.map(x=>x.id===uid?{...x,credits:newCr}:x)); toast('Credits updated'); setCreditAdj(''); }
    else toast('Failed: '+error.message,'err');
  };

  const resetCredits=async(uid,plan)=>{
    const cr = PLAN_CREDITS[plan||'free']||20000;
    await adjustCredits(uid,cr,'set');
    toast('Credits reset to plan default');
  };

  const changePlan=async(uid,plan)=>{
    const cr = PLAN_CREDITS[plan]||20000;
    const {error}=await supabase.from('profiles').update({plan,credits:cr,monthly_credits:cr}).eq('id',uid);
    if(!error){ setUsers(us=>us.map(x=>x.id===uid?{...x,plan,credits:cr}:x)); toast('Plan updated'); }
    else toast('Failed: '+error.message,'err');
  };

  const suspendUser=async(uid,suspended)=>{
    const {error}=await supabase.from('profiles').update({suspended}).eq('id',uid);
    if(!error){ setUsers(us=>us.map(x=>x.id===uid?{...x,suspended}:x)); toast(suspended?'User suspended':'User unsuspended'); }
    else toast('Failed','err');
  };

  const deleteUser=async(uid)=>{
    const {error}=await supabase.from('profiles').delete().eq('id',uid);
    if(!error){ setUsers(us=>us.filter(x=>x.id!==uid)); setSelectedUser(null); toast('User deleted'); }
    else toast('Failed: '+error.message,'err');
  };

  const badgeCls = (plan) => plan==='elite'||plan==='infinity' ? 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300' : plan==='pro' ? 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300' : 'bg-zinc-100 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400';

  return html`
  <div>
    <div className="text-[19px] font-[800] display flex items-center gap-2 mb-1"><${I} name="Users" size=${20}/> User Management</div>
    <div className="text-[12px] text-zinc-500 mb-4">${users.length} total users</div>

    <div className="flex gap-3 mb-4">
      <div className="relative flex-1 max-w-[400px]">
        <${I} name="Search" size=${14} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"/>
        <input value=${search} onChange=${e=>{ setSearch(e.target.value); setPage(0); }} placeholder="Search by name, email, username…" className="w-full pl-9 pr-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-[#1a1d2e] text-[12.5px] outline-none"/>
      </div>
      <div className="text-[12px] text-zinc-500 flex items-center">${filtered.length} results</div>
    </div>

    ${loading ? html`<div className="text-zinc-500 text-[12px]">Loading users…</div>` : html`
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] overflow-hidden mb-4">
        <div className="overflow-x-auto">
          <table className="w-full text-[12px]">
            <thead className="border-b border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-[#141727]">
              <tr>
                <th className="text-left px-4 py-3 text-zinc-500 font-[600]">User</th>
                <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Plan</th>
                <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Credits</th>
                <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Joined</th>
                <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Status</th>
                <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Actions</th>
              </tr>
            </thead>
            <tbody>
              ${paged.map(u=>html`
                <tr key=${u.id} className="border-b border-zinc-50 dark:border-zinc-900 hover:bg-zinc-50 dark:hover:bg-[#1e2236]">
                  <td className="px-4 py-3">
                    <div className="font-[600] truncate max-w-[180px]">${u.display_name||u.username||'—'}</div>
                    <div className="text-zinc-400 text-[11px] truncate max-w-[180px]">${u.email||u.id}</div>
                  </td>
                  <td className="px-4 py-3">
                    <span className=${`text-[10px] px-2 py-[3px] rounded-full font-[600] ${badgeCls(u.plan)}`}>${(u.plan||'free').toUpperCase()}</span>
                  </td>
                  <td className="px-4 py-3 font-[600]">${(u.credits||0).toLocaleString('en-IN')}</td>
                  <td className="px-4 py-3 text-zinc-500">${formatDate(u.created_at)}</td>
                  <td className="px-4 py-3">
                    <span className=${`text-[10px] px-2 py-[3px] rounded-full font-[600] ${u.suspended ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300'}`}>${u.suspended?'Suspended':'Active'}</span>
                  </td>
                  <td className="px-4 py-3">
                    <button onClick=${()=>setSelectedUser(u)} className="text-[#e8b04b] hover:underline text-[11px] font-[600]">Manage</button>
                  </td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>
      </div>
      ${pages>1 ? html`
        <div className="flex items-center gap-2 text-[12px]">
          <button onClick=${()=>setPage(p=>Math.max(0,p-1))} disabled=${page===0} className="px-3 py-[6px] rounded-lg border border-zinc-200 dark:border-zinc-700 disabled:opacity-40">← Prev</button>
          <span className="text-zinc-500">Page ${page+1} of ${pages}</span>
          <button onClick=${()=>setPage(p=>Math.min(pages-1,p+1))} disabled=${page===pages-1} className="px-3 py-[6px] rounded-lg border border-zinc-200 dark:border-zinc-700 disabled:opacity-40">Next →</button>
        </div>
      ` : null}
    `}

    ${selectedUser ? html`
      <div className="fixed inset-0 z-[500] bg-black/60 backdrop-blur-[3px] flex items-center justify-center p-4 overlay-in" onClick=${()=>setSelectedUser(null)}>
        <div className="modal-panel modal-in w-full max-w-[540px] rounded-[20px] p-6 max-h-[90vh] overflow-y-auto" onClick=${e=>e.stopPropagation()}>
          <div className="flex items-center justify-between mb-4">
            <div className="font-[700] text-[16px]">Manage User</div>
            <button onClick=${()=>setSelectedUser(null)} className="w-7 h-7 rounded-lg flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"><${I} name="X" size=${18}/></button>
          </div>
          <div className="flex items-center gap-3 p-3 bg-zinc-50 dark:bg-[#141727] rounded-xl mb-4">
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[#845bff] to-[#6236ff] flex items-center justify-center text-white font-[700]">${(selectedUser.display_name||selectedUser.email||'?')[0].toUpperCase()}</div>
            <div>
              <div className="font-[700] text-[14px]">${selectedUser.display_name||'—'}</div>
              <div className="text-[12px] text-zinc-500">${selectedUser.email||selectedUser.id}</div>
              <div className="text-[11px] text-zinc-400">Joined ${formatDate(selectedUser.created_at)}</div>
            </div>
          </div>

          <div className="space-y-4 text-[12.5px]">
            <div>
              <div className="font-[650] mb-2">Plan</div>
              <div className="flex gap-2 flex-wrap">
                ${['free','pro','elite'].map(pk=>html`
                  <button key=${pk} onClick=${()=>{ changePlan(selectedUser.id,pk); setSelectedUser(u=>({...u,plan:pk})); }} className=${`px-3 py-[7px] rounded-xl border text-[12px] font-[600] transition ${(selectedUser.plan||'free')===pk ? 'border-[#e8b04b] bg-[#fbf3e2] dark:bg-[#2a2413] text-[#b3822f] dark:text-[#e8b04b]' : 'border-zinc-200 dark:border-zinc-700'}`}>${pk.toUpperCase()}</button>
                `)}
              </div>
            </div>
            <div>
              <div className="font-[650] mb-2">Credits: ${(selectedUser.credits||0).toLocaleString('en-IN')}</div>
              <div className="flex gap-2">
                <input value=${creditAdj} onChange=${e=>setCreditAdj(e.target.value)} type="number" placeholder="Amount" className="flex-1 px-3 py-[7px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none"/>
                <button onClick=${()=>{ const n=parseInt(creditAdj)||0; adjustCredits(selectedUser.id,n,'add'); setSelectedUser(u=>({...u,credits:(u.credits||0)+n})); }} className="px-3 py-[7px] rounded-xl bg-emerald-500 text-white font-[600]">+Add</button>
                <button onClick=${()=>{ const n=parseInt(creditAdj)||0; adjustCredits(selectedUser.id,n,'remove'); setSelectedUser(u=>({...u,credits:Math.max(0,(u.credits||0)-n)})); }} className="px-3 py-[7px] rounded-xl bg-orange-500 text-white font-[600]">−Remove</button>
                <button onClick=${()=>{ resetCredits(selectedUser.id, selectedUser.plan); }} className="px-3 py-[7px] rounded-xl bg-zinc-500 text-white font-[600]">Reset</button>
              </div>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button onClick=${()=>{ suspendUser(selectedUser.id,!selectedUser.suspended); setSelectedUser(u=>({...u,suspended:!u.suspended})); }} className=${`px-4 py-[8px] rounded-xl text-[12px] font-[600] transition ${selectedUser.suspended ? 'bg-emerald-500 text-white' : 'bg-amber-500 text-white'}`}>
                ${selectedUser.suspended ? 'Unsuspend' : 'Suspend'}
              </button>
              <button onClick=${()=>setConfirm({msg:'Delete this user? This cannot be undone.', onConfirm:()=>deleteUser(selectedUser.id)})} className="px-4 py-[8px] rounded-xl bg-red-500 text-white text-[12px] font-[600]">Delete User</button>
            </div>
          </div>
        </div>
      </div>
    ` : null}
    ${confirm ? html`<${ConfirmDialog} title="Confirm" message=${confirm.msg} danger=${true} onConfirm=${confirm.onConfirm} onClose=${()=>setConfirm(null)}/>` : null}
  </div>`;
}

// --- Admin Subscriptions ---
function AdminSubscriptions({planConfig, setPlanConfig}){
  const [plans,setPlans]=useState({...planConfig});
  const [prices,setPrices]=useState({pro:299, elite:599});
  const [saving,setSaving]=useState(false);

  const save=async()=>{
    setSaving(true);
    await supabase.from('admin_config').upsert([
      {key:'plans', value:{free:{monthly_credits:plans.free}, pro:{monthly_credits:plans.pro,price:prices.pro}, elite:{monthly_credits:plans.elite||plans.infinity||1000000,price:prices.elite}}}
    ], {onConflict:'key'});
    setPlanConfig(plans);
    setSaving(false);
    toast('Subscription config saved');
  };

  return html`
  <div>
    <div className="text-[19px] font-[800] display flex items-center gap-2 mb-1"><${I} name="CreditCard" size=${20}/> Subscription Management</div>
    <div className="text-[12px] text-zinc-500 mb-5">Configure plans, credits, and pricing.</div>

    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
      ${[
        {k:'free',label:'Free',color:'#64748b'},
        {k:'pro',label:'Pro',color:'#e8b04b'},
        {k:'elite',label:'Elite',color:'#f59e0b'},
      ].map(({k,label,color})=>html`
        <div key=${k} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
          <div className="flex items-center gap-2 mb-4">
            <div className="w-8 h-8 rounded-[9px] flex items-center justify-center" style=${{background:color+'20'}}>
              <${I} name=${k==='free'?'Send':k==='pro'?'Zap':'Crown'} size=${16} style=${{color}}/>
            </div>
            <div className="font-[700] text-[14px]">${label}</div>
          </div>
          <div className="space-y-3">
            <div>
              <div className="text-[11px] text-zinc-500 mb-1">Monthly Credits</div>
              <input type="number" value=${plans[k]||0} onChange=${e=>setPlans(p=>({...p,[k]:parseInt(e.target.value)||0}))} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
            </div>
            ${k!=='free' ? html`
              <div>
                <div className="text-[11px] text-zinc-500 mb-1">Monthly Price (₹)</div>
                <input type="number" value=${prices[k]||0} onChange=${e=>setPrices(p=>({...p,[k]:parseInt(e.target.value)||0}))} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
              </div>
              <div className="p-3 bg-zinc-50 dark:bg-[#14182a] rounded-xl text-[11px] text-zinc-500">
                Yearly (20% off): <b className="text-zinc-700 dark:text-zinc-300">₹${Math.round((prices[k]||0)*12*0.8).toLocaleString('en-IN')}</b>
              </div>
            ` : null}
          </div>
        </div>
      `)}
    </div>
    <button onClick=${save} disabled=${saving} className="px-5 py-[10px] rounded-xl bg-[#e8b04b] text-white text-[13px] font-[600] disabled:opacity-60">${saving?'Saving…':'Save Plan Config'}</button>
  </div>`;
}

// --- Admin Credits ---
function AdminCredits({creditCosts, setCreditCosts, transactions}){
  const [costs,setCosts]=useState({...creditCosts});
  const [saving,setSaving]=useState(false);

  const save=async()=>{
    setSaving(true);
    await supabase.from('admin_config').upsert([{key:'credit_costs', value:costs}], {onConflict:'key'});
    setCreditCosts(costs);
    setSaving(false);
    toast('Credit costs saved');
  };

  const totalToday = transactions.filter(t=>new Date(t.created_at)>new Date(Date.now()-86400000)).reduce((s,t)=>s+(t.credits_spent||0),0);
  const totalAll = transactions.reduce((s,t)=>s+(t.credits_spent||0),0);
  const byFeature = {};
  transactions.forEach(t=>{ byFeature[t.feature]=(byFeature[t.feature]||0)+(t.credits_spent||0); });

  return html`
  <div>
    <div className="text-[19px] font-[800] display flex items-center gap-2 mb-1"><${I} name="Coins" size=${20}/> Credits Management</div>
    <div className="text-[12px] text-zinc-500 mb-5">Configure credit costs and view analytics.</div>

    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
        <div className="text-[11px] text-zinc-500">Total Credits Used</div>
        <div className="text-[20px] font-[800] display">${totalAll.toLocaleString()}</div>
      </div>
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
        <div className="text-[11px] text-zinc-500">Credits Today</div>
        <div className="text-[20px] font-[800] display">${totalToday.toLocaleString()}</div>
      </div>
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
        <div className="text-[11px] text-zinc-500">Transactions</div>
        <div className="text-[20px] font-[800] display">${transactions.length}</div>
      </div>
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
        <div className="text-[11px] text-zinc-500">Avg Per Request</div>
        <div className="text-[20px] font-[800] display">${transactions.length ? Math.round(totalAll/transactions.length) : 0}</div>
      </div>
    </div>

    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Credit Cost Configuration</div>
        ${Object.entries(costs).map(([k,v])=>html`
          <div key=${k} className="flex items-center justify-between mb-3">
            <span className="text-[12px] text-zinc-600 dark:text-zinc-300">${k.replace(/_/g,' ')}</span>
            <input type="number" value=${v} onChange=${e=>setCosts(c=>({...c,[k]:parseFloat(e.target.value)||0}))} className="w-28 px-3 py-[6px] rounded-lg border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] text-[12px] outline-none"/>
          </div>
        `)}
        <button onClick=${save} disabled=${saving} className="w-full mt-2 py-[9px] rounded-xl bg-[#e8b04b] text-white text-[12.5px] font-[600] disabled:opacity-60">${saving?'Saving…':'Save Costs'}</button>
      </div>
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Credits by Feature</div>
        ${Object.entries(byFeature).sort((a,b)=>b[1]-a[1]).map(([k,v])=>html`
          <div key=${k} className="flex items-center gap-3 mb-2">
            <div className="text-[11px] text-zinc-500 w-24 truncate">${k}</div>
            <div className="flex-1 h-[6px] bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
              <div className="h-full bg-[#e8b04b] rounded-full" style=${{width:Math.min(100,Math.round(v/Math.max(...Object.values(byFeature))*100))+'%'}}></div>
            </div>
            <div className="text-[11px] font-[600]">${v.toLocaleString()}</div>
          </div>
        `)}

// --- Admin Notifications ---
function AdminNotifications(){
  const [msg,setMsg]=useState('');
  const [title,setNTitle]=useState('');
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState([]);

  const sendAnnouncement=async()=>{
    if(!title.trim()||!msg.trim()) return toast('Enter title and message','err');
    setSending(true);
    const {data:profiles}=await supabase.from('profiles').select('id');
    if(profiles&&profiles.length>0){
      const rows=profiles.map(p=>({user_id:p.id, title, body:msg, read:false}));
      await supabase.from('notifications').insert(rows);
    }
    setSent(s=>[{id:uid('n'),title,body:msg,sent_at:new Date().toISOString(),recipients:profiles?.length||0},...s]);
    setNTitle(''); setMsg(''); setSending(false);
    toast(`Announcement sent to ${profiles?.length||0} users`);
  };

  return html`
  <div>
    <div className="text-[19px] font-[800] display flex items-center gap-2 mb-1"><${I} name="BellRing" size=${20}/> Notifications</div>
    <div className="text-[12px] text-zinc-500 mb-5">Send announcements and alerts to all users.</div>

    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5 max-w-[640px] mb-5">
      <div className="font-[650] text-[13px] mb-3">Send Announcement</div>
      <div className="space-y-3">
        <div>
          <div className="text-[11px] text-zinc-500 mb-1">Title</div>
          <input value=${title} onChange=${e=>setNTitle(e.target.value)} placeholder="e.g. New Feature Available" className="w-full px-3 py-[9px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
        </div>
        <div>
          <div className="text-[11px] text-zinc-500 mb-1">Message</div>
          <textarea value=${msg} onChange=${e=>setMsg(e.target.value)} placeholder="Your announcement message…" className="w-full h-[100px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"></textarea>
        </div>
        <button onClick=${sendAnnouncement} disabled=${sending} className="px-5 py-[10px] rounded-xl bg-[#e8b04b] text-white text-[13px] font-[600] disabled:opacity-60">${sending?'Sending…':'Send to All Users'}</button>
      </div>
    </div>

    ${sent.length>0 ? html`
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5 max-w-[640px]">
        <div className="font-[650] text-[13px] mb-3">Sent Announcements (This Session)</div>
        <div className="space-y-2">
          ${sent.map(s=>html`
            <div key=${s.id} className="p-3 border border-zinc-100 dark:border-zinc-800 rounded-xl text-[12px]">
              <div className="font-[600]">${s.title}</div>
              <div className="text-zinc-500 text-[11px]">${s.body}</div>
              <div className="text-zinc-400 text-[10px] mt-1">Sent to ${s.recipients} users • ${new Date(s.sent_at).toLocaleString()}</div>
            </div>
          `)}
        </div>
      </div>
    ` : null}
  </div>`;
}

// ---------- ZedithPicksView (user-facing) ----------
function ZedithPicksView(){
  const [products,setProducts]=useState([]);
  const [categories,setCategories]=useState([]);
  const [ads,setAds]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [activeCategory,setActiveCategory]=useState('All');
  const [sortBy,setSortBy]=useState('featured'); // featured | new | popular
  const [selected,setSelected]=useState(null);

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const [{data:prods,error:pErr},{data:cats},{data:adRows}] = await Promise.all([
        supabase.from('picks_products').select('*').eq('status','published').order('display_order',{ascending:true}),
        supabase.from('picks_categories').select('*').order('display_order',{ascending:true}),
        supabase.from('picks_ads').select('*').eq('is_enabled',true).order('display_order',{ascending:true}),
      ]);
      if(pErr) console.error('picks load error:', pErr);
      setProducts(prods||[]);
      setCategories(cats||[]);
      setAds(adRows||[]);
      setLoading(false);
    };
    load();
  },[]);

  const catName = (id) => categories.find(c=>c.id===id)?.name || 'Other';

  const filtered = products.filter(p=>{
    const q = search.toLowerCase();
    const matchesSearch = !q || p.name.toLowerCase().includes(q) || (p.short_description||'').toLowerCase().includes(q) || (p.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchesCategory = activeCategory==='All' || catName(p.category_id)===activeCategory;
    return matchesSearch && matchesCategory;
  });

  const sorted = [...filtered].sort((a,b)=>{
    if(sortBy==='new') return new Date(b.created_at)-new Date(a.created_at);
    if(sortBy==='popular') return (b.views||0)-(a.views||0);
    // featured first, then pinned, then display_order
    return (b.is_featured?1:0)-(a.is_featured?1:0) || (b.is_pinned?1:0)-(a.is_pinned?1:0) || a.display_order-b.display_order;
  });

  const logEvent = async (productId, eventType) => {
    try{ await supabase.from('picks_events').insert({product_id:productId, event_type:eventType}); }catch(e){}
  };

  const openProduct = (p) => { setSelected(p); logEvent(p.id,'view'); supabase.rpc('increment_picks_counter',{p_table:'picks_products',p_id:p.id,p_column:'views'}); };
  const clickWebsite = (p) => { logEvent(p.id,'website_click'); supabase.rpc('increment_picks_counter',{p_table:'picks_products',p_id:p.id,p_column:'website_clicks'}); window.open(p.official_url,'_blank'); };
  const clickAffiliate = (p) => { logEvent(p.id,'affiliate_click'); supabase.rpc('increment_picks_counter',{p_table:'picks_products',p_id:p.id,p_column:'affiliate_clicks'}); window.open(p.affiliate_url,'_blank'); };
  const clickAd = (ad) => { supabase.rpc('increment_picks_counter',{p_table:'picks_ads',p_id:ad.id,p_column:'clicks'}); if(ad.link_url) window.open(ad.link_url,'_blank'); };

  const badge = (text,color) => html`<span className="text-[9.5px] px-[7px] py-[2px] rounded-full font-[700] uppercase tracking-wide" style=${{background:color+'20',color}}>${text}</span>`;

  const ProductCard = ({p}) => html`
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 hover:border-[#7c5cff] transition flex flex-col fade-in">
      <div className="flex items-start gap-3 mb-3">
        <div className="w-11 h-11 rounded-[11px] bg-zinc-100 dark:bg-[#141727] flex items-center justify-center overflow-hidden shrink-0">
          ${p.logo_url ? html`<img src=${p.logo_url} alt=${p.name} className="w-full h-full object-cover"/>` : html`<${I} name="Sparkles" size=${18} className="text-[#7c5cff]"/>`}
        </div>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5 flex-wrap">
            <div className="font-[700] text-[14px] truncate">${p.name}</div>
            ${p.is_featured ? badge('Featured','#f59e0b') : null}
            ${p.is_new ? badge('New','#10b981') : null}
            ${p.is_sponsored ? badge('Sponsored','#7c5cff') : null}
          </div>
          <div className="text-[11px] text-zinc-400">${catName(p.category_id)}</div>
        </div>
      </div>
      <div className="text-[12.5px] text-zinc-600 dark:text-zinc-400 mb-3 line-clamp-2 flex-1">${p.short_description}</div>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-1 text-[12px] text-amber-500 font-[600]">
          <${I} name="Star" size=${13} className="fill-amber-400 text-amber-400"/> ${(p.rating||0).toFixed(1)}
        </div>
        <div className="text-[11px] text-zinc-500 font-[600]">${p.pricing_info||'—'}</div>
      </div>
      <div className="flex gap-2">
        <button onClick=${()=>openProduct(p)} className="flex-1 py-[7px] rounded-[10px] border border-zinc-200 dark:border-zinc-700 text-[12px] font-[600] hover:bg-zinc-50 dark:hover:bg-[#151828] transition">Learn More</button>
        <button onClick=${()=>clickWebsite(p)} className="flex-1 py-[7px] rounded-[10px] bg-[#7c5cff] text-white text-[12px] font-[600] hover:bg-[#6d48f5] transition">Visit Site</button>
      </div>
    </div>`;

  const Skeleton = () => html`

      <div className="flex items-center gap-3 mb-3">

          <div className="text-[12.5px] font-[600]">${ad.title}</div>
        </button>
      `}

  return html`

    <div className="flex-1 overflow-y-auto">
      <div className="h-[54px] px-4 flex items-center justify-between border-b border-zinc-200 dark:border-[#23283f] bg-white/85 dark:bg-[#141620]/90 backdrop-blur sticky top-0 z-10">

function AdminPicks(){
  const [tab,setTab]=useState('products'); // products | categories | analytics
  const [products,setProducts]=useState([]);
  const [categories,setCategories]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null); // product being edited, or 'new'
  const [confirm,setConfirm]=useState(null);

  const load=async()=>{
    setLoading(true);
    const [{data:prods},{data:cats}] = await Promise.all([
      supabase.from('picks_products').select('*').order('display_order',{ascending:true}),
      supabase.from('picks_categories').select('*').order('display_order',{ascending:true}),
    ]);
    setProducts(prods||[]); setCategories(cats||[]);
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const catName = (id) => categories.find(c=>c.id===id)?.name || '—';

  const deleteProduct=async(id)=>{
    const {error}=await supabase.from('picks_products').delete().eq('id',id);
    if(!error){ setProducts(p=>p.filter(x=>x.id!==id)); toast('Product deleted'); } else toast('Failed: '+error.message,'err');
  };

  const duplicateProduct=async(p)=>{
    const {id,created_at,updated_at,views,website_clicks,affiliate_clicks,...rest}=p;
    const {data,error}=await supabase.from('picks_products').insert({...rest, name:rest.name+' (Copy)', status:'draft'}).select().single();
    if(!error){ setProducts(ps=>[data,...ps]); toast('Product duplicated'); } else toast('Failed: '+error.message,'err');
  };

  const toggleStatus=async(p,newStatus)=>{
    const {error}=await supabase.from('picks_products').update({status:newStatus}).eq('id',p.id);
    if(!error){ setProducts(ps=>ps.map(x=>x.id===p.id?{...x,status:newStatus}:x)); toast('Status updated'); } else toast('Failed','err');
  };

  const statusColor={published:'#10b981',draft:'#71717a',scheduled:'#f59e0b',hidden:'#ef4444'};

  return html`
  <div>
    <div className="text-[19px] font-[800] display flex items-center gap-2 mb-1"><${I} name="Compass" size=${20}/> Zedith Picks</div>
    <div className="text-[12px] text-zinc-500 mb-5">Manage recommended products, categories, and analytics.</div>

    <div className="flex gap-4 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-5">
      ${[['products','Products'],['categories','Categories'],['analytics','Analytics']].map(([id,label])=>html`
        <button key=${id} onClick=${()=>setTab(id)} className=${`pb-[10px] ${tab===id?'text-[#e8b04b] border-b-2 border-[#e8b04b] font-[600]':'text-zinc-500'}`}>${label}</button>
      `)}
    </div>

    ${tab==='products' ? html`
      <div className="flex justify-between items-center mb-4">
        <div className="text-[12px] text-zinc-500">${products.length} products</div>
        <button onClick=${()=>setEditing('new')} className="px-4 py-[8px] rounded-xl bg-[#e8b04b] text-white text-[12.5px] font-[600] flex items-center gap-1.5"><${I} name="Plus" size=${14}/>Add Product</button>
      </div>

      ${loading ? html`<div className="text-zinc-500 text-[12px]">Loading…</div>` : html`
        <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-[12px]">
              <thead className="border-b border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-[#141727]">
                <tr>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Product</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Category</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Status</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Views</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Clicks</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Actions</th>
                </tr>
              </thead>
              <tbody>
                ${products.map(p=>html`
                  <tr key=${p.id} className="border-b border-zinc-50 dark:border-zinc-900 hover:bg-zinc-50 dark:hover:bg-[#1e2236]">
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <div className="w-7 h-7 rounded-lg bg-zinc-100 dark:bg-[#141727] flex items-center justify-center overflow-hidden shrink-0">
                          ${p.logo_url ? html`<img src=${p.logo_url} className="w-full h-full object-cover"/>` : html`<${I} name="Sparkles" size=${12} className="text-[#e8b04b]"/>`}
                        </div>
                        <div className="font-[600] truncate max-w-[160px]">${p.name}</div>
                        ${p.is_featured ? html`<${I} name="Star" size=${12} className="text-amber-400 fill-amber-400"/>`:null}
                      </div>
                    </td>
                    <td className="px-4 py-3 text-zinc-500">${catName(p.category_id)}</td>
                    <td className="px-4 py-3">
                      <span className="text-[10px] px-2 py-[3px] rounded-full font-[600]" style=${{background:statusColor[p.status]+'20',color:statusColor[p.status]}}>${p.status}</span>
                    </td>
                    <td className="px-4 py-3">${p.views||0}</td>
                    <td className="px-4 py-3">${(p.website_clicks||0)+(p.affiliate_clicks||0)}</td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <button onClick=${()=>setEditing(p)} className="text-[#e8b04b] hover:underline text-[11px] font-[600]">Edit</button>
                        <button onClick=${()=>duplicateProduct(p)} className="text-zinc-500 hover:underline text-[11px] font-[600]">Duplicate</button>
                        ${p.status==='published' ? html`<button onClick=${()=>toggleStatus(p,'hidden')} className="text-amber-600 hover:underline text-[11px] font-[600]">Hide</button>` : html`<button onClick=${()=>toggleStatus(p,'published')} className="text-emerald-600 hover:underline text-[11px] font-[600]">Publish</button>`}
                        <button onClick=${()=>setConfirm({msg:'Delete '+p.name+'? This cannot be undone.', onConfirm:()=>deleteProduct(p.id)})} className="text-red-500 hover:underline text-[11px] font-[600]">Delete</button>
                      </div>
                    </td>
                  </tr>
                `)}
                ${products.length===0 ? html`<tr><td colSpan="6" className="px-4 py-8 text-center text-zinc-400">No products yet. Click "Add Product" to create one.</td></tr>`:null}
              </tbody>
            </table>
          </div>
        </div>
      `}
    `:null}

    ${tab==='categories' ? html`<${AdminPicksCategories} categories=${categories} setCategories=${setCategories}/>`:null}
    ${tab==='analytics' ? html`<${AdminPicksAnalytics} products=${products} catName=${catName}/>`:null}

    ${editing ? html`<${AdminPicksProductForm} product=${editing==='new'?null:editing} categories=${categories} onClose=${()=>setEditing(null)} onSaved=${(p)=>{ load(); setEditing(null); }}/>`:null}
    ${confirm ? html`<${ConfirmDialog} title="Confirm" message=${confirm.msg} danger=${true} onConfirm=${confirm.onConfirm} onClose=${()=>setConfirm(null)}/>`:null}
  </div>`;
}

    const {data,error}=await supabase.from('picks_categories').insert({name:newName.trim(), icon:newIcon, display_order:categories.length}).select().single();
    if(!error){ setCategories(c=>[...c,data]); setNewName(''); toast('Category added'); } else toast('Failed: '+error.message,'err');

  const deleteCategory=async(id)=>{
    const {error}=await supabase.from('picks_categories').delete().eq('id',id);

  return html`
  <div>
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5 mb-5">

        <input value=${newIcon} onChange=${e=>setNewIcon(e.target.value)} placeholder="Lucide icon name" className="w-[160px] px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
        <button onClick=${addCategory} className="px-4 py-[8px] rounded-xl bg-[#e8b04b] text-white text-[12.5px] font-[600]">Add</button>
      </div>
    </div>
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] overflow-hidden">
      <table className="w-full text-[12px]">
        <thead className="border-b border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-[#141727]">
          <tr><th className="text-left px-4 py-3 text-zinc-500 font-[600]">Name</th><th className="text-left px-4 py-3 text-zinc-500 font-[600]">Icon</th><th className="text-left px-4 py-3 text-zinc-500 font-[600]">Actions</th></tr>
        </thead>
        <tbody>
          ${categories.map(c=>html`
            <tr key=${c.id} className="border-b border-zinc-50 dark:border-zinc-900">
              <td className="px-4 py-3 font-[600] flex items-center gap-2"><${I} name=${c.icon} size=${14} className="text-[#e8b04b]"/>${c.name}</td>
              <td className="px-4 py-3 text-zinc-500">${c.icon}</td>
              <td className="px-4 py-3"><button onClick=${()=>deleteCategory(c.id)} className="text-red-500 hover:underline text-[11px] font-[600]">Delete</button></td>
            </tr>
          `)}
        </tbody>
      </table>
    </div>
  </div>`;
}

function AdminPicksAnalytics({products,catName}){
  const totalViews = products.reduce((s,p)=>s+(p.views||0),0);
  const totalWebsiteClicks = products.reduce((s,p)=>s+(p.website_clicks||0),0);
  const totalAffiliateClicks = products.reduce((s,p)=>s+(p.affiliate_clicks||0),0);
  const conversionRate = totalViews>0 ? ((totalWebsiteClicks+totalAffiliateClicks)/totalViews*100).toFixed(1) : '0.0';
  const topProducts = [...products].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,5);
  const mostClicked = [...products].sort((a,b)=>((b.website_clicks||0)+(b.affiliate_clicks||0))-((a.website_clicks||0)+(a.affiliate_clicks||0))).slice(0,5);

  const card = (title,value,icon,color) => html`
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
      <div className="flex items-center justify-between mb-2">
        <div className="text-[11px] text-zinc-500 font-[600] uppercase tracking-wide">${title}</div>
        <div className="w-8 h-8 rounded-[9px] flex items-center justify-center" style=${{background:color+'20'}}><${I} name=${icon} size=${15} style=${{color}}/></div>
      </div>
      <div className="text-[22px] font-[800] display">${value}</div>
    </div>`;

  return html`
  <div>
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
      ${card('Total Views',totalViews.toLocaleString(),'Eye','#e8b04b')}
      ${card('Website Clicks',totalWebsiteClicks.toLocaleString(),'ExternalLink','#10b981')}
      ${card('Affiliate Clicks',totalAffiliateClicks.toLocaleString(),'Link','#f59e0b')}
      ${card('Conversion Rate',conversionRate+'%','TrendingUp','#3b82f6')}
    </div>
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Top Viewed Products</div>
        ${topProducts.length===0 ? html`<div className="text-[12px] text-zinc-500">No data yet.</div>` : topProducts.map(p=>html`
          <div key=${p.id} className="flex items-center justify-between text-[12px] mb-2">
            <span className="truncate max-w-[70%]">${p.name}</span><span className="font-[600] text-zinc-500">${p.views||0} views</span>
          </div>
        `)}
      </div>
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Most Clicked Products</div>
        ${mostClicked.length===0 ? html`<div className="text-[12px] text-zinc-500">No data yet.</div>` : mostClicked.map(p=>html`
          <div key=${p.id} className="flex items-center justify-between text-[12px] mb-2">
            <span className="truncate max-w-[70%]">${p.name}</span><span className="font-[600] text-zinc-500">${(p.website_clicks||0)+(p.affiliate_clicks||0)} clicks</span>
          </div>
        `)}
      </div>
    </div>
  </div>`;
}

function AdminPicksProductForm({product,categories,onClose,onSaved}){
  const isNew = !product;
  const [form,setForm]=useState(product ? {
    ...product,
    features: (product.features||[]).join('\n'),
    tags: (product.tags||[]).join(', '),
  } : {
    name:'', logo_url:'', banner_url:'', category_id: categories[0]?.id||'',
    short_description:'', full_description:'', features:'', why_recommended:'',
    official_url:'', affiliate_url:'', pricing_info:'', rating:4.5, tags:'',
    is_featured:false, is_sponsored:false, is_new:true, is_pinned:false,
    display_order:0, status:'draft', notes:'',
  });
  const [saving,setSaving]=useState(false);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=async()=>{
    if(!form.name.trim()) return toast('Product name is required','err');
    setSaving(true);
    const payload = {
      name:form.name, logo_url:form.logo_url, banner_url:form.banner_url, category_id:form.category_id||null,
      short_description:form.short_description, full_description:form.full_description,
      features: form.features.split('\n').map(s=>s.trim()).filter(Boolean),
      why_recommended:form.why_recommended, official_url:form.official_url, affiliate_url:form.affiliate_url,
      pricing_info:form.pricing_info, rating:parseFloat(form.rating)||0,
      tags: form.tags.split(',').map(s=>s.trim()).filter(Boolean),
      is_featured:!!form.is_featured, is_sponsored:!!form.is_sponsored, is_new:!!form.is_new, is_pinned:!!form.is_pinned,
      display_order:parseInt(form.display_order)||0, status:form.status, notes:form.notes,
      updated_at:new Date().toISOString(),
    };
    const {error} = isNew
      ? await supabase.from('picks_products').insert(payload)
      : await supabase.from('picks_products').update(payload).eq('id',product.id);
    setSaving(false);
    if(error) return toast('Failed: '+error.message,'err');
    toast(isNew?'Product created':'Product updated');
    onSaved();
  };

  const field = (label,key,type='text') => html`
    <div>
      <div className="text-[11px] text-zinc-500 mb-1">${label}</div>
      <input type=${type} value=${form[key]??''} onChange=${e=>set(key,e.target.value)} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
    </div>`;

  const toggle = (label,key) => html`
    <div className="flex items-center justify-between">
      <span className="text-[12.5px] text-zinc-700 dark:text-zinc-300">${label}</span>
      <button onClick=${()=>set(key,!form[key])} className=${`w-10 h-5 rounded-full relative transition ${form[key]?'bg-[#e8b04b]':'bg-zinc-300 dark:bg-zinc-700'}`}>
        <span className=${`absolute top-[2px] w-4 h-4 rounded-full bg-white shadow transition-all ${form[key]?'left-[22px]':'left-[2px]'}`}></span>
      </button>
    </div>`;

  return html`
  <div className="fixed inset-0 z-[500] bg-black/60 backdrop-blur-[3px] flex items-center justify-center p-4 overlay-in" onClick=${onClose}>
