// ---------- ZedithPicksView (user-facing) ----------
function ZedithPicksView(){
  const [products,setProducts]=useState([]);
  const [categories,setCategories]=useState([]);
  const [ads,setAds]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [activeCategory,setActiveCategory]=useState('All');
  const [sortBy,setSortBy]=useState('featured'); // featured | new | popular
  const [selected,setSelected]=useState(null);

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const [{data:prods,error:pErr},{data:cats},{data:adRows}] = await Promise.all([
        supabase.from('picks_products').select('*').eq('status','published').order('display_order',{ascending:true}),
        supabase.from('picks_categories').select('*').order('display_order',{ascending:true}),
        supabase.from('picks_ads').select('*').eq('is_enabled',true).order('display_order',{ascending:true}),
      ]);
      if(pErr) console.error('picks load error:', pErr);
      setProducts(prods||[]);
      setCategories(cats||[]);
      setAds(adRows||[]);
      setLoading(false);
    };
    load();
  },[]);

  const catName = (id) => categories.find(c=>c.id===id)?.name || 'Other';

  const filtered = products.filter(p=>{
    const q = search.toLowerCase();
    const matchesSearch = !q || p.name.toLowerCase().includes(q) || (p.short_description||'').toLowerCase().includes(q) || (p.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchesCategory = activeCategory==='All' || catName(p.category_id)===activeCategory;
    return matchesSearch && matchesCategory;
  });

  const sorted = [...filtered].sort((a,b)=>{
    if(sortBy==='new') return new Date(b.created_at)-new Date(a.created_at);
    if(sortBy==='popular') return (b.views||0)-(a.views||0);
    // featured first, then pinned, then display_order
    return (b.is_featured?1:0)-(a.is_featured?1:0) || (b.is_pinned?1:0)-(a.is_pinned?1:0) || a.display_order-b.display_order;
  });

  const logEvent = async (productId, eventType) => {
    try{ await supabase.from('picks_events').insert({product_id:productId, event_type:eventType}); }catch(e){}
  };

  const openProduct = (p) => { setSelected(p); logEvent(p.id,'view'); supabase.rpc('increment_picks_counter',{p_table:'picks_products',p_id:p.id,p_column:'views'}); };
  const clickWebsite = (p) => { logEvent(p.id,'website_click'); supabase.rpc('increment_picks_counter',{p_table:'picks_products',p_id:p.id,p_column:'website_clicks'}); window.open(p.official_url,'_blank'); };
  const clickAffiliate = (p) => { logEvent(p.id,'affiliate_click'); supabase.rpc('increment_picks_counter',{p_table:'picks_products',p_id:p.id,p_column:'affiliate_clicks'}); window.open(p.affiliate_url,'_blank'); };
  const clickAd = (ad) => { supabase.rpc('increment_picks_counter',{p_table:'picks_ads',p_id:ad.id,p_column:'clicks'}); if(ad.link_url) window.open(ad.link_url,'_blank'); };

  const badge = (text,color) => html`<span className="text-[9.5px] px-[7px] py-[2px] rounded-full font-[700] uppercase tracking-wide" style=${{background:color+'20',color}}>${text}</span>`;

  const ProductCard = ({p}) => html`
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 hover:border-[#7c5cff] transition flex flex-col fade-in">
      <div className="flex items-start gap-3 mb-3">
        <div className="w-11 h-11 rounded-[11px] bg-zinc-100 dark:bg-[#141727] flex items-center justify-center overflow-hidden shrink-0">
          ${p.logo_url ? html`<img src=${p.logo_url} alt=${p.name} className="w-full h-full object-cover"/>` : html`<${I} name="Sparkles" size=${18} className="text-[#7c5cff]"/>`}
        </div>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5 flex-wrap">
            <div className="font-[700] text-[14px] truncate">${p.name}</div>
            ${p.is_featured ? badge('Featured','#f59e0b') : null}
            ${p.is_new ? badge('New','#10b981') : null}
            ${p.is_sponsored ? badge('Sponsored','#7c5cff') : null}
          </div>
          <div className="text-[11px] text-zinc-400">${catName(p.category_id)}</div>
        </div>
      </div>
      <div className="text-[12.5px] text-zinc-600 dark:text-zinc-400 mb-3 line-clamp-2 flex-1">${p.short_description}</div>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-1 text-[12px] text-amber-500 font-[600]">
          <${I} name="Star" size=${13} className="fill-amber-400 text-amber-400"/> ${(p.rating||0).toFixed(1)}
        </div>
        <div className="text-[11px] text-zinc-500 font-[600]">${p.pricing_info||'—'}</div>
      </div>
      <div className="flex gap-2">
        <button onClick=${()=>openProduct(p)} className="flex-1 py-[7px] rounded-[10px] border border-zinc-200 dark:border-zinc-700 text-[12px] font-[600] hover:bg-zinc-50 dark:hover:bg-[#151828] transition">Learn More</button>
        <button onClick=${()=>clickWebsite(p)} className="flex-1 py-[7px] rounded-[10px] bg-[#7c5cff] text-white text-[12px] font-[600] hover:bg-[#6d48f5] transition">Visit Site</button>
      </div>
    </div>`;

  const Skeleton = () => html`
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
      <div className="flex items-center gap-3 mb-3">
        <div className="w-11 h-11 rounded-[11px] shimmer"></div>
        <div className="flex-1 space-y-2"><div className="h-3 w-2/3 rounded shimmer"></div><div className="h-2 w-1/3 rounded shimmer"></div></div>
      </div>
      <div className="h-2 w-full rounded shimmer mb-2"></div>
      <div className="h-2 w-4/5 rounded shimmer mb-4"></div>
      <div className="h-8 w-full rounded-[10px] shimmer"></div>
    </div>`;

  const AdPanel = ({ad}) => html`
    <div className="bg-white dark:bg-[#181b2b] border border-zinc-200 dark:border-[#262b44] rounded-[14px] p-3 overflow-hidden">
      <div className="text-[9px] text-zinc-400 uppercase tracking-wide mb-2 font-[700]">Sponsored</div>

        <button onClick=${()=>clickAd(ad)} className="block w-full text-left">
          ${ad.image_url ? html`<img src=${ad.image_url} alt=${ad.title} className="w-full rounded-[10px] mb-2"/>` : null}
          <div className="text-[12.5px] font-[600]">${ad.title}</div>
        </button>
      `}
    </div>`;

  return html`
  <div className="flex-1 h-full flex overflow-hidden bg-[#fbfbfe] dark:bg-[#141620]">
    <div className="flex-1 overflow-y-auto">
      <div className="h-[54px] px-4 flex items-center justify-between border-b border-zinc-200 dark:border-[#23283f] bg-white/85 dark:bg-[#141620]/90 backdrop-blur sticky top-0 z-10">
        <div className="flex items-center gap-2">
          <${I} name="Compass" size=${18} className="text-[#7c5cff]"/>
          <span className="font-[700] text-[14px] display">Zedith Picks</span>
        </div>
        <div className="text-[11px] text-zinc-400">${sorted.length} tools</div>

      <div className="p-5 max-w-[1100px] mx-auto">

function AdminPicks(){
  const [tab,setTab]=useState('products'); // products | categories | analytics
  const [products,setProducts]=useState([]);
  const [categories,setCategories]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null); // product being edited, or 'new'
  const [confirm,setConfirm]=useState(null);

  const load=async()=>{
    setLoading(true);
    const [{data:prods},{data:cats}] = await Promise.all([
      supabase.from('picks_products').select('*').order('display_order',{ascending:true}),
      supabase.from('picks_categories').select('*').order('display_order',{ascending:true}),
    ]);
    setProducts(prods||[]); setCategories(cats||[]);
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const catName = (id) => categories.find(c=>c.id===id)?.name || '—';

  const deleteProduct=async(id)=>{
    const {error}=await supabase.from('picks_products').delete().eq('id',id);
    if(!error){ setProducts(p=>p.filter(x=>x.id!==id)); toast('Product deleted'); } else toast('Failed: '+error.message,'err');
  };

  const duplicateProduct=async(p)=>{
    const {id,created_at,updated_at,views,website_clicks,affiliate_clicks,...rest}=p;
    const {data,error}=await supabase.from('picks_products').insert({...rest, name:rest.name+' (Copy)', status:'draft'}).select().single();
    if(!error){ setProducts(ps=>[data,...ps]); toast('Product duplicated'); } else toast('Failed: '+error.message,'err');
  };

  const toggleStatus=async(p,newStatus)=>{
    const {error}=await supabase.from('picks_products').update({status:newStatus}).eq('id',p.id);
    if(!error){ setProducts(ps=>ps.map(x=>x.id===p.id?{...x,status:newStatus}:x)); toast('Status updated'); } else toast('Failed','err');
  };

  const statusColor={published:'#10b981',draft:'#71717a',scheduled:'#f59e0b',hidden:'#ef4444'};

  return html`
  <div>
    <div className="text-[19px] font-[800] display flex items-center gap-2 mb-1"><${I} name="Compass" size=${20}/> Zedith Picks</div>
    <div className="text-[12px] text-zinc-500 mb-5">Manage recommended products, categories, and analytics.</div>

    <div className="flex gap-4 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-5">
      ${[['products','Products'],['categories','Categories'],['analytics','Analytics']].map(([id,label])=>html`
        <button key=${id} onClick=${()=>setTab(id)} className=${`pb-[10px] ${tab===id?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${label}</button>
      `)}
    </div>

    ${tab==='products' ? html`
      <div className="flex justify-between items-center mb-4">
        <div className="text-[12px] text-zinc-500">${products.length} products</div>
        <button onClick=${()=>setEditing('new')} className="px-4 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12.5px] font-[600] flex items-center gap-1.5"><${I} name="Plus" size=${14}/>Add Product</button>
      </div>

      ${loading ? html`<div className="text-zinc-500 text-[12px]">Loading…</div>` : html`
        <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-[12px]">
              <thead className="border-b border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-[#141727]">
                <tr>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Product</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Category</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Status</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Views</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Clicks</th>
                  <th className="text-left px-4 py-3 text-zinc-500 font-[600]">Actions</th>
                </tr>
              </thead>
              <tbody>
                ${products.map(p=>html`
                  <tr key=${p.id} className="border-b border-zinc-50 dark:border-zinc-900 hover:bg-zinc-50 dark:hover:bg-[#1e2236]">
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <div className="w-7 h-7 rounded-lg bg-zinc-100 dark:bg-[#141727] flex items-center justify-center overflow-hidden shrink-0">
                          ${p.logo_url ? html`<img src=${p.logo_url} className="w-full h-full object-cover"/>` : html`<${I} name="Sparkles" size=${12} className="text-[#7c5cff]"/>`}
                        </div>
                        <div className="font-[600] truncate max-w-[160px]">${p.name}</div>
                        ${p.is_featured ? html`<${I} name="Star" size=${12} className="text-amber-400 fill-amber-400"/>`:null}
                      </div>
                    </td>
                    <td className="px-4 py-3 text-zinc-500">${catName(p.category_id)}</td>
                    <td className="px-4 py-3">
                      <span className="text-[10px] px-2 py-[3px] rounded-full font-[600]" style=${{background:statusColor[p.status]+'20',color:statusColor[p.status]}}>${p.status}</span>
                    </td>
                    <td className="px-4 py-3">${p.views||0}</td>
                    <td className="px-4 py-3">${(p.website_clicks||0)+(p.affiliate_clicks||0)}</td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <button onClick=${()=>setEditing(p)} className="text-[#7c5cff] hover:underline text-[11px] font-[600]">Edit</button>
                        <button onClick=${()=>duplicateProduct(p)} className="text-zinc-500 hover:underline text-[11px] font-[600]">Duplicate</button>
                        ${p.status==='published' ? html`<button onClick=${()=>toggleStatus(p,'hidden')} className="text-amber-600 hover:underline text-[11px] font-[600]">Hide</button>` : html`<button onClick=${()=>toggleStatus(p,'published')} className="text-emerald-600 hover:underline text-[11px] font-[600]">Publish</button>`}
                        <button onClick=${()=>setConfirm({msg:'Delete '+p.name+'? This cannot be undone.', onConfirm:()=>deleteProduct(p.id)})} className="text-red-500 hover:underline text-[11px] font-[600]">Delete</button>
                      </div>
                    </td>
                  </tr>
                `)}
                ${products.length===0 ? html`<tr><td colSpan="6" className="px-4 py-8 text-center text-zinc-400">No products yet. Click "Add Product" to create one.</td></tr>`:null}
              </tbody>
            </table>
          </div>
        </div>
      `}
    `:null}

    ${tab==='categories' ? html`<${AdminPicksCategories} categories=${categories} setCategories=${setCategories}/>`:null}
    ${tab==='analytics' ? html`<${AdminPicksAnalytics} products=${products} catName=${catName}/>`:null}

    ${editing ? html`<${AdminPicksProductForm} product=${editing==='new'?null:editing} categories=${categories} onClose=${()=>setEditing(null)} onSaved=${(p)=>{ load(); setEditing(null); }}/>`:null}
    ${confirm ? html`<${ConfirmDialog} title="Confirm" message=${confirm.msg} danger=${true} onConfirm=${confirm.onConfirm} onClose=${()=>setConfirm(null)}/>`:null}
  </div>`;
}

function AdminPicksCategories({categories,setCategories}){

  const [newIcon,setNewIcon]=useState('Sparkles');

  const addCategory=async()=>{
    if(!newName.trim()) return toast('Enter a category name','err');
    const {data,error}=await supabase.from('picks_categories').insert({name:newName.trim(), icon:newIcon, display_order:categories.length}).select().single();
    if(!error){ setCategories(c=>[...c,data]); setNewName(''); toast('Category added'); } else toast('Failed: '+error.message,'err');
  };

  const deleteCategory=async(id)=>{
    const {error}=await supabase.from('picks_categories').delete().eq('id',id);
    if(!error){ setCategories(c=>c.filter(x=>x.id!==id)); toast('Category deleted'); } else toast('Failed: '+error.message,'err');
  };

  return html`
  <div>
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5 mb-5">
      <div className="font-[650] text-[13px] mb-3">Add Category</div>
      <div className="flex gap-2">
        <input value=${newName} onChange=${e=>setNewName(e.target.value)} placeholder="Category name" className="flex-1 px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
        <input value=${newIcon} onChange=${e=>setNewIcon(e.target.value)} placeholder="Lucide icon name" className="w-[160px] px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
        <button onClick=${addCategory} className="px-4 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12.5px] font-[600]">Add</button>
      </div>
    </div>
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] overflow-hidden">
      <table className="w-full text-[12px]">
        <thead className="border-b border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-[#141727]">
          <tr><th className="text-left px-4 py-3 text-zinc-500 font-[600]">Name</th><th className="text-left px-4 py-3 text-zinc-500 font-[600]">Icon</th><th className="text-left px-4 py-3 text-zinc-500 font-[600]">Actions</th></tr>
        </thead>
        <tbody>
          ${categories.map(c=>html`
            <tr key=${c.id} className="border-b border-zinc-50 dark:border-zinc-900">
              <td className="px-4 py-3 font-[600] flex items-center gap-2"><${I} name=${c.icon} size=${14} className="text-[#7c5cff]"/>${c.name}</td>
              <td className="px-4 py-3 text-zinc-500">${c.icon}</td>
              <td className="px-4 py-3"><button onClick=${()=>deleteCategory(c.id)} className="text-red-500 hover:underline text-[11px] font-[600]">Delete</button></td>
            </tr>
          `)}
        </tbody>
      </table>
    </div>
  </div>`;
}

function AdminPicksAnalytics({products,catName}){
  const totalViews = products.reduce((s,p)=>s+(p.views||0),0);
  const totalWebsiteClicks = products.reduce((s,p)=>s+(p.website_clicks||0),0);
  const totalAffiliateClicks = products.reduce((s,p)=>s+(p.affiliate_clicks||0),0);
  const conversionRate = totalViews>0 ? ((totalWebsiteClicks+totalAffiliateClicks)/totalViews*100).toFixed(1) : '0.0';
  const topProducts = [...products].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,5);
  const mostClicked = [...products].sort((a,b)=>((b.website_clicks||0)+(b.affiliate_clicks||0))-((a.website_clicks||0)+(a.affiliate_clicks||0))).slice(0,5);

  const card = (title,value,icon,color) => html`
    <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
      <div className="flex items-center justify-between mb-2">
        <div className="text-[11px] text-zinc-500 font-[600] uppercase tracking-wide">${title}</div>
        <div className="w-8 h-8 rounded-[9px] flex items-center justify-center" style=${{background:color+'20'}}><${I} name=${icon} size=${15} style=${{color}}/></div>
      </div>
      <div className="text-[22px] font-[800] display">${value}</div>
    </div>`;

  return html`
  <div>
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
      ${card('Total Views',totalViews.toLocaleString(),'Eye','#7c5cff')}
      ${card('Website Clicks',totalWebsiteClicks.toLocaleString(),'ExternalLink','#10b981')}
      ${card('Affiliate Clicks',totalAffiliateClicks.toLocaleString(),'Link','#f59e0b')}
      ${card('Conversion Rate',conversionRate+'%','TrendingUp','#3b82f6')}
    </div>
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Top Viewed Products</div>
        ${topProducts.length===0 ? html`<div className="text-[12px] text-zinc-500">No data yet.</div>` : topProducts.map(p=>html`
          <div key=${p.id} className="flex items-center justify-between text-[12px] mb-2">
            <span className="truncate max-w-[70%]">${p.name}</span><span className="font-[600] text-zinc-500">${p.views||0} views</span>
          </div>
        `)}
      </div>
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-5">
        <div className="font-[650] text-[13px] mb-3">Most Clicked Products</div>
        ${mostClicked.length===0 ? html`<div className="text-[12px] text-zinc-500">No data yet.</div>` : mostClicked.map(p=>html`
          <div key=${p.id} className="flex items-center justify-between text-[12px] mb-2">
            <span className="truncate max-w-[70%]">${p.name}</span><span className="font-[600] text-zinc-500">${(p.website_clicks||0)+(p.affiliate_clicks||0)} clicks</span>
          </div>
        `)}
      </div>
    </div>
  </div>`;
}

function AdminPicksProductForm({product,categories,onClose,onSaved}){
  const isNew = !product;
  const [form,setForm]=useState(product ? {
    ...product,
    features: (product.features||[]).join('\n'),
    tags: (product.tags||[]).join(', '),
  } : {
    name:'', logo_url:'', banner_url:'', category_id: categories[0]?.id||'',
    short_description:'', full_description:'', features:'', why_recommended:'',
    official_url:'', affiliate_url:'', pricing_info:'', rating:4.5, tags:'',
    is_featured:false, is_sponsored:false, is_new:true, is_pinned:false,
    display_order:0, status:'draft', notes:'',
  });
  const [saving,setSaving]=useState(false);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=async()=>{
    if(!form.name.trim()) return toast('Product name is required','err');
    setSaving(true);
    const payload = {
      name:form.name, logo_url:form.logo_url, banner_url:form.banner_url, category_id:form.category_id||null,
      short_description:form.short_description, full_description:form.full_description,
      features: form.features.split('\n').map(s=>s.trim()).filter(Boolean),
      why_recommended:form.why_recommended, official_url:form.official_url, affiliate_url:form.affiliate_url,
      pricing_info:form.pricing_info, rating:parseFloat(form.rating)||0,
      tags: form.tags.split(',').map(s=>s.trim()).filter(Boolean),
      is_featured:!!form.is_featured, is_sponsored:!!form.is_sponsored, is_new:!!form.is_new, is_pinned:!!form.is_pinned,
      display_order:parseInt(form.display_order)||0, status:form.status, notes:form.notes,
      updated_at:new Date().toISOString(),
    };
    const {error} = isNew
      ? await supabase.from('picks_products').insert(payload)
      : await supabase.from('picks_products').update(payload).eq('id',product.id);
    setSaving(false);
    if(error) return toast('Failed: '+error.message,'err');
    toast(isNew?'Product created':'Product updated');
    onSaved();
  };

  const field = (label,key,type='text') => html`
    <div>
      <div className="text-[11px] text-zinc-500 mb-1">${label}</div>
      <input type=${type} value=${form[key]??''} onChange=${e=>set(key,e.target.value)} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"/>
    </div>`;

  const toggle = (label,key) => html`
    <div className="flex items-center justify-between">
      <span className="text-[12.5px] text-zinc-700 dark:text-zinc-300">${label}</span>
      <button onClick=${()=>set(key,!form[key])} className=${`w-10 h-5 rounded-full relative transition ${form[key]?'bg-[#7c5cff]':'bg-zinc-300 dark:bg-zinc-700'}`}>
        <span className=${`absolute top-[2px] w-4 h-4 rounded-full bg-white shadow transition-all ${form[key]?'left-[22px]':'left-[2px]'}`}></span>
      </button>
    </div>`;

  return html`
  <div className="fixed inset-0 z-[500] bg-black/60 flex items-center justify-center p-4" onClick=${onClose}>
    <div className="bg-white dark:bg-[#181b2a] w-full max-w-[720px] rounded-[20px] shadow-2xl p-6 max-h-[90vh] overflow-y-auto" onClick=${e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-4">
        <div className="font-[700] text-[16px]">${isNew?'Add Product':'Edit Product'}</div>
        <button onClick=${onClose}><${I} name="X" size=${18}/></button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        ${field('Product Name','name')}
        <div>
          <div className="text-[11px] text-zinc-500 mb-1">Category</div>
          <select value=${form.category_id} onChange=${e=>set('category_id',e.target.value)} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]">
            ${categories.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}
          </select>
        </div>
        ${field('Logo URL','logo_url')}
        ${field('Banner Image URL','banner_url')}
        ${field('Official Website URL','official_url')}
        ${field('Affiliate Link URL','affiliate_url')}
        ${field('Pricing Info (e.g. Free / $19/mo)','pricing_info')}
        ${field('Rating (0–5)','rating','number')}
        ${field('Display Order','display_order','number')}
        <div>
          <div className="text-[11px] text-zinc-500 mb-1">Status</div>
          <select value=${form.status} onChange=${e=>set('status',e.target.value)} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
            <option value="scheduled">Scheduled</option>
            <option value="hidden">Hidden</option>
          </select>
        </div>
      </div>

      <div className="mb-3">
        <div className="text-[11px] text-zinc-500 mb-1">Short Description</div>
        <textarea value=${form.short_description} onChange=${e=>set('short_description',e.target.value)} className="w-full h-[60px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"></textarea>
      </div>
      <div className="mb-3">
        <div className="text-[11px] text-zinc-500 mb-1">Full Description</div>
        <textarea value=${form.full_description} onChange=${e=>set('full_description',e.target.value)} className="w-full h-[100px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"></textarea>
      </div>
      <div className="mb-3">
        <div className="text-[11px] text-zinc-500 mb-1">Features (one per line)</div>
        <textarea value=${form.features} onChange=${e=>set('features',e.target.value)} className="w-full h-[80px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"></textarea>
      </div>
      <div className="mb-3">
        <div className="text-[11px] text-zinc-500 mb-1">Why Zedith Recommends This</div>
        <textarea value=${form.why_recommended} onChange=${e=>set('why_recommended',e.target.value)} className="w-full h-[70px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"></textarea>
      </div>
      <div className="mb-4">
        ${field('Tags (comma separated)','tags')}
      </div>

      <div className="grid grid-cols-2 gap-3 mb-4 p-3 bg-zinc-50 dark:bg-[#14182a] rounded-xl">
        ${toggle('Featured','is_featured')}
        ${toggle('Sponsored','is_sponsored')}
        ${toggle('New Badge','is_new')}
        ${toggle('Pinned','is_pinned')}
      </div>

      <div className="mb-5">
        <div className="text-[11px] text-zinc-500 mb-1">Admin Notes (internal only)</div>
        <textarea value=${form.notes} onChange=${e=>set('notes',e.target.value)} className="w-full h-[50px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none text-[12.5px]"></textarea>
      </div>

      <div className="flex gap-2">
        <button onClick=${onClose} className="flex-1 py-[10px] rounded-xl border border-zinc-200 dark:border-zinc-700 text-[13px] font-[600]">Cancel</button>
        <button onClick=${save} disabled=${saving} className="flex-1 py-[10px] rounded-xl bg-[#7c5cff] text-white text-[13px] font-[600] disabled:opacity-60">${saving?'Saving…':(isNew?'Create Product':'Save Changes')}</button>
      </div>
    </div>
  </div>`;
}
// ---------- mount ----------
const root = createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
