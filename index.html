function CustomSelect({value, onChange, options, className='', panelClassName='', align='right'}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const onDoc=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onEsc=(e)=>{ if(e.key==='Escape') setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onEsc);
    return ()=>{ document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onEsc); };
  },[]);
  const opts = options.map(o => typeof o === 'string' ? {label:o, value:o} : o);
  const current = opts.find(o=>o.value===value);
  return html`
    <div ref=${ref} className="relative inline-block">
      <button type="button" onClick=${()=>setOpen(o=>!o)} className=${`flex items-center justify-between gap-2 transition-colors ${open?'border-[#7c5cff]! ring-1 ring-[#7c5cff]/30':''} ${className}`}>
        <span className="truncate">${current?.label ?? value}</span>
        <${I} name="ChevronDown" size=${13} className=${`opacity-60 shrink-0 transition-transform duration-200 ${open?'rotate-180 text-[#7c5cff] opacity-100':''}`}/>
      </button>
      ${open ? html`
        <div className=${`absolute ${align==='right'?'right-0':'left-0'} z-50 mt-[6px] min-w-full w-max max-h-[260px] overflow-y-auto rounded-[14px] border border-zinc-200 dark:border-[#2a2f4a] bg-white/95 dark:bg-[#181b2b]/95 backdrop-blur-md shadow-[0_10px_30px_rgba(20,10,60,0.12)] dark:shadow-[0_10px_34px_rgba(0,0,0,0.55)] py-[6px] fade-in ${panelClassName}`}>
          ${opts.map(o=>html`
            <button key=${o.value} type="button" onClick=${()=>{ onChange(o.value); setOpen(false); }} className=${`w-full flex items-center justify-between gap-3 text-left px-[13px] py-[9px] text-[12.5px] whitespace-nowrap rounded-[9px] mx-[4px] w-[calc(100%-8px)] transition-colors ${o.value===value?'text-[#7c5cff] font-[650] bg-[#7c5cff]/10':'text-zinc-700 dark:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-[#222642]'}`}>
              <span className="truncate">${o.label}</span>
              ${o.value===value ? html`<${I} name="Check" size=${13} className="shrink-0 text-[#7c5cff]"/>` : null}
            </button>
          `)}
        </div>
      ` : null}

  `;
}
function copyText(t){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(t).then(()=>toast('Copied')).catch(()=>fallbackCopy(t));
  } else fallbackCopy(t);
}
function fallbackCopy(t){
  const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy'); toast('Copied')}catch{toast('Copy failed','err')}
  ta.remove();
}

// ---------- Credit System ----------
const DEFAULT_CREDIT_COSTS = {
  text_short: 5, text_medium: 15, text_long: 40, code: 45, vision: 60,
  image_gen: 200, image_edit: 200, voice: 100, smart_multiplier: 1.5
};
const PLAN_CREDITS = { free: 20000, pro: 500000, elite: 1000000 };

function estimateCreditCost({text='', feature='text', smart=false, attachment=null, creditCosts=DEFAULT_CREDIT_COSTS}){
  let cost = 0;
  const len = text.length;
  if(feature==='image_gen') cost = creditCosts.image_gen;
  else if(feature==='image_edit') cost = creditCosts.image_edit;
  else if(feature==='vision' || attachment?.type==='image') cost = creditCosts.vision;
  else if(feature==='voice') cost = creditCosts.voice;
  else if(feature==='code') cost = creditCosts.code;
  else if(len < 20) cost = creditCosts.text_short;
  else if(len < 200) cost = creditCosts.text_medium;
  else cost = creditCosts.text_long;
  if(smart) cost = Math.round(cost * creditCosts.smart_multiplier);
  return cost;
}

Never expose model names, backend IDs, retry counts, API errors, stack traces, or HTTP status codes (e.g. "HTTP 504", model/provider names, "retry", "backend") unless the user explicitly asks for technical debug info. If a tool or data fetch fails, just say: "I couldn't retrieve that information right now. Please try again in a few moments." — never show the raw technical error.

Tone: sound like an experienced YouTube strategist — confident, practical, concise. Avoid robotic wording and unnecessary long paragraphs. Accuracy matters more than sounding impressive: if data is unavailable, say so clearly instead of guessing.`;
}

}

// ---------- Channel Analytics: real-data insight computation ----------
// Everything here is derived ONLY from numbers actually returned by the YouTube
// Analytics API (via youtube-analytics-fetch). Nothing here is invented — if a
// metric isn't available (e.g. impressions/CTR require a scope we don't fetch),
// we simply omit it rather than fabricate a number.
function computeChannelInsights(data){
  if(!data || !data.connected) return null;
  const ov = data.overview || {};
  const daily = data.dailyStats || [];
  const topVideos = data.topVideos || [];
  const views = Number(ov.views)||0;
  const watchMin = Number(ov.watchTimeMinutes)||0;
  const subsGained = Number(ov.subscribersGained)||0;
  const subsLost = Number(ov.subscribersLost)||0;
  const netSubs = subsGained - subsLost;
  const likes = Number(ov.likes)||0;
  const comments = Number(ov.comments)||0;
  const shares = Number(ov.shares)||0;
  const avgViewDurationSec = views>0 ? (watchMin*60)/views : 0;
  const engagementRate = views>0 ? ((likes+comments+shares)/views)*100 : 0;

  // Upload cadence: distinct days with >0 views isn't upload count, but gap between
  // days that had a fresh top-video spike is the closest real signal we have without
  // an extra API call to playlistItems. We use days-with-data as a proxy for activity.
  const activeDays = daily.filter(d=>Number(d.views)>0).length;
  const totalDays = daily.length || 28;
  const uploadGapEstimate = activeDays>0 ? Math.round(totalDays/Math.max(1,Math.ceil(activeDays/3))) : null;

  // Trend: compare first half vs second half of the period for views & watch time.
  const half = Math.floor(daily.length/2);
  const sum=(arr)=>arr.reduce((s,d)=>s+ (Number(d.views)||0),0);
  const firstHalfViews = sum(daily.slice(0,half));
  const secondHalfViews = sum(daily.slice(half));
  const viewsTrendPct = firstHalfViews>0 ? ((secondHalfViews-firstHalfViews)/firstHalfViews)*100 : (secondHalfViews>0?100:0);

  // Health score: a transparent, explainable 0-100 composite from real metrics only —
  // NOT the same formula/number as any UI mockup. Weighted: watch-time trend, net sub
  // growth, engagement rate, and upload consistency.
  let score = 50;
  score += Math.max(-20, Math.min(20, viewsTrendPct/5));
  score += netSubs > 0 ? Math.min(15, netSubs) : Math.max(-15, netSubs);
  score += Math.max(-15, Math.min(15, (engagementRate-2)*3));
  if(uploadGapEstimate!=null){ score += uploadGapEstimate<=3 ? 10 : uploadGapEstimate<=7 ? 0 : -10; }
  score = Math.max(1, Math.min(100, Math.round(score)));

  const best = topVideos.length ? topVideos.reduce((a,b)=> (Number(b.views)||0)>(Number(a.views)||0)?b:a) : null;
  const worst = topVideos.length>1 ? topVideos.reduce((a,b)=> (Number(b.views)||0)<(Number(a.views)||0)?b:a) : null;

  return {
    channelTitle: data.channel?.title || null,
    subscriberCount: data.channel?.subscriberCount!=null ? Number(data.channel.subscriberCount) : null,
    views, watchMin, subsGained, subsLost, netSubs, likes, comments, shares,
    avgViewDurationSec: Math.round(avgViewDurationSec),
    engagementRate: Math.round(engagementRate*100)/100,
    viewsTrendPct: Math.round(viewsTrendPct*10)/10,
    uploadGapEstimate,
    activeDays, totalDays,
    healthScore: score,
    bestVideo: best ? {title:best.title, views:best.views, likes:best.likes, comments:best.comments} : null,
    worstVideo: (worst && worst!==best) ? {title:worst.title, views:worst.views} : null,
    topCountries: (data.topCountries||[]).slice(0,3).map(r=>({country:r[0], views:Number(r[1])||0})),
    hasCTRData: false // true only once the fetch function is upgraded to pull cardClickRate
  };
}

// Turns computed insights into a compact plain-text block injected into every chat's
// system prompt automatically — this is how the AI "sees" the user's real channel data
// without the user ever needing to paste a screenshot or say "here's my analytics".
function buildChannelContextBlock(insights){
  if(!insights) return '\n\n--- Creator channel data ---\nNo YouTube channel is connected yet for this user. If they ask about their own stats, views, CTR, or performance, tell them plainly you don\'t have channel data yet and ask them to connect their YouTube channel in the Channel Analytics tab — do not guess or invent numbers.';
  const i = insights;
  const lines = [];
  lines.push(`Channel: ${i.channelTitle||'Unknown'}`);
  lines.push(`SUBSCRIBERS (total, current): ${i.subscriberCount!=null ? i.subscriberCount.toLocaleString('en-US') : 'not available'}`);
  lines.push(`TOTAL VIEWS (last 28 days): ${i.views.toLocaleString('en-US')}`);
  lines.push(`WATCH TIME (last 28 days): ${Math.round(i.watchMin/60)} hrs`);
  lines.push(`NET SUBSCRIBER CHANGE (last 28 days, gained minus lost): ${i.netSubs>=0?'+':''}${i.netSubs}`);
  lines.push(`LIKES (last 28 days): ${i.likes}`);
  lines.push(`COMMENTS (last 28 days): ${i.comments}`);
  lines.push(`These are six separate metrics — never answer a question about one using the number from another.`);
  lines.push(`Average view duration: ~${i.avgViewDurationSec}s. Engagement rate (likes+comments+shares / views): ${i.engagementRate}%.`);
  lines.push(`Views trend vs first half of period: ${i.viewsTrendPct>=0?'+':''}${i.viewsTrendPct}%.`);
  if(i.uploadGapEstimate!=null) lines.push(`Estimated upload gap: roughly every ${i.uploadGapEstimate} day(s), based on ${i.activeDays} active days out of ${i.totalDays}.`);
  if(i.bestVideo) lines.push(`Top performing video: "${i.bestVideo.title}" — ${i.bestVideo.views} views, ${i.bestVideo.likes} likes, ${i.bestVideo.comments} comments.`);
  if(i.worstVideo) lines.push(`Weakest of the recent top videos: "${i.worstVideo.title}" — ${i.worstVideo.views} views.`);
  if(i.topCountries?.length) lines.push(`Top audience countries: ${i.topCountries.map(c=>`${c.country} (${c.views} views)`).join(', ')}.`);
  lines.push(`Computed Creator Health Score (0-100, derived from trend/engagement/consistency): ${i.healthScore}.`);
  lines.push(`Note: click-through rate (CTR) and impressions are NOT currently available from this data source — if the user asks specifically about CTR, tell them plainly that CTR data isn't connected yet rather than inventing a number, but you CAN still diagnose likely causes of low views using the metrics above (weak retention, low engagement rate, inconsistent uploads, underperforming topic) and give concrete next steps.`);
  return `\n\n--- Creator's real, live channel data (already connected — never ask the user to share screenshots or paste analytics, you already have this) ---\n${lines.join('\n')}\n\nUse this real data whenever the user asks about their own channel, views, growth, or performance. Ground every diagnosis in these actual numbers instead of generic advice. If a specific number they ask about isn't listed above (e.g. CTR), say so plainly instead of guessing.`;
}

// ---------- OpenRouter (via secure server proxy — key never exposed to browser) ----------
// NORMAL mode: fast, lightweight models — fine for chat/summaries/translation, not for hard reasoning.
const NORMAL_TEXT_MODELS = [
  'meta-llama/llama-3.3-70b-instruct:free','mistralai/mistral-small-3.1-24b-instruct:free',
  'google/gemma-3-27b-it:free','qwen/qwen-2.5-72b-instruct:free'
];
// SMART mode: real reasoning-focused models only. If ALL of these fail, we do NOT
// silently fall back to weak Normal models — see callOR — so "Smart" never quietly
// downgrades to dumb without telling the user.
const SMART_TEXT_MODELS = [
  'deepseek/deepseek-r1:free','openai/gpt-oss-120b:free','qwen/qwen3-coder:free',
  'deepseek/deepseek-chat-v3-0324:free'
];
const FREE_VISION_MODELS = [
  'google/gemma-4-31b-it:free','google/gemma-4-26b-a4b-it:free','nvidia/nemotron-nano-12b-v2-vl:free'
];
// This AI is scoped to content creation only now. Deep-reasoning models are the
// default for any substantive question; the fast pool is only for trivial chat
// (greetings, thanks, yes/no) so those don't wait 20-30s for no reason.
function looksLikeHardReasoning(text){
  if(!text) return false;
  const t = text.trim().toLowerCase();
  const isTrivialChat = t.length < 12 && /^(hi|hey|hello|thanks|thank you|ok|okay|yo|sup|good|nice|cool|bye)\b/.test(t);
  return !isTrivialChat;
}

async function callOR(messages,{vision=false,smart=false,modelPref=null,hasImage=false,userText=''}={}){
  const wantsSmart = smart || looksLikeHardReasoning(userText);
  const poolBase = vision
    ? [...FREE_VISION_MODELS, ...NORMAL_TEXT_MODELS]
    : (wantsSmart ? SMART_TEXT_MODELS : NORMAL_TEXT_MODELS);
  const pool = [...new Set([...(modelPref?[modelPref]:[]), ...poolBase])];
  let debugInfo = 'unknown';
  try{
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages, models: pool, temperature: smart ? 0.32 : 0.78, max_tokens: 1300 })
    });
    const d = await r.json().catch(()=>null);
    if (r.ok && d?.text) return { text: d.text.trim(), model: d.model, tried: d.tried || 1, usedSmart: wantsSmart };
    if (d?.error && typeof d.error === 'string') debugInfo = d.error;
    else if (!r.ok) debugInfo = `HTTP ${r.status}`;
    else debugInfo = `all ${d?.tried||pool.length} models returned empty (likely OpenRouter daily free-tier limit — 50/day without $10 credit purchased, 1000/day with it)`;
    console.error('Zedith AI failed:', debugInfo, d);
  } catch(e){ debugInfo = 'network error: '+e.message; console.error('Zedith AI network error:', e); }

  // Honest fallback: never pretend to have analyzed an image or fabricate unrelated
  // "creator draft" content as if it answered the question. Say plainly what failed,
  // in plain non-technical language — raw error/debug JSON never goes in the
  // user-facing message; it's only kept in the browser console for developers.
  console.error('Zedith AI fallback triggered — debug info:', debugInfo);
  const text = hasImage
    ? `Hmm, I'm having trouble seeing your image right now — maybe the image upload isn't going through properly on my end at the moment. I don't want to guess what's in it and give you off-base feedback, so mind giving it another try in a bit? If it keeps happening, re-uploading the image or trying a slightly smaller file sometimes helps.`
    : `I'm having trouble putting together a response right now — our AI service is temporarily at capacity. I'd rather tell you this honestly than guess or make something up. Please try again in about a minute.`;

  return { text, model:'offline-fallback', tried: pool.length, error:true, debugInfo };
}

async function realWebSearch(query){
  try{
    const r = await fetch('/api/search', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ query, max_results: 5 })
    });
    const d = await r.json().catch(()=>null);
    if(!r.ok || !d) return { results: [], error: `HTTP ${r.status}` };
    return { results: d.results || [], error: d.error || null };
  }catch(e){
    return { results: [], error: 'network error: '+e.message };
  }
}

// ---------- Real thumbnail composer: generates AI background art, then bakes
// the actual title/heading text onto it with Canvas so it looks like a real
// YouTube thumbnail instead of a random stock-style AI portrait. ----------
async function composeThumbnail(bgPrompt, titleText){
  const bgUrl = imageGenUrl(bgPrompt);
  const img = await new Promise((resolve,reject)=>{
    const im=new Image();
    im.crossOrigin='anonymous';
    im.onload=()=>resolve(im);
    im.onerror=()=>reject(new Error('background image failed to load'));
    im.src=bgUrl;
  });

  const W=1280, H=720;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, W, H);

  // Dark gradient scrim at the bottom so text stays readable over any art.
  const grad = ctx.createLinearGradient(0, H*0.42, 0, H);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.72)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H*0.42, W, H*0.58);

  // Fit title text into the lower third, wrapping and auto-shrinking to fit.
  const maxWidth = W - 100;
  let fontSize = 92;
  const title = (titleText||'').trim().toUpperCase();
  let lines=[];
  while(fontSize > 36){
    ctx.font = `800 ${fontSize}px 'Arial Black', Arial, sans-serif`;
    const words = title.split(/\s+/);
    lines=[]; let cur='';
    for(const w of words){
      const test = cur ? cur+' '+w : w;
      if(ctx.measureText(test).width > maxWidth && cur){ lines.push(cur); cur=w; }
      else cur=test;
    }
    if(cur) lines.push(cur);
    if(lines.length<=3) break;
    fontSize -= 4;
  }

  const lineHeight = fontSize*1.12;
  const totalTextHeight = lines.length*lineHeight;
  let y = H - 60 - totalTextHeight + lineHeight*0.8;

  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  for(const line of lines){
    ctx.font = `800 ${fontSize}px 'Arial Black', Arial, sans-serif`;
    ctx.lineJoin='round';
    ctx.strokeStyle='rgba(0,0,0,0.85)';
    ctx.lineWidth = fontSize*0.12;
    ctx.strokeText(line, 50, y);
    ctx.fillStyle='#ffffff';
    ctx.fillText(line, 50, y);
    y += lineHeight;
  }

  // Small accent bar + brand tag so it reads as a designed thumbnail.
  ctx.fillStyle='#7c5cff';
  ctx.fillRect(50, H-24, 90, 8);

  return canvas.toDataURL('image/png');
}
async function ttsFetch(text, voiceName='Brian'){
  const map={Brian:'Brian',Amy:'Amy',Emma:'Emma',Joey:'Joey'};
  const v=map[voiceName]||'Brian';
  const url=`https://api.streamelements.com/kappa/v2/speech?voice=${encodeURIComponent(v)}&text=${encodeURIComponent(text.slice(0,900))}`;
  const res=await fetch(url); if(!res.ok) throw new Error('tts '+res.status);
  const blob=await res.blob(); return URL.createObjectURL(blob);
}


// ---------- Lightweight Markdown Renderer ----------
// Supports: **bold**, *italic*, # headings (1-3), - / * bullet lists, 1. numbered lists,
// `inline code`, ```code blocks```, and paragraph line breaks. No external deps.
function renderInlineMarkdown(text){
  if(!text) return null;
  const parts=[];
  // split on [label](url) links, **bold**, *italic*, `code` while keeping delimiters
  const re=/(\[[^\]]+\]\((https?:\/\/[^\s)]+)\)|\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g;
  let lastIndex=0, match, key=0;
  while((match=re.exec(text))){
    if(match.index>lastIndex) parts.push(text.slice(lastIndex,match.index));
    const token=match[0];
    if(token.startsWith('[')){
      const linkMatch = token.match(/^\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)$/);
      const label = linkMatch ? linkMatch[1] : token;
      const url = linkMatch ? linkMatch[2] : '#';
      parts.push(html`<a key=${key++} href=${url} target="_blank" rel="noopener noreferrer" className="text-[#7c5cff] underline hover:text-[#6a4ce0] break-all">${label}</a>`);
    }
    else if(token.startsWith('**')) parts.push(html`<strong key=${key++} className="font-[700]">${token.slice(2,-2)}</strong>`);
    else if(token.startsWith('`')) parts.push(html`<code key=${key++} className="px-[5px] py-[1px] rounded-[5px] bg-zinc-200 dark:bg-zinc-700 text-[12px] font-mono">${token.slice(1,-1)}</code>`);
    else parts.push(html`<em key=${key++}>${token.slice(1,-1)}</em>`);
    lastIndex=match.index+token.length;
  }
  if(lastIndex<text.length) parts.push(text.slice(lastIndex));
  return parts;
}

function MarkdownText({text, className=''}){
  if(!text) return null;
  const lines = text.split('\n');
  const blocks=[]; // {type:'p'|'h1'|'h2'|'h3'|'ul'|'ol'|'code', content or items}
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(/^```/.test(line.trim())){
      const codeLines=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i].trim())){ codeLines.push(lines[i]); i++; }
      i++; // skip closing ```
      blocks.push({type:'code', content:codeLines.join('\n')});
      continue;
    }
    const h3=line.match(/^###\s+(.*)/); const h2=line.match(/^##\s+(.*)/); const h1=line.match(/^#\s+(.*)/);
    if(h3){ blocks.push({type:'h3', content:h3[1]}); i++; continue; }
    if(h2){ blocks.push({type:'h2', content:h2[1]}); i++; continue; }
    if(h1){ blocks.push({type:'h1', content:h1[1]}); i++; continue; }
    if(/^\s*[-*]\s+/.test(line)){
      const items=[];
      while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ items.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; }
      blocks.push({type:'ul', items});
      continue;
    }
    if(/^\s*\d+\.\s+/.test(line)){
      const items=[];
      while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ items.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
      blocks.push({type:'ol', items});
      continue;
    }
    if(line.trim()===''){ i++; continue; }
    // accumulate paragraph lines until a blank line or a new block starts
    const paraLines=[line]; i++;
    while(i<lines.length && lines[i].trim()!=='' && !/^```/.test(lines[i].trim()) && !/^#{1,3}\s/.test(lines[i]) && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i])){
      paraLines.push(lines[i]); i++;
    }
    blocks.push({type:'p', content:paraLines.join('\n')});
  }
  return html`
    <div className=${className}>
      ${blocks.map((b,bi)=>{
        if(b.type==='h1') return html`<div key=${bi} className="text-[17px] font-[800] display mt-3 mb-1 first:mt-0">${renderInlineMarkdown(b.content)}</div>`;
        if(b.type==='h2') return html`<div key=${bi} className="text-[15px] font-[750] display mt-3 mb-1 first:mt-0">${renderInlineMarkdown(b.content)}</div>`;
        if(b.type==='h3') return html`<div key=${bi} className="text-[13.6px] font-[700] mt-2 mb-1 first:mt-0">${renderInlineMarkdown(b.content)}</div>`;
        if(b.type==='code') return html`<pre key=${bi} className="bg-zinc-900 dark:bg-black/40 text-zinc-100 rounded-[10px] p-3 my-2 overflow-x-auto text-[12px] font-mono leading-[1.5]"><code>${b.content}</code></pre>`;
        if(b.type==='ul') return html`<ul key=${bi} className="list-disc pl-5 my-1 space-y-[3px]">${b.items.map((it,ii)=>html`<li key=${ii} className="text-[13.6px] leading-[1.6]">${renderInlineMarkdown(it)}</li>`)}</ul>`;
        if(b.type==='ol') return html`<ol key=${bi} className="list-decimal pl-5 my-1 space-y-[3px]">${b.items.map((it,ii)=>html`<li key=${ii} className="text-[13.6px] leading-[1.6]">${renderInlineMarkdown(it)}</li>`)}</ol>`;
        return html`<div key=${bi} className="text-[13.6px] leading-[1.7] whitespace-pre-wrap">${renderInlineMarkdown(b.content)}</div>`;
      })}
    </div>
  `;
}

      const res = await fetch(`${SUPABASE_URL}/functions/v1/youtube-analytics-fetch`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const json = await res.json();
      if(json.connected){
        setChannelAnalytics(json);
        setChannelAnalyticsLoadedAt(Date.now());
        setChannelConnected(true);
        return json;
      } else {
        setChannelConnected(false);
        return null;
      }
    }catch(e){
      console.error('background channel analytics load failed:', e);
      return null;
    }
  }

  async function loadProfile(){
    let {data,error}=await supabase.from('profiles').select('*').eq('id',user.id).maybeSingle();
    const adminUser = isAdmin(user);
    const planCreditsFor = (plan)=> PLAN_CREDITS[plan||'free'] ?? PLAN_CREDITS['elite'] ?? 20000;
    if(!data && !error){
      const nowIso=new Date().toISOString();
      const fresh = {
        id:user.id, email:user.email||'', display_name:'', username:'', bio:'',
        plan:'free', credits: adminUser ? 999999999 : 20000, monthly_credits: adminUser ? 999999999 : 20000,
        credits_reset_at: nowIso, created_at:nowIso
      };
      const created = await supabase.from('profiles').insert(fresh).select().single();
      if(created.error){ console.error('profile insert error:', created.error); toast('Failed to load profile: '+created.error.message,'err'); return; }
      data = created.data;
    } else if(error){
      console.error('profile select error:', error); toast('Failed to load profile: '+error.message,'err'); return;
    } else if(adminUser && (data.credits==null || data.credits < 999999999)){
      const patch={credits:999999999, monthly_credits:999999999};
      const upd = await supabase.from('profiles').update(patch).eq('id',user.id).select().single();
      if(!upd.error) data = upd.data;
    } else if(!adminUser){
      const now=new Date();
      const lastReset = data.credits_reset_at ? new Date(data.credits_reset_at) : null;
      const isNewMonth = !lastReset || now.getUTCFullYear()!==lastReset.getUTCFullYear() || now.getUTCMonth()!==lastReset.getUTCMonth();
      if(isNewMonth){
        const full = planCreditsFor(data.plan);
        const patch={credits:full, monthly_credits:full, credits_reset_at:now.toISOString()};
        const upd = await supabase.from('profiles').update(patch).eq('id',user.id).select().single();
        if(!upd.error) data = upd.data;
      }
    }
    setProfile(data);
    setSettings(s=>({...s, displayName:data.display_name||'', username:data.username||'', email:data.email||user.email||'', bio:data.bio||''}));
  }

  async function sendMessage({text, attachment=null, smart=false, webSearch=false, modelPref='auto'}){
    let chatId = activeChatId;
    let chat = chats.find(c=>c.id===chatId) || null;
    if(!chat){
      const newChat={id:uid('c'), user_id:user.id, project_id:activeProjectId||null, title:(text||attachment?.name||'New chat').slice(0,56), messages:[], saved:false, pinned:false, created_at:new Date().toISOString(), updated_at:new Date().toISOString()};
      chat=newChat;
      chatId=chat.id;
      // Insert first, then update local state
      const {error:chatInsertErr, data:insertedChat} = await supabase.from('chats').insert(newChat).select().single();
      if(chatInsertErr){ console.error('chat insert error:', chatInsertErr); toast('Chat not saved: '+chatInsertErr.message,'err'); }
      else { chat = insertedChat || newChat; }
      setChats(cs=>[chat, ...cs]);
      setActiveChatId(chatId);
      addNotification('New chat started', chat.title);
    }

    const userMsg={id:uid('m'), role:'user', text:text||'', ts:Date.now(), attachment};
    const updatedMessages=[...(chat.messages||[]), userMsg];
    const now=new Date().toISOString();
    const updatedChat={...chat, messages:updatedMessages, updated_at:now};
    setChats(cs=>cs.map(c=>c.id===chatId?updatedChat:c));
    const {error:saveErr} = await supabase.from('chats').update({messages:updatedMessages, updated_at:now, title:updatedChat.title}).eq('id',chatId);
    if(saveErr){ console.error('chat save error:', saveErr); toast('Chat not saved: '+saveErr.message,'err'); }

    const lower=(text||'').toLowerCase();
    // Only trigger image GENERATION on explicit generation commands.
    // Previously the word "thumbnail" alone triggered this, so analysis
    // questions like "rate this thumbnail" or "explain my thumbnail CTR"
    // were hijacked into generating a picture instead of answering.
    const wantsImage = /^\s*\/image\b/.test(lower)
      || /\b(generate|create|make|draw)\s+(me\s+)?(an?\s+)?(new\s+)?(image|picture|thumbnail|art|illustration|photo)\b/.test(lower)
      || /\b(image|picture|thumbnail)\s+of\b/.test(lower)
      || /\bimagine\s+(a|an|the)\b/.test(lower);

    // A question is never a generation request, even if it contains
    // "image" or "thumbnail" — and an attached image is clearly meant
    // for analysis, not generation.
    const looksLikeQuestion = /\?/.test(text||'')
      || /^(what|why|how|is|does|can|should|explain|analyze|analyse|rate|review|tell me|list|rank|does this|can you (tell|explain|analyze|rate|review))\b/i.test((text||'').trim());

    if(wantsImage && !attachment && !looksLikeQuestion){
      const cost = estimateCreditCost({text, feature:'image_gen', smart, creditCosts});
      const ok = await deductCredits(cost, 'image_gen', {prompt:text});
      if(!ok){ toast("You're out of Credits. Upgrade to Zedith Pro or wait until your monthly credits reset.",'err'); return; }

      const placeholderId=uid('m');
      const chatWithPlaceholder={...updatedChat, messages:[...updatedChat.messages,{id:placeholderId, role:'assistant', type:'image_generating', prompt:text, ts:Date.now()}]};
      setChats(cs=>cs.map(c=>c.id===chatId?chatWithPlaceholder:c));
      try{
        let imgPrompt=text.replace(/^(generate|create|make)\s+(an?\s+)?image\s+(of\s+)?/i,'').trim()||text;
        const isThumbnail = /thumbnail/i.test(text);
        let url;
        if(isThumbnail){
          // Pull a likely title out of the request (text after "about"/"title"/"topic is", or quoted text, else the whole prompt).
          const titleMatch = text.match(/(?:titled?|title(?:d)?\s*[:\-]?|topic\s+is|about)\s*["“]?([^"”\n]{3,80})["”]?$/i) || text.match(/["“]([^"”]{3,80})["”]/);
          const titleText = (titleMatch ? titleMatch[1] : imgPrompt).trim();
          const bgPrompt = `${imgPrompt}, cinematic youtube thumbnail background, bold composition, vibrant colors, dramatic lighting, no text, no words, no letters`;
          url = await composeThumbnail(bgPrompt, titleText);
        } else {
          url=imageGenUrl(imgPrompt+', high quality, vibrant, high detail');
          await new Promise(res=>{ const im=new Image(); im.onload=res; im.onerror=res; im.src=url; setTimeout(res, 1800); });
        }
        const finalMessages=[...updatedChat.messages,{id:placeholderId, role:'assistant', type:'image', imageUrl:url, prompt:imgPrompt, text:`Here’s your generated image for: "${imgPrompt}"`, ts:Date.now()}];
        setChats(cs=>cs.map(c=> c.id===chatId ? {...c, messages:finalMessages, updated_at:new Date().toISOString()}:c));
        const {error:e1}=await supabase.from('chats').update({messages:finalMessages, updated_at:new Date().toISOString()}).eq('id',chatId); if(e1) console.error('chat save error:', e1);
        addNotification('Image generated', imgPrompt.slice(0,60));
        return;
      }catch(e){
        const errMessages=[...updatedChat.messages,{id:placeholderId, role:'assistant', type:'text', text:'Image generation failed: '+e.message, error:true, ts:Date.now()}];
        setChats(cs=>cs.map(c=> c.id===chatId ? {...c, messages:errMessages, updated_at:new Date().toISOString()}:c));
        const {error:e2}=await supabase.from('chats').update({messages:errMessages, updated_at:new Date().toISOString()}).eq('id',chatId); if(e2) console.error('chat save error:', e2);
        return;
      }
    }

    const feature = attachment?.type==='image' ? 'vision' : text.length > 200 ? 'text_long' : text.length > 20 ? 'text_medium' : 'text_short';
    const cost = estimateCreditCost({text, feature, smart, attachment, creditCosts});
    const ok = await deductCredits(cost, feature, {length:text.length});
    if(!ok){ toast("You're out of Credits. Upgrade to Zedith Pro or wait until your monthly credits reset.",'err'); return; }

    const history=(chat?.messages||[]).slice(-8).map(mm=>{
      if(mm.attachment?.type==='image'){
        // Don't resend old images as raw vision content in every future turn — just
        // note that an image was there. Only the CURRENT message (below) sends real image data.
        return {role:mm.role, content:(mm.text||'')+' [User previously shared an image here.]'};
      }
      return {role:mm.role, content:mm.text||''};
    });
    let userContent=text;
    if(attachment?.type==='image'){
      userContent=[{type:'text', text:text||'Analyze this image for YouTube – thumbnail score, CTR tips, hook ideas.'},{type:'image_url', image_url:{url:attachment.dataUrl}}];
    }
    let searchContext = '';
    let searchSucceeded = false;
    let searchFailedNote = '';
    let searchDebug = '';
    let searchSources = [];
    if(webSearch && text && text.trim()){
      // Use the raw query first; Tavily handles natural language fine, but very
      // long conversational messages can dilute relevance, so cap what we send.
      const searchQuery = text.trim().length > 300 ? text.trim().slice(0, 300) : text.trim();
      const {results, error:searchErr} = await realWebSearch(searchQuery);
      if(results.length){
        searchContext = buildSearchContextBlock(results);
        searchSucceeded = true;
        searchSources = results.map(r=>({title:r.title, url:r.url}));
      } else {
        // Whether it errored or just returned zero hits, tell the model a
        // search WAS attempted so it never falsely claims "I can't search".
        searchDebug = 'search: ' + (searchErr || 'no results returned');
        console.error('web search returned no usable results:', searchErr || 'empty result set');
        searchFailedNote = '\n\nNote: a live web search WAS attempted for this message but it failed or returned no usable results. Do not claim search is unavailable or off — it was on. Tell the user the search didn\'t turn up current results and answer from general knowledge with that caveat.';
      }
    }
    const effectiveSmart = smart || looksLikeHardReasoning(text);
    // Silently ensure we have reasonably fresh channel data cached before answering —
    // never blocks/asks the user, just makes sure the AI's context is live.
    const freshAnalytics = await loadChannelAnalytics(false);
    const channelInsights = computeChannelInsights(freshAnalytics || channelAnalytics);
    const channelContext = buildChannelContextBlock(channelInsights);
    const sys = buildSystemPrompt({webSearch: searchSucceeded, smart: effectiveSmart, responseStyle: settings.responseStyle, hasImage: !!attachment}) + channelContext + searchContext + searchFailedNote + (settings.systemPrompt ? '\n\nAdditional user instructions:\n'+settings.systemPrompt : '');
    const payload=[{role:'system', content:sys}, ...history, {role:'user', content:userContent}];
    try{
      const {text:answer, model, tried, error, debugInfo} = await callOR(payload,{vision:!!attachment, smart, modelPref: modelPref==='auto'? (settings.defaultModel==='auto'?null:settings.defaultModel) : modelPref, hasImage: !!attachment, userText: text});
      const combinedDebug = [error?debugInfo:null, searchDebug||null].filter(Boolean).join(' | ') || null;
      const assistantMsg={id:uid('m'), role:'assistant', text:answer, ts:Date.now(), model, tried, liked:0, error:!!error, debugInfo: combinedDebug, sources: searchSources.length ? searchSources : null};
      const finalMessages=[...updatedChat.messages, assistantMsg];
      setChats(cs=>cs.map(c=>c.id===chatId?{...c, messages:finalMessages, updated_at:new Date().toISOString()}:c));
      const {error:e1}=await supabase.from('chats').update({messages:finalMessages, updated_at:new Date().toISOString()}).eq('id',chatId); if(e1) console.error('chat save error:', e1);
      if(!error) addNotification('Zedith replied', answer.slice(0,70));
    }catch(e){
      const errMsg={id:uid('m'), role:'assistant', text:`We're currently experiencing huge traffic — please try again in a few minutes.\n\n${e.message}`, error:true, ts:Date.now()};
      const finalMessages=[...updatedChat.messages, errMsg];
      setChats(cs=>cs.map(c=>c.id===chatId?{...c, messages:finalMessages, updated_at:new Date().toISOString()}:c));
      const {error:e1}=await supabase.from('chats').update({messages:finalMessages, updated_at:new Date().toISOString()}).eq('id',chatId); if(e1) console.error('chat save error:', e1);
    }
  }

// ---------- Chat ----------
function ChatView({chat, chats, onSend, onNewChat, updateMessage, updateChat, plan, credits, isAdminUser, openUpgrade, openNotifications, profile, settings}){
  const [input,setInput]=useState('');
  const [smart,setSmart]=useState(false);
  const [webSearch,setWebSearch]=useState(settings?.webSearch ?? true);
  const [attached,setAttached]=useState(null);
  const [loading,setLoading]=useState(false);
  const [loadingHasImage,setLoadingHasImage]=useState(false);
  const [listening,setListening]=useState(false);
  const recogRef=useRef(null);
  const fileRef=useRef(null); const imgRef=useRef(null); const scrollRef=useRef(null);

  const toggleVoiceInput = ()=>{
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ toast('Voice input is not supported in this browser','err'); return; }
    if(listening){ recogRef.current?.stop(); return; }
    const recog = new SR();
    recog.lang = 'en-IN'; recog.interimResults = true; recog.continuous = false;
    recog.onresult = (e)=>{
      const transcript = Array.from(e.results).map(r=>r[0].transcript).join('');
      setInput(transcript);
    };
    recog.onerror = ()=>{ setListening(false); };
    recog.onend = ()=>{ setListening(false); };
    recogRef.current = recog;
    recog.start();
    setListening(true);
  };

  const messages = chat?.messages || [];

  useEffect(()=>{ scrollRef.current?.scrollTo(0, scrollRef.current.scrollHeight); }, [messages, loading]);

  const doSend = async (overrideText)=>{
    const text=(overrideText ?? input).trim();
    if(!text && !attached) return;
    if(loading) return;
    setLoading(true); setInput('');
    const att=attached; setAttached(null);
    setLoadingHasImage(!!att && att.type==='image');
    try{ await onSend({text, attachment:att, smart, webSearch, modelPref:'auto'}); }
    finally{ setLoading(false); setLoadingHasImage(false); }
  };

  const pickFile = (e)=>{
    const f=e.target.files?.[0]; if(!f) return;
    if(f.type.startsWith('image/')){
      // Compress & resize the image client-side before storing as dataUrl.
      // This is critical: raw phone photos can be 4-8MB as base64, which
      // exceeds Vercel's 4.5MB serverless payload limit and causes silent failures.
      // We cap at 1024px wide and quality 0.82 — enough for vision analysis.
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const img=new window.Image();
        img.onload=()=>{
          const MAX=1024;
          let w=img.width, h=img.height;
          if(w>MAX||h>MAX){
            if(w>=h){ h=Math.round(h*(MAX/w)); w=MAX; }
            else { w=Math.round(w*(MAX/h)); h=MAX; }
          }
          const canvas=document.createElement('canvas');
          canvas.width=w; canvas.height=h;
          const ctx=canvas.getContext('2d');
          ctx.drawImage(img,0,0,w,h);
          const dataUrl=canvas.toDataURL('image/jpeg',0.82);
          setAttached({type:'image', dataUrl, name:f.name});
        };
        img.onerror=()=>{ toast('Could not read image — try a different file.','err'); };
        img.src=ev.target.result;
      };
      reader.onerror=()=>{ toast('Could not read image file.','err'); };
      reader.readAsDataURL(f);
    } else {
      const reader=new FileReader();
      reader.onload=()=>{ setInput(inp=> inp + `\n[File: ${f.name}]`); toast('File attached: '+f.name); };
      reader.readAsText(f);
    }
    e.target.value='';
  };

  const hasMessages = messages.length>0;

  return html`
  <div className="flex-1 flex flex-col h-full bg-[#fbfbfe] dark:bg-[#141620]">
    <div className="h-[54px] px-4 flex items-center justify-between border-b border-zinc-200 dark:border-[#23283f] bg-white/85 dark:bg-[#141620]/90 backdrop-blur">
      <div className="flex items-center gap-2 text-[13.5px] font-[600]">
        Chat
        <${I} name="ChevronDown" size=${13} className="text-zinc-400"/>
      </div>
      <div className="flex items-center gap-[10px]">
        <button onClick=${openUpgrade} className="px-[11px] py-[6px] rounded-[10px] text-[12px] font-[600] border border-zinc-300 dark:border-[#2f3452] flex items-center gap-[5px]">
          <${I} name="Crown" size=${12} className="text-amber-500"/> ${plan.toUpperCase()}
        </button>
        <button onClick=${openNotifications} className="relative p-[4px] hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-lg" title="Notifications">
          <${I} name="Bell" size=${18}/>
        </button>
        <div className="text-[11px] px-3 py-[6px] rounded-full bg-[#f3f0ff] dark:bg-[#221d3a] text-[#7c5cff] font-[600]">
          ✨ ${isAdminUser ? 'Unlimited' : `${credits.toLocaleString('en-IN')} Credits`}
        </div>
      </div>
    </div>

    <div ref=${scrollRef} className="flex-1 overflow-y-auto px-[28px] py-[26px]">
      ${!hasMessages ? html`
        <div className="max-w-[740px] mx-auto pt-14 text-center">
          <div className="text-[28px] font-[800] display">Hey ${profile?.display_name||'creator'}! 👋</div>
          <div className="text-[15px] mt-2 text-zinc-600 dark:text-zinc-300">
            What would you like to <span className="text-[#7c5cff] font-[700]">create</span> or <span className="text-[#a056ff] font-[700]">learn</span> today?
          </div>
          <div className="hidden md:grid md:grid-cols-4 gap-3 mt-7 text-left">
            ${[
              ['Give me 5 viral ideas','Lightbulb'],
              ['Write a script for this topic','FileText'],
              ['Generate a hook for my video','Wand2'],
              ['Analyze my latest video','BarChart3'],
            ].map(([l,ic])=> html`
              <button key=${l} onClick=${()=>doSend(l)} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-[14px] hover:border-[#7c5cff] transition text-left">

                      <button onClick=${()=>copyText(m.text||m.prompt||'')} className="flex items-center gap-[5px] hover:text-zinc-900 dark:hover:text-zinc-100"><${I} name="Copy" size=${13}/> Copy</button>
                      <button onClick=${()=>{ const liked = m.liked===1?0:1; updateMessage(chat.id, m.id, {liked}); toast(liked?'Liked ✓':'Like removed'); }} className=${`flex items-center gap-[4px] ${m.liked===1?'text-emerald-600 font-[600]':''}`}>
                        <${I} name="ThumbsUp" size=${13}/> ${m.liked===1?'Liked':''}
                      </button>
                      <button onClick=${()=>{ const dis = m.liked===-1?0:-1; updateMessage(chat.id, m.id, {liked:dis}); toast(dis?'Thanks for feedback':''); }} className=${m.liked===-1?'text-red-500':''}>
                        <${I} name="ThumbsDown" size=${13}/>
                      </button>
                      <button onClick=${()=>{ try{ const u=new SpeechSynthesisUtterance((m.text||'').slice(0,900)); u.lang='en-IN'; speechSynthesis.cancel(); speechSynthesis.speak(u); toast('Speaking…'); }catch{ toast('TTS failed','err'); } }} className="flex items-center gap-[4px] hover:text-zinc-900 dark:hover:text-zinc-100"><${I} name="Volume2" size=${13}/> Speak</button>
                      <button onClick=${()=>{ const lastUser = [...messages].reverse().find(mm=>mm.role==='user'); if(lastUser){ doSend(lastUser.text); toast('Regenerating…'); } }} className="flex items-center gap-[4px] hover:text-zinc-900 dark:hover:text-zinc-100"><${I} name="RefreshCw" size=${13}/> Regenerate</button>
                      <button onClick=${()=>{ updateChat(chat.id, {saved:!chat.saved}); toast(chat.saved?'Removed from saved':'Saved chat ✓'); }} className="flex items-center gap-[4px] hover:text-zinc-900 dark:hover:text-zinc-100"><${I} name=${chat.saved?'BookmarkCheck':'Bookmark'} size=${13}/> ${chat.saved?'Saved':''}</button>
                      ${m.model ? html`<span className="text-[10px] text-zinc-400">• ${String(m.model).split('/').pop()} ${m.tried?`· ${m.tried} tried`:''}</span>`:null}
                    </div>
                    ${m.debugInfo && isAdminUser ? html`
                      <div className="mt-[6px] text-[10.5px] font-mono text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-950/20 border border-amber-200 dark:border-amber-900/40 rounded-[8px] px-[8px] py-[5px] max-w-[560px] break-words">
                        Admin debug: ${m.debugInfo}
                      </div>
                    `:null}
                  ` : null}
                </div>
              `}
            </div>
          `)}
          ${loading ? html`<div className="text-[12.5px] text-zinc-500 flex items-center gap-2"><${I} name="Loader2" size=${14} className="animate-spin"/> ${loadingHasImage ? 'Zedith is analyzing your image…' : `Zedith is thinking${smart?' deeply':''}…`}</div>`:null}
        </div>
      `}
    </div>

    <div className="px-3 sm:px-5 pb-4">
      <div className="max-w-[760px] mx-auto bg-white dark:bg-[#1b1e30] border border-zinc-200 dark:border-[#2b2f48] rounded-[18px] shadow-soft px-[13px] pt-[10px] pb-[10px]">
        ${attached ? html`
          <div className="mb-[8px] flex items-center gap-[10px] text-[11px] bg-gradient-to-r from-[#f5f1ff] to-white dark:from-[#22263a] dark:to-[#1b1e30] border border-[#e3d9ff] dark:border-zinc-700 rounded-[12px] px-3 py-[8px] shadow-sm">
            <div className="relative shrink-0">
              <img src=${attached.dataUrl} className="w-[42px] h-[34px] object-cover rounded-[8px] border border-white dark:border-zinc-600 shadow-sm"/>
              <span className="absolute -top-[4px] -right-[4px] bg-[#7c5cff] text-white rounded-full w-[14px] h-[14px] flex items-center justify-center"><${I} name="Image" size=${8}/></span>
            </div>
            <div className="flex-1 min-w-0">
              <div className="truncate font-[600] text-zinc-700 dark:text-zinc-200">${attached.name}</div>
              <div className="text-[9.5px] text-zinc-400">Ready to send</div>
            </div>
            <button onClick=${()=>setAttached(null)} className="text-zinc-400 hover:text-red-500 transition shrink-0" title="Remove image"><${I} name="X" size=${14}/></button>
          </div>
        `:null}
        <input
          value=${input}
          onChange=${e=>setInput(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); doSend(); }}}
          placeholder="Ask Zedith anything…"
          className="w-full bg-transparent outline-none text-[13.3px] py-[5px] placeholder-zinc-400"
        />
        <div className="flex items-center gap-[5px] sm:gap-[7px] mt-[9px] flex-wrap">
          <button onClick=${()=>imgRef.current?.click()} className="w-[33px] h-[33px] rounded-[10px] border border-zinc-200 dark:border-zinc-700 flex items-center justify-center hover:bg-zinc-50 dark:hover:bg-zinc-800 shrink-0" title="Upload image">
            <${I} name="Plus" size=${15}/>
          </button>
          <button onClick=${()=>setSmart(s=>!s)} className=${`px-[10px] sm:px-[11px] h-[33px] rounded-[10px] text-[12px] font-[550] border flex items-center gap-[5px] shrink-0 ${smart ? 'border-[#7c5cff] bg-[#f5f1ff] dark:bg-[#221b3a] text-[#6a3ff5]':'border-zinc-200 dark:border-zinc-700'}`}>
            <${I} name="Sparkles" size=${13}/><span className="hidden sm:inline">Smart</span>
          </button>
          <button onClick=${()=>fileRef.current?.click()} className="px-[10px] sm:px-[11px] h-[33px] rounded-[10px] text-[12px] border border-zinc-200 dark:border-zinc-700 flex items-center gap-[5px] shrink-0">
            <${I} name="Paperclip" size=${13}/><span className="hidden sm:inline">Attach</span>
          </button>
          <button onClick=${()=>{ setWebSearch(w=>!w); toast(webSearch?'Web search off':'Web search on'); }} className=${`px-[10px] sm:px-[11px] h-[33px] rounded-[10px] text-[12px] border flex items-center gap-[5px] shrink-0 ${webSearch ? 'border-emerald-400 bg-emerald-50 dark:bg-emerald-950/25 text-emerald-700 dark:text-emerald-300':'border-zinc-200 dark:border-zinc-700'}`}>
            <${I} name="Globe" size=${13}/><span className="hidden sm:inline">Search</span>
          </button>
          <div className="flex-1"></div>
          <button onClick=${toggleVoiceInput} title=${listening?'Stop listening':'Voice input'} className=${`w-[33px] h-[33px] rounded-full border flex items-center justify-center shrink-0 ${listening?'border-red-400 bg-red-50 dark:bg-red-950/30 text-red-500 animate-pulse':'border-zinc-200 dark:border-zinc-700'}`}><${I} name="Mic" size=${14}/></button>
          <button onClick=${()=>doSend()} disabled=${loading || (!input.trim() && !attached)} className="w-[38px] h-[38px] rounded-full bg-[#7c5cff] hover:bg-[#6b48f5] text-white flex items-center justify-center shadow-zed-soft disabled:opacity-50 transition shrink-0">
            <${I} name="ArrowUp" size=${17}/>
          </button>
        </div>
        <input type="file" ref=${fileRef} accept="*/*" onChange=${pickFile} className="hidden"/>
        <input type="file" ref=${imgRef} accept="image/*" onChange=${pickFile} className="hidden"/>
      </div>
      <div className="max-w-[760px] mx-auto flex items-center justify-between text-[10.5px] text-zinc-400 mt-[8px] px-1">
        <span>${isAdminUser?'Admin mode: unlimited credits':`Credits: ${credits.toLocaleString('en-IN')} remaining`}</span>
        <span>🔒 Secure</span>
      </div>
    </div>
  </div>`;
}

// ---------- Project Detail View ----------
function ProjectDetailView({project, projects, updateProject, deleteProject, uploadProjectFile, onChat, onBack, addNotification}){
  const [tab,setTab]=useState('Files');
  const [showInvite,setShowInvite]=useState(false);
  const [showDeleteConfirm,setShowDeleteConfirm]=useState(false);
  const fileRef=useRef(null);
  if(!project) return html`<div className="flex-1 flex items-center justify-center text-zinc-500">Project not found</div>`;

  const tasks = project.tasks || [];
  const files = project.files || [];
  const notes = project.notes || '';
  const members = project.members || [];

  const updateTasks=(nt)=>updateProject(project.id,{tasks:nt});
  const updateFiles=(nf)=>updateProject(project.id,{files:nf});
  const updateNotes=(n)=>updateProject(project.id,{notes:n});

  const addTask=()=>{ const t={id:uid('t'), text:'New task', done:false}; updateTasks([...tasks,t]); };
  const toggleTask=(id)=> updateTasks(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const updateTask=(id,text)=> updateTasks(tasks.map(t=>t.id===id?{...t,text}:t));
  const removeTask=(id)=> updateTasks(tasks.filter(t=>t.id!==id));

  const uploadFile=async (e)=>{
    const f=e.target.files?.[0]; if(!f) return;
    const fileData = await uploadProjectFile(project.id, f);
    if(!fileData) return;
    const nf={id:uid('f'), ...fileData};
    updateFiles([nf,...files]);
    addNotification('File uploaded', f.name);
  };

  const tabs=['Files','Tasks','Notes','Analytics','Settings'];

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] overflow-y-auto">
    <div className="px-6 pt-5 pb-4 border-b border-zinc-200 dark:border-[#232844] flex items-center justify-between">
      <div className="flex items-center gap-3">
        <button onClick=${onBack} className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800"><${I} name="ArrowLeft" size=${18}/></button>
        <div className="w-10 h-10 rounded-[10px] flex items-center justify-center" style=${{background:project.color+'22', color:project.color}}>
          <${I} name=${project.icon||'FolderKanban'} size=${18}/>
        </div>
        <div>
          <div className="text-[19px] font-[800] display">${project.title}</div>
          <div className="text-[11px] text-zinc-500">${project.cat||'General'} • Updated ${formatDate(project.updated_at||project.created_at)}</div>
        </div>
      </div>
      <div className="flex items-center gap-2">
        <button onClick=${()=>setShowInvite(true)} className="px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 text-[12px] flex items-center gap-2">
          <${I} name="UserPlus" size=${14}/> Add members
        </button>
        <button onClick=${()=>{ copyText(window.location.href); toast('Project link copied'); }} className="px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 text-[12px] flex items-center gap-2">
          <${I} name="Share2" size=${14}/> Share
        </button>
        <button onClick=${onChat} className="px-3 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12px] font-[600] flex items-center gap-2">
          <${I} name="MessageSquare" size=${14}/> Project Chat
        </button>
      </div>
    </div>

    <div className="px-6 py-5">
      <div className="flex gap-5 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-5">
        ${tabs.map(t=> html`<button key=${t} onClick=${()=>setTab(t)} className=${`pb-[10px] ${tab===t?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${t}</button>`)}
      </div>

      ${tab==='Files' ? html`
        <div className="max-w-[900px]">
          <div className="flex items-center justify-between mb-4">
            <div className="text-[13px] font-[650]">Project Files</div>
            <button onClick=${()=>fileRef.current?.click()} className="px-3 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12px] font-[600] flex items-center gap-2"><${I} name="Upload" size=${14}/> Upload File</button>
            <input type="file" ref=${fileRef} onChange=${uploadFile} className="hidden"/>
          </div>
          ${files.length===0 ? html`
            <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-10 text-center text-zinc-500">
              <${I} name="FileText" size=${28} className="mx-auto mb-2"/><div className="font-[600]">No files yet</div><div className="text-[12px]">Upload scripts, thumbnails, research, or assets.</div>
            </div>
          ` : html`
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${files.map(f=> html`
                <div key=${f.id} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[13px] p-3 flex gap-3">
                  <div className="w-10 h-10 rounded-[10px] bg-[#f3f0ff] dark:bg-[#221d3a] flex items-center justify-center"><${I} name=${f.type?.startsWith('image/')?'Image':'FileText'} size=${16} className="text-[#7c5cff]"/></div>
                  <div className="flex-1 min-w-0">
                    <div className="text-[12.5px] font-[600] truncate">${f.name}</div>
                    <div className="text-[10.5px] text-zinc-500">${(f.size/1024).toFixed(1)} KB • ${formatDate(f.uploadedAt)}</div>
                  </div>
                  ${f.url ? html`<a href=${f.url} target="_blank" download=${f.name} className="text-[#7c5cff] text-[11px]">Open</a>`:null}
                </div>
              `)}
            </div>
          `}
        </div>
      ` : tab==='Tasks' ? html`
        <div className="max-w-[700px]">
          <div className="flex items-center justify-between mb-4">
            <div className="text-[13px] font-[650]">Tasks</div>
            <button onClick=${addTask} className="px-3 py-[8px] rounded-xl bg-[#7c5cff] text-white text-[12px] font-[600] flex items-center gap-2"><${I} name="Plus" size=${14}/> Add Task</button>
          </div>
          <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 space-y-2">
            ${tasks.length===0 ? html`<div className="text-zinc-500 text-[12px] text-center py-4">No tasks yet. Add your first project task.</div>` : tasks.map(t=> html`
              <div key=${t.id} className="flex items-center gap-3 group">
                <button onClick=${()=>toggleTask(t.id)} className=${`w-5 h-5 rounded-md border flex items-center justify-center ${t.done?'bg-emerald-500 border-emerald-500 text-white':'border-zinc-300 dark:border-zinc-600'}`}><${I} name="Check" size=${12}/></button>
                <input value=${t.text} onChange=${e=>updateTask(t.id,e.target.value)} className=${`flex-1 bg-transparent text-[13px] outline-none ${t.done?'line-through text-zinc-400':''}`}/>
                <button onClick=${()=>removeTask(t.id)} className="opacity-0 group-hover:opacity-100 text-zinc-400 hover:text-red-500"><${I} name="Trash2" size=${14}/></button>
              </div>
            `)}
          </div>
        </div>
      ` : tab==='Notes' ? html`
        <div className="max-w-[800px]">
          <div className="text-[13px] font-[650] mb-3">Project Notes</div>
          <textarea value=${notes} onChange=${e=>updateNotes(e.target.value)} placeholder="Write ideas, scripts, research notes…" className="w-full h-[420px] bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 text-[13px] outline-none resize-none"></textarea>
        </div>
      ` : tab==='Analytics' ? html`
        <div className="max-w-[900px]">
          <div className="text-[13px] font-[650] mb-4">Project Analytics</div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
            ${[['Tasks Done', tasks.filter(t=>t.done).length+'/'+tasks.length],['Files', files.length],['Members', members.length]].map(([l,v])=> html`
              <div key=${l} className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[13px] p-4">
                <div className="text-[11px] text-zinc-500">${l}</div><div className="text-[22px] font-[800] display mt-1">${v}</div>
              </div>
            `)}
          </div>
        </div>
      ` : html`
        <div className="max-w-[600px]">
          <div className="text-[13px] font-[650] mb-3">Project Settings</div>
          <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4 space-y-3 text-[12px]">
            <div><div className="text-zinc-500 mb-1">Project Name</div>
              <input value=${project.title} onChange=${e=>updateProject(project.id,{title:e.target.value})} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none"/>
            </div>
            <div><div className="text-zinc-500 mb-1">Category</div>
              <${CustomSelect} value=${project.cat} onChange=${v=>updateProject(project.id,{cat:v})} options=${['YouTube','Instagram','TikTok','Podcast']} className="w-full px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a]"/>
            </div>
            <div><div className="text-zinc-500 mb-1">Description</div>
              <textarea value=${project.desc||''} onChange=${e=>updateProject(project.id,{desc:e.target.value})} className="w-full h-[80px] px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-[#14182a] outline-none"></textarea>
            </div>
            <button onClick=${()=>setShowDeleteConfirm(true)} className="text-red-600 text-[12px] font-[600]">Delete Project</button>
          </div>
        </div>
      `}
    </div>
    ${showInvite ? html`<${PromptDialog} title="Invite by email" placeholder="teammate@email.com" onSubmit=${email=>{ const nm=[...members,{id:uid('m'),name:email,role:'Editor'}]; updateProject(project.id,{members:nm}); toast('Invitation sent to '+email); }} onClose=${()=>setShowInvite(false)}/>` : null}
    ${showDeleteConfirm ? html`<${ConfirmDialog} title="Delete this project?" message="This action cannot be undone." confirmLabel="Delete" danger=${true} onConfirm=${()=>{ deleteProject(project.id); onBack(); }} onClose=${()=>setShowDeleteConfirm(false)}/>` : null}
  </div>`;
}

// ---------- Projects ----------
function ProjectsView({projects, createProject, updateProject, deleteProject, onOpenProject}){
  const [showCreate,setShowCreate]=useState(false);
  const [filter,setFilter]=useState('All Projects');
  const [menuOpenId,setMenuOpenId]=useState(null);
  const [renaming,setRenaming]=useState(null);
  const [deleting,setDeleting]=useState(null);
  const sorted = [...projects].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] overflow-y-auto">
    <div className="px-4 sm:px-6 pt-5 pb-4 border-b border-zinc-200 dark:border-[#232844] flex items-center justify-between">
      <div><div className="text-[19px] font-[800] display">My Projects</div><div className="text-[11px] text-zinc-500">${projects.length} Projects</div></div>
      <button onClick=${()=>setShowCreate(true)} className="bg-[#7c5cff] hover:bg-[#6b48f5] text-white px-[14px] py-[8px] rounded-[11px] text-[12px] font-[600] flex items-center gap-2"><${I} name="Plus" size=${14}/> New Project</button>
    </div>
    ${projects.length===0 && !showCreate ? html`
      <div className="h-[680px] flex flex-col items-center justify-center text-center px-10">
        <div className="w-20 h-20 rounded-[18px] bg-[#f1efff] dark:bg-[#1e1a36] flex items-center justify-center mb-4"><${I} name="FolderKanban" size=${32} className="text-[#7c5cff]"/></div>
        <div className="text-[18px] font-[750]">You don't have any projects yet</div>
        <div className="text-[12.5px] text-zinc-500 mt-1 max-w-[380px]">Create your first project to organize your ideas, files, chats and content in one place.</div>
        <button onClick=${()=>setShowCreate(true)} className="mt-4 bg-[#7c5cff] text-white px-4 py-[9px] rounded-xl text-[12.5px] font-[600] flex items-center gap-2"><${I} name="Plus" size=${15}/> Create Project</button>
      </div>
    ` : html`
      <div className="px-4 sm:px-6 py-5">
        <div className="flex gap-5 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-4 overflow-x-auto no-scrollbar">
          ${['All Projects','Active','Archived','Shared','Trash'].map(t=> html`
            <button key=${t} onClick=${()=>setFilter(t)} className=${`shrink-0 pb-[10px] ${filter===t?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${t}</button>
          `)}
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-[14px]">
          ${sorted.map(p=> html`
            <div key=${p.id} className=${`relative text-left bg-white dark:bg-[#1a1d2e] rounded-[15px] border p-[15px] hover:border-[#7c5cff] transition ${p.pinned?'border-[#7c5cff]/50':'border-zinc-200 dark:border-[#2a2f4a]'}`}>
              <button onClick=${()=>onOpenProject(p.id)} className="text-left w-full">
                <div className="w-10 h-10 rounded-[10px] flex items-center justify-center mb-3" style=${{background:p.color+'22', color:p.color}}>
                  <${I} name=${p.icon||'FolderKanban'} size=${18}/>
                </div>
                <div className="font-[680] text-[13.5px] flex items-center gap-1">${p.pinned?html`<${I} name="Pin" size=${11} className="text-[#7c5cff]"/>`:null} ${p.title}</div>
                <div className="text-[11px] text-zinc-500">${p.cat||'General'}</div>
                <div className="text-[10px] text-zinc-400 mt-1">Updated ${formatDate(p.updated_at||p.created_at)}</div>
              </button>
              <button onClick=${e=>{ e.stopPropagation(); setMenuOpenId(menuOpenId===p.id?null:p.id); }} className="absolute top-[12px] right-[12px] p-[4px] rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800"><${I} name="MoreVertical" size=${14}/></button>
              ${menuOpenId===p.id ? html`
                <div className="absolute top-[38px] right-[12px] z-20 bg-white dark:bg-[#1e2232] border border-zinc-200 dark:border-zinc-700 rounded-xl shadow-lg py-1 w-[140px] text-[12px]">
                  <button onClick=${()=>{ updateProject(p.id,{pinned:!p.pinned}); setMenuOpenId(null); }} className="w-full text-left px-3 py-[7px] hover:bg-zinc-50 dark:hover:bg-zinc-800">${p.pinned?'Unpin':'Pin'}</button>
                  <button onClick=${()=>{ setRenaming(p); setMenuOpenId(null); }} className="w-full text-left px-3 py-[7px] hover:bg-zinc-50 dark:hover:bg-zinc-800">Rename</button>
                  <button onClick=${()=>{ setDeleting(p); setMenuOpenId(null); }} className="w-full text-left px-3 py-[7px] hover:bg-zinc-50 dark:hover:bg-zinc-800 text-red-500">Delete</button>
                </div>
              `:null}
            </div>
          `)}
          <button onClick=${()=>setShowCreate(true)} className="rounded-[15px] border-2 border-dashed border-zinc-300 dark:border-zinc-700 min-h-[170px] flex flex-col items-center justify-center text-zinc-500">
            <${I} name="Plus" size=${20}/><div className="text-[12.5px] font-[600] mt-1">New Project</div>
          </button>
        </div>
      </div>
    `}
    ${showCreate ? html`<${CreateProjectModal}
      onClose=${()=>setShowCreate(false)}
      onCreate=${async (np)=>{ const id=await createProject(np); if(id) onOpenProject(id); setShowCreate(false); }}
    />`:null}

            <button key=${c.id} onClick=${()=>toggleCheck(c.id)} className="w-full flex items-center gap-2 text-left text-[12px]">

              <span className=${c.done?'line-through text-zinc-400':''}>${c.text}</span>

      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-4">
        <div className="font-[650] text-[13px] mb-2">Up Next</div>
        ${items.filter(it=>new Date(it.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3).length===0 ? html`<div className="text-[11px] text-zinc-500">Nothing scheduled yet.</div>` : html`

    ${showNew ? html`<${NewContentModal} onClose=${()=>setShowNew(false)} onCreate=${(it)=>{ createPlannerItem(it); setShowNew(false); toast('Content scheduled'); }}/>` : null}

function HistoryView({chats, updateChat, deleteChat, projects, voiceHistory, filter: initialFilter='all', onOpenChat}){
  const [query,setQuery]=useState('');
  const [tab,setTab]=useState(initialFilter==='saved'?'Saved':'All');
  const [sort,setSort]=useState('Newest');
  const [layout,setLayout]=useState('list');
  const [renaming,setRenaming]=useState(null);
  const [deleting,setDeleting]=useState(null);

  let items=[];
  if(tab==='All') items=[...chats.map(c=>({...c,type:'chat'})), ...voiceHistory.map(v=>({...v,type:'voice'}))].sort((a,b)=>new Date(b.created_at||b.created_at)-new Date(a.created_at||a.created_at));
  else if(tab==='Chats') items=chats.map(c=>({...c,type:'chat'}));
  else if(tab==='Projects') items=chats.filter(c=>c.project_id).map(c=>({...c,type:'chat'}));
  else if(tab==='Voice') items=voiceHistory.map(v=>({...v,type:'voice'}));
  else if(tab==='Saved') items=chats.filter(c=>c.saved).map(c=>({...c,type:'chat'}));
  else if(tab==='Archived') items=[];

  if(query.trim()) items=items.filter(it=> (it.title||it.text||it.prompt||'').toLowerCase().includes(query.toLowerCase()));
  if(sort==='Newest') items.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(sort==='Oldest') items.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  if(sort==='Name') items.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  items.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));

  const toggleSaved=(id)=>{
    const chat=chats.find(c=>c.id===id);
    if(chat) updateChat(id,{saved:!chat.saved});
  };
  const togglePinned=(id)=>{
    const chat=chats.find(c=>c.id===id);
    if(chat) updateChat(id,{pinned:!chat.pinned});
  };

  return html`
  <div className="flex-1 h-full bg-[#fbfbfe] dark:bg-[#141620] p-4 sm:p-6 overflow-y-auto">
    <div className="text-[19px] font-[800] display mb-1">${initialFilter==='saved'?'Saved':'History'}</div>
    <div className="text-[12px] text-zinc-500 mb-4">${initialFilter==='saved'?'Your saved conversations and content.':'All your past conversations in one place.'}</div>

    <div className="flex flex-wrap items-center gap-3 mb-4">
      <div className="relative flex-1 min-w-[200px]">
        <${I} name="Search" size=${14} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"/>
        <input value=${query} onChange=${e=>setQuery(e.target.value)} placeholder="Search history…" className="w-full pl-9 pr-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-[#1a1d2e] text-[12.5px] outline-none"/>
      </div>
      <${CustomSelect} value=${sort} onChange=${setSort} options=${['Newest','Oldest','Name']} className="px-3 py-[8px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-[#1a1d2e] text-[12px]"/>
      <div className="flex border border-zinc-200 dark:border-zinc-700 rounded-xl overflow-hidden text-[12px]">
        <button onClick=${()=>setLayout('list')} className=${`px-3 py-[8px] ${layout==='list'?'bg-zinc-100 dark:bg-zinc-800':''}`}><${I} name="List" size=${14}/></button>
        <button onClick=${()=>setLayout('grid')} className=${`px-3 py-[8px] ${layout==='grid'?'bg-zinc-100 dark:bg-zinc-800':''}`}><${I} name="LayoutGrid" size=${14}/></button>
      </div>
    </div>

    <div className="flex gap-5 text-[12.5px] border-b border-zinc-200 dark:border-zinc-800 mb-4 overflow-x-auto no-scrollbar">
      ${['All','Chats','Projects','Voice','Saved','Archived'].map(t=> html`
        <button key=${t} onClick=${()=>setTab(t)} className=${`shrink-0 pb-[10px] ${tab===t?'text-[#7c5cff] border-b-2 border-[#7c5cff] font-[600]':'text-zinc-500'}`}>${t}</button>
      `)}
    </div>

    ${items.length===0 ? html`
      <div className="bg-white dark:bg-[#1a1d2e] border border-zinc-200 dark:border-[#2a2f4a] rounded-[14px] p-10 text-center text-zinc-500">
        <${I} name="Clock" size=${28} className="mx-auto mb-2"/>
        ${initialFilter==='saved'?'No saved chats yet.':'No conversations yet. Start a new chat.'}
      </div>
    ` : html`
      <div className=${layout==='grid'?'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3':'space-y-[10px] max-w-[900px]'}>
        ${items.map(it=> html`
          <div key=${it.id} onClick=${()=>{ if(it.type==='chat') onOpenChat(it.id); }} className=${`bg-white dark:bg-[#1a1d2e] border rounded-[13px] p-[14px] flex gap-3 ${it.pinned?'border-[#7c5cff]/50':'border-zinc-200 dark:border-[#2a2f4a]'} ${it.type==='chat'?'cursor-pointer hover:border-[#7c5cff] transition':''}`}>
            <div className="w-[34px] h-[34px] rounded-[9px] bg-[#f3f0ff] dark:bg-[#221d3a] flex items-center justify-center shrink-0">
              <${I} name=${it.type==='voice'?'Mic':'MessageSquare'} size=${15} className="text-[#7c5cff]"/>
            </div>
            <div className="flex-1 min-w-0">
              <div className="font-[600] text-[13px] truncate flex items-center gap-1">${it.pinned?html`<${I} name="Pin" size=${11} className="text-[#7c5cff] shrink-0"/>`:null} ${it.title || (it.type==='voice'? it.voice+' voice' : 'Untitled')}</div>
              <div className="text-[11.5px] text-zinc-500 truncate">${it.type==='voice' ? it.text?.slice(0,120)+'…' : it.messages?.[it.messages.length-1]?.text?.slice(0,120) || '—'}</div>
            </div>
            <div className="flex flex-col items-end gap-1 shrink-0">
              <div className="text-[11px] text-zinc-400">${formatDate(it.created_at)}</div>
              ${it.type==='chat' ? html`
                <div className="flex items-center gap-[6px]">
                  <button onClick=${e=>{ e.stopPropagation(); togglePinned(it.id); }} title=${it.pinned?'Unpin':'Pin'} className="text-zinc-400 hover:text-[#7c5cff]"><${I} name="Pin" size=${13}/></button>
                  <button onClick=${e=>{ e.stopPropagation(); setRenaming(it); }} title="Rename" className="text-zinc-400 hover:text-[#7c5cff]"><${I} name="Pencil" size=${13}/></button>
                  <button onClick=${e=>{ e.stopPropagation(); toggleSaved(it.id); }} title=${it.saved?'Unsave':'Save'} className="text-zinc-400 hover:text-[#7c5cff]"><${I} name=${it.saved?'BookmarkCheck':'Bookmark'} size=${13}/></button>
                  <button onClick=${e=>{ e.stopPropagation(); setDeleting(it); }} title="Delete" className="text-zinc-400 hover:text-red-500"><${I} name="Trash2" size=${13}/></button>
                </div>
              `:null}
            </div>
          </div>
        `)}
      </div>
    `}
  </div>
  ${renaming ? html`<${PromptDialog} title="Rename chat" placeholder=${renaming.title||'Untitled'} onSubmit=${v=>updateChat(renaming.id,{title:v})} onClose=${()=>setRenaming(null)}/>` : null}
  ${deleting ? html`<${ConfirmDialog} title="Delete this chat?" message="This will permanently delete the conversation." confirmLabel="Delete" danger=${true} onConfirm=${()=>deleteChat(deleting.id)} onClose=${()=>setDeleting(null)}/>` : null}
  `;
}

function VoiceStudioView({plan, credits, isAdminUser, user, openUpgrade, createVoiceEntry, voiceHistory, myVoices, setMyVoices, deductCredits}){
  const [text,setText]=useState('Welcome to Zedith AI Voice Studio. Create realistic AI voices for your YouTube content.');
  const [voice,setVoice]=useState('Brian');
  const [audioUrl,setAudioUrl]=useState(null);
  const [busy,setBusy]=useState(false);
  const [tab,setTab]=useState('Voice Generator');
  const [cloneName,setCloneName]=useState('');
  const [cloneFile,setCloneFile]=useState(null);

  const gen = async ()=>{

// ---------- Mini SVG Chart Primitives ----------
function buildPath(vals, w, h, pad=6){
  if(!vals.length) return {line:'', area:'', points:[]};
  const max = Math.max(...vals, 1);
  const min = Math.min(...vals, 0);
  const range = (max-min) || 1;
  const stepX = vals.length>1 ? (w-pad*2)/(vals.length-1) : 0;
  const points = vals.map((v,i)=>{
    const x = pad + i*stepX;
    const y = pad + (h-pad*2) * (1 - (v-min)/range);
    return [x,y];
  });
  const line = points.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(2)+','+p[1].toFixed(2)).join(' ');
  const area = line + ` L${points[points.length-1][0].toFixed(2)},${h-pad} L${points[0][0].toFixed(2)},${h-pad} Z`;
  return {line, area, points};
}

function AreaChart({data, w=640, h=180, color='#7c5cff', fmt=(v)=>v, labels=[]}){
  const [hover,setHover]=useState(null);
  const pad=10;
  const vals = data.length? data : [0];
  const {line, area, points} = buildPath(vals, w, h, pad);
  const gid = 'g'+Math.random().toString(36).slice(2,8);
  if(!data.length){
    return html`<div style=${{height:h}} className="flex items-center justify-center text-[12px] text-zinc-400">No data for this period.</div>`;
  }
  return html`
  <div className="relative">
    <svg viewBox=${`0 0 ${w} ${h}`} className="w-full" style=${{height:h}} preserveAspectRatio="none" onMouseLeave=${()=>setHover(null)}>
      <defs>
        <linearGradient id=${gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color=${color} stop-opacity="0.32"/>
          <stop offset="100%" stop-color=${color} stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${[0.25,0.5,0.75].map(f=>html`<line key=${f} x1="0" x2=${w} y1=${h*f} y2=${h*f} stroke="currentColor" className="text-zinc-200 dark:text-zinc-800" stroke-width="1"/>`)}
      <path d=${area} fill=${`url(#${gid})`} stroke="none"/>
      <path d=${line} fill="none" stroke=${color} stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
      ${points.map((p,i)=>html`<circle key=${i} cx=${p[0]} cy=${p[1]} r=${hover===i?4:0} fill=${color} stroke="white" stroke-width="1.5"/>`)}
      ${points.map((p,i)=>html`<rect key=${'h'+i} x=${p[0]-(w/points.length)/2} y="0" width=${w/points.length} height=${h} fill="transparent" onMouseEnter=${()=>setHover(i)}/>`)}
    </svg>
    ${hover!=null ? html`
      <div className="absolute pointer-events-none px-2 py-1 rounded-lg bg-zinc-900 dark:bg-black text-white text-[10.5px] font-[600] shadow-lg -translate-x-1/2 -translate-y-full"
        style=${{left:points[hover][0], top:Math.max(points[hover][1]-8,0)}}>
        ${fmt(vals[hover])}${labels[hover]?html`<div className="text-[9px] font-[400] text-zinc-300 text-center">${labels[hover]}</div>`:null}
      </div>
    ` : null}
  </div>`;
}

function BarSpark({data, w=640, h=140, color='#7c5cff', fmt=(v)=>v, labels=[]}){
  const [hover,setHover]=useState(null);
  if(!data.length){
    return html`<div style=${{height:h}} className="flex items-center justify-center text-[12px] text-zinc-400">No data for this period.</div>`;
  }
  const max = Math.max(...data, 1);
  const gap = 3;
  const bw = (w/data.length) - gap;
  return html`
  <div className="relative">
    <svg viewBox=${`0 0 ${w} ${h}`} className="w-full" style=${{height:h}} preserveAspectRatio="none" onMouseLeave=${()=>setHover(null)}>
      ${data.map((v,i)=>{
        const bh = Math.max((v/max)*(h-16), 2);
        const x = i*(bw+gap);
        const y = h - bh;
        return html`<rect key=${i} x=${x} y=${y} width=${bw} height=${bh} rx="3" fill=${hover===i?color:color+'b3'} onMouseEnter=${()=>setHover(i)}/>`;
      })}
    </svg>
    ${hover!=null ? html`
      <div className="absolute pointer-events-none px-2 py-1 rounded-lg bg-zinc-900 dark:bg-black text-white text-[10.5px] font-[600] shadow-lg -translate-x-1/2"
        style=${{left:(hover*(bw+gap))+bw/2, top:0}}>
        ${fmt(data[hover])}${labels[hover]?html`<div className="text-[9px] font-[400] text-zinc-300 text-center">${labels[hover]}</div>`:null}
      </div>
    ` : null}
  </div>`;
}

function Donut({segments, size=140, stroke=16}){
  const total = segments.reduce((s,x)=>s+x.value,0) || 1;
  const r = (size-stroke)/2;
  const c = 2*Math.PI*r;
  let offset = 0;
  return html`
  <svg width=${size} height=${size} viewBox=${`0 0 ${size} ${size}`}>
    <g transform=${`rotate(-90 ${size/2} ${size/2})`}>
      <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="currentColor" className="text-zinc-100 dark:text-zinc-800" stroke-width=${stroke}/>
      ${segments.map((s,i)=>{
        const len = (s.value/total)*c;
        const dash = `${len} ${c-len}`;
        const el = html`<circle key=${i} cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${s.color} stroke-width=${stroke} stroke-dasharray=${dash} stroke-dashoffset=${-offset} stroke-linecap="butt"/>`;
        offset += len;
        return el;
      })}
    </g>
  </svg>`;
}
