<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zedith — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans:['Inter','system-ui','sans-serif'], display:['"Plus Jakarta Sans"','Inter','sans-serif'] },
      colors: { zed:{DEFAULT:'#7c5cff',600:'#6b48f0'} }
    }
  }
}
</script>
<style>
*{font-family:Inter,system-ui,sans-serif}
.display{font-family:"Plus Jakarta Sans",Inter,sans-serif}
</style>
<script type="importmap">
{
  "imports": {
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
  }
}
</script>
</head>
<body class="bg-[#090a10] text-white min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-[#845bff] to-[#6236ff] flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
      </div>
      <h1 class="display text-2xl font-[800]">Welcome to Zedith</h1>
      <p class="text-zinc-400 text-sm mt-1">AI workspace for creators</p>
    </div>

    <div class="bg-[#13141f] border border-white/10 rounded-2xl p-6">
      <div class="flex bg-white/5 rounded-xl p-1 mb-5">
        <button id="tab-signup" class="flex-1 py-2 rounded-lg text-sm font-semibold transition">Sign Up</button>
        <button id="tab-login" class="flex-1 py-2 rounded-lg text-sm font-semibold transition">Log In</button>
      </div>

      <form id="auth-form" class="space-y-4">
        <div id="name-field">
          <label class="text-xs text-zinc-400 block mb-1">Display Name</label>
          <input id="name" type="text" placeholder="snakyboyYT" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-[#7c5cff] text-sm"/>
        </div>
        <div>
          <label class="text-xs text-zinc-400 block mb-1">Email</label>
          <input id="email" type="email" placeholder="you@creator.com" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-[#7c5cff] text-sm"/>
        </div>
        <div>
          <label class="text-xs text-zinc-400 block mb-1">Password</label>
          <input id="password" type="password" placeholder="••••••••" required minlength="6" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-[#7c5cff] text-sm"/>
        </div>
        <button type="submit" id="submit-btn" class="w-full py-3 rounded-xl bg-[#7c5cff] hover:bg-[#6b48f5] text-white font-semibold text-sm transition">Continue</button>
      </form>

      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
        <div class="relative flex justify-center text-xs"><span class="bg-[#13141f] px-2 text-zinc-500">or</span></div>
      </div>

      <button id="google-btn" class="w-full py-3 rounded-xl border border-white/10 hover:bg-white/5 flex items-center justify-center gap-2 text-sm font-medium transition">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div id="message" class="mt-4 text-xs text-center hidden"></div>
    </div>

    <p class="text-center text-xs text-zinc-500 mt-6">
      By continuing, you agree to our Terms and Privacy Policy.
    </p>
  </div>

  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const SUPABASE_URL = 'https://ghcgqrhhrxpyysjsxexv.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoY2dxcmhocnhweXlzanN4ZXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxODExMTEsImV4cCI6MjA5ODc1NzExMX0.7gD3O0Oa-hhp1LfA8Mv0JM2J22U5SmC7YOWqC7u9LDM';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

    const params = new URLSearchParams(location.search);
    let mode = params.get('mode') || 'signup';
    const tabSignup = document.getElementById('tab-signup');
    const tabLogin = document.getElementById('tab-login');
    const nameField = document.getElementById('name-field');
    const submitBtn = document.getElementById('submit-btn');
    const msg = document.getElementById('message');

    function setMode(m){
      mode = m;
      history.replaceState(null,'','?mode='+m);
      if(m==='signup'){
        tabSignup.className='flex-1 py-2 rounded-lg text-sm font-semibold transition bg-[#7c5cff] text-white';
        tabLogin.className='flex-1 py-2 rounded-lg text-sm font-semibold transition text-zinc-400 hover:text-white';
        nameField.style.display='block';
        submitBtn.textContent='Create account';
      } else {
        tabLogin.className='flex-1 py-2 rounded-lg text-sm font-semibold transition bg-[#7c5cff] text-white';
        tabSignup.className='flex-1 py-2 rounded-lg text-sm font-semibold transition text-zinc-400 hover:text-white';
        nameField.style.display='none';
        submitBtn.textContent='Log in';
      }
    }

    setMode(mode);
    tabSignup.onclick = ()=>setMode('signup');
    tabLogin.onclick = ()=>setMode('login');

    function showMessage(text, type='info'){
      msg.textContent = text;
      msg.className = 'mt-4 text-xs text-center ' + (type==='err'?'text-red-400':'text-emerald-400');
      msg.classList.remove('hidden');
    }

    document.getElementById('auth-form').onsubmit = async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Please wait…';
      try {
        if(mode==='signup'){
          const { data, error } = await supabase.auth.signUp({
            email, password,
            options: {
              data: { display_name: name || email.split('@')[0] },
              emailRedirectTo: location.origin + '/verify.html'
            }
          });
          if(error) throw error;
          showMessage('Check your email and click the verification link.', 'ok');
        } else {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if(error) throw error;
          location.href = 'index.html';
        }
      } catch(err){
        showMessage(err.message, 'err');
        submitBtn.disabled = false;
        submitBtn.textContent = mode==='signup'?'Create account':'Log in';
      }
    };

    document.getElementById('google-btn').onclick = async ()=>{
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: location.origin + '/index.html' }
      });
      if(error) showMessage(error.message, 'err');
    };

    // If already logged in, go to app
    const { data } = await supabase.auth.getSession();
    if(data.session) location.href = 'index.html';
  </script>
</body>
</html>
